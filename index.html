const { useState, useEffect, useRef } = React;

/* ============================================================
 * throughline — the daily engine
 * You tell it how much time you have; it tells you one thing to do.
 * No menu to skip through, no streaks, no scores. A record you own.
 * ============================================================ */

// ---------- storage (localStorage so it survives reloads) ----------
const mem = {};
const store = {
  async get(k) {
    try { if (typeof localStorage !== "undefined") return localStorage.getItem(k); } catch {}
    return k in mem ? mem[k] : null;
  },
  async set(k, v) {
    try { if (typeof localStorage !== "undefined") { localStorage.setItem(k, v); return; } } catch {}
    mem[k] = v;
  },
};
async function loadJSON(key, fb) {
  const raw = await store.get(key);
  if (raw == null) return fb;
  try { return JSON.parse(raw); } catch { return fb; }
}
const saveJSON = (key, v) => store.set(key, JSON.stringify(v));

// ---------- dates ----------
const pad = (n) => String(n).padStart(2, "0");
const keyOf = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const todayKey = () => keyOf(new Date());
// Filename stamp: date + hour-minute, so multiple saves the same day don't collide.
const stampKey = () => { const d = new Date(); return `${keyOf(d)}-${pad(d.getHours())}${pad(d.getMinutes())}`; };
const fromKey = (s) => new Date(s + "T00:00:00");
// Rolling-window helper: the date N days before today. The engine counts over a
// gliding 7-day window (today + 6 prior days), never a Mon→Sun reset.
const daysAgoKey = (n) => { const d = new Date(); d.setDate(d.getDate() - n); return keyOf(d); };
const weekStartKey = (d = new Date()) => {
  const x = new Date(d); const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow); x.setHours(0, 0, 0, 0); return keyOf(x);
};
const daysBetween = (a, b) => Math.round((fromKey(b) - fromKey(a)) / 86400000);
const fmtLong = (s) => fromKey(s).toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
const uid = () => Math.random().toString(36).slice(2, 9);
const fmtMin = (m) => { if (!m) return "0m"; if (m < 60) return m + "m"; const h = Math.floor(m / 60), r = m % 60; return r ? `${h}h ${r}m` : `${h}h`; };

// ---------- domains ----------
const DOMAINS = [
  { key: "physical", label: "physical", color: "#88a08a" },
  { key: "creative", label: "creative", color: "#b09277" },
  { key: "learning", label: "learning", color: "#7e8a99" },
  { key: "rest",     label: "rest",     color: "#ad8f9a" },
  { key: "mind",     label: "mind",     color: "#9b8aa0" },
  { key: "social",   label: "social",   color: "#7d96a3" },
  { key: "chore",    label: "chore",    color: "#807d76" },
];
const DKEYS = DOMAINS.map((d) => d.key);
const dColor = (k) => (DOMAINS.find((d) => d.key === k) || {}).color || "#807d76";
const WHERES = ["home", "anywhere", "out"];
// "recommandeur" = a practice whose action is generated by Claude at proposal time
// from the taste profile in `note` + done history (Film, music, meal prep…). Until
// that generation lands it behaves like a practice that picks from actions[].
const KINDS = ["practice", "task", "pipeline", "recommandeur"];
// Default funnel for a new pipeline activity — the locked erasure model.
// Erasure = a pipeline: the app serves the stage that's starving the funnel.
const ERASURE_STAGES = ["Accroches", "Mots favoris", "Groupes", "Poème", "Forme"];
const mkStages = (labels) => labels.map((t) => ({ id: uid(), text: t }));

// ---------- seed (everything editable) ----------
const A = (name, domain, where, perWeek, actions, kind = "practice", items = [], capMin = 0, capWeek = 0, stages = []) => ({
  id: uid(), name, domain, where, perWeek, kind, deadline: null, done: false, capMin, capWeek,
  actions: actions.map(([text, min]) => ({ id: uid(), text, min })),
  items: items.map((t) => ({ id: uid(), text: t, status: "doing" })),
  stages: mkStages(stages),
  note: "",
});
// Generic starter set — a blank canvas. Edit these (or wipe them) in the
// Activities tab to make the app your own. Your real setup lives in your
// own saved data / backup file, not here.
const SEED = [
  A("Move your body", "physical", "home", 5, [["Do a short workout", 20], ["Go for a walk", 30]]),
  A("Get outside", "physical", "out", 2, [["Go for a longer walk or activity", 60]]),
  A("Make something", "creative", "anywhere", 3, [["Spend a focused block creating", 25], ["Sketch a quick idea", 15]]),
  A("Practice a skill", "learning", "home", 3, [["Practice your current thing", 25]]),
  A("Learn a little", "learning", "anywhere", 3, [["Study for a short block", 15]]),
  A("Read", "rest", "anywhere", 4, [["Read for a while", 20]]),
  A("Rest on purpose", "rest", "home", 2, [["Do something restful and intentional", 30]]),
  A("Reach out", "social", "anywhere", 2, [["Message or call someone", 10]]),
  A("Tidy / chore", "chore", "home", 1, [["Knock out one chore", 20]]),
];

// ---------- engine ----------
// Work happens on fixed night shifts (20:00 → 08:00 the next morning):
//   • every Thursday, Friday, Saturday night
//   • every other Sunday night — anchored to Sun 7 Jun 2026 being a work night
// Outside those windows the place is always "home". No manual toggle: the app
// just knows where you are from the clock.
const WORK_SUNDAY_ANCHOR = new Date(2026, 5, 7); // Sun 7 Jun 2026 = a work night
function isWorkShift(d = new Date()) {
  const h = d.getHours();
  let startDay, startDate; // the calendar day the shift *began* (its 20:00)
  if (h >= 20) { startDay = d.getDay(); startDate = new Date(d); }
  else if (h < 8) { startDay = (d.getDay() + 6) % 7; startDate = new Date(d); startDate.setDate(startDate.getDate() - 1); }
  else return false; // 08:00–20:00 is never a shift
  if (startDay === 4 || startDay === 5 || startDay === 6) return true; // Thu/Fri/Sat
  if (startDay === 0) { // Sunday — alternate weeks
    const a = new Date(WORK_SUNDAY_ANCHOR); a.setHours(0, 0, 0, 0);
    const s = new Date(startDate); s.setHours(0, 0, 0, 0);
    const weeks = Math.round((s - a) / (7 * 86400000));
    return ((weeks % 2) + 2) % 2 === 0;
  }
  return false;
}
const computePlace = (d = new Date()) => (isWorkShift(d) ? "work" : "home");
// Skips (type:"skip") are recorded for reflection but must NOT count as done,
// or the engine would think you did what you just declined. undefined = done.
const isDone = (e) => e.type !== "skip";
// Rolling 7-day window (today + 6 prior days). perWeek targets are read against
// this gliding window, not a calendar week — no debt, no Monday reset.
function doneLast7(log, id) {
  const since = daysAgoKey(6);
  return log.filter((e) => e.date >= since && e.activityId === id && isDone(e)).length;
}
// Same window, but for a single action — backs per-action perWeek scheduling.
function doneActionLast7(log, id, actionId) {
  const since = daysAgoKey(6);
  return log.filter((e) => e.date >= since && e.activityId === id && e.actionId === actionId && isDone(e)).length;
}
function doneToday(log, id) {
  const t = todayKey();
  return log.some((e) => e.date === t && e.activityId === id && isDone(e));
}
// Days since this activity (or one action) was last done — today = 0, 999 if never.
// A never-touched item reads as maximally overdue and surfaces early: coverage first.
function daysSinceLast(log, id) {
  let last = null;
  for (const e of log) if (e.activityId === id && isDone(e) && (!last || e.date > last)) last = e.date;
  return last ? daysBetween(last, todayKey()) : 999;
}
function daysSinceLastAction(log, id, actionId) {
  let last = null;
  for (const e of log) if (e.activityId === id && e.actionId === actionId && isDone(e) && (!last || e.date > last)) last = e.date;
  return last ? daysBetween(last, todayKey()) : 999;
}
function minutesToday(log, id) {
  const t = todayKey();
  return log.filter((e) => e.date === t && e.activityId === id && isDone(e)).reduce((s, e) => s + (e.min || 0), 0);
}
// Coverage-first force: an activity's pull = how OVERDUE it is against its own
// natural rhythm (interval = 7/perWeek days), NOT a deficit count. Daily items
// (perWeek 7 → interval 1) surface every day yet fall silent once done; a neglected
// weekly item climbs until it overtakes them — so nothing gets left behind. Overdue
// is capped so a long-ignored item can't dominate forever. Bonus-tier items pull
// softer (×0.4) but keep their neglect climb: they yield to the core day-to-day,
// without being exiled — the only reading that honours "bonus" AND "leave nothing behind".
const OVERDUE_CAP = 3, BONUS_MULT = 0.4;
function forceFrom(daysSince, perWeek, bonus) {
  const jit = 0.7 + Math.random() * 0.6;
  const pw = perWeek > 0 ? perWeek : 0.5;        // optional / per-action container default
  const interval = 7 / pw;                        // a perWeek-7 item wants surfacing daily
  const overdue = Math.min(OVERDUE_CAP, daysSince / interval);
  // Blend of two intents that pull in opposite directions under oversubscription:
  //   √pw  → frequency: a daily anchor outweighs a weekly one (but ~2.6×, not 7×)
  //   overdue → coverage/anti-starvation: a neglected item climbs until it surfaces,
  //             capped so it can't dominate forever. Done today → overdue 0 → silent.
  let f = Math.sqrt(pw) * overdue * jit;
  if (bonus) f *= BONUS_MULT;
  return Math.max(0.02, f);
}
function weight(a, log) {
  if (a.kind === "task" && a.deadline) {
    const d = daysBetween(todayKey(), a.deadline);
    if (d <= 0) return 60; if (d <= 2) return 14; if (d <= 7) return 5; return 2;
  }
  return forceFrom(daysSinceLast(log, a.id), a.perWeek, a.bonus);
}
// True when at least one action carries its own perWeek → the activity is scheduled
// per-action (Linge, Clean…) instead of as one shared pool (the default).
const isPerAction = (a) => Array.isArray(a.actions) && a.actions.some((ac) => typeof ac.perWeek === "number");
// Same overdue-based force for a single action under its own perWeek. Bonus can be
// set on the activity OR on the action (e.g. Parfum: "sentir une matière" is core,
// "étudier — livre/vidéo/forum" are bonus).
function actionWeight(a, ac, log) {
  return forceFrom(daysSinceLastAction(log, a.id, ac.id), ac.perWeek, a.bonus || ac.bonus);
}
function placeOk(a, place) {
  if (place === "work") return a.where === "anywhere";
  if (place === "out") return a.where === "out" || a.where === "anywhere";
  // home (the default non-work state): home + anywhere, AND "out" activities —
  // there is no separate "out" place state, so an evening at home is exactly when
  // you'd decide to go out for one (ping-pong). Without this, "out" is a dead category.
  return a.where === "home" || a.where === "anywhere" || a.where === "out";
}
// ---------- pipeline picker ----------
// A pipeline doesn't propose a generic action — it proposes the next ATOMIC
// micro-step on a *specific piece at a specific stage*. Rule: serve the stage
// that's starving the funnel — in practice, push the piece furthest along toward
// the end (keep poems flowing out), while keeping organic randomness: sometimes
// start a fresh piece at the top instead. The piece's stage is advanced later by
// Claude reading the after-session comment — this only decides what to surface.
function pipelineStep(a) {
  const stages = a.stages || [];
  if (!stages.length) return null;
  const last = stages.length - 1;
  const label = (i) => (stages[i] ? stages[i].text : "—");
  const pieces = (a.items || []).filter((it) => typeof it.stage === "number");
  const live = pieces.filter((p) => p.stage < last); // not yet at the final stage
  // chance to start a fresh piece: always possible, higher when the funnel is thin
  const freshChance = live.length ? Math.min(0.5, 1 / (live.length + 1)) : 1;
  if (Math.random() < freshChance) {
    return { id: uid(), text: `${label(0)} — nouvelle pièce`, min: 15, pieceId: null, pieceStage: 0, fresh: true };
  }
  // advance a live piece — bias toward the furthest-along (closest to shipping),
  // jittered so every piece keeps a chance
  const chosen = live
    .map((p) => ({ p, w: (p.stage + 1) * (0.7 + Math.random() * 0.6) }))
    .sort((x, y) => y.w - x.w)[0].p;
  return { id: uid(), text: `${label(chosen.stage)} — « ${chosen.text} »`, min: 15, pieceId: chosen.id, pieceStage: chosen.stage, fresh: false };
}

function pick(activities, log, place, maxMin, relax = false, avoidId = null) {
  const elig = [];
  for (const a of activities) {
    if (a.kind === "task" && a.done) continue;
    if (a.id === avoidId) continue;
    if (!relax) {
      if (a.capMin > 0 && minutesToday(log, a.id) >= a.capMin) continue;   // hard daily minutes cap (e.g. treadmill)
      if (a.capWeek > 0 && doneLast7(log, a.id) >= a.capWeek) continue;     // hard cap over the rolling 7 days (e.g. meal prep)
    }
    if (!placeOk(a, place)) continue;
    if (a.kind === "pipeline") {
      if (!(a.stages || []).length) continue; // needs a funnel; the step is synthesized, not from a.actions
      elig.push({ a, acts: null, w: weight(a, log) });
    } else if (isPerAction(a)) {
      // each action competes on its own perWeek — emit one candidate per action.
      for (const ac of a.actions) {
        if (maxMin != null && ac.min > maxMin) continue;
        elig.push({ a, acts: [ac], w: actionWeight(a, ac, log) });
      }
    } else {
      const acts = a.actions.filter((ac) => maxMin == null || ac.min <= maxMin);
      if (!acts.length) continue;
      elig.push({ a, acts, w: weight(a, log) });
    }
  }
  if (!elig.length) return null;
  const total = elig.reduce((s, e) => s + e.w, 0);
  let r = Math.random() * total, chosen = elig[0];
  for (const e of elig) { if (r < e.w) { chosen = e; break; } r -= e.w; }
  const action = chosen.a.kind === "pipeline" ? pipelineStep(chosen.a) : chosen.acts[Math.floor(Math.random() * chosen.acts.length)];
  if (!action) return null;
  return { activity: chosen.a, action };
}
// ---------- Claude bridge (shared) ----------
// One direct browser→Messages-API call returning structured JSON. Both the pipeline
// advancer and the practice/recommandeur coach go through here, so the transport,
// model and JSON-parsing live in one place.
async function claudeJSON(key, prompt, schema, maxTokens = 400) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "content-type": "application/json",
    },
    body: JSON.stringify({
      model: "claude-opus-4-8",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }],
      output_config: { format: { type: "json_schema", schema } },
    }),
  });
  if (!res.ok) throw new Error("http " + res.status);
  const data = await res.json();
  const txt = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("");
  return JSON.parse(txt);
}

// ---------- recommandeur: named suggestion generated at proposal time ----------
// Reads the taste profile from activity.note + last 20 session notes, returns a
// one-line string ("title — subtitle") to replace the generic action text.
async function generateReco(key, activity, action, log) {
  const recent = log
    .filter((e) => e.activityId === activity.id && isDone(e))
    .slice(-20)
    .map((e) => e.claudeNote || e.note || e.actionText || "")
    .filter(Boolean);
  const prompt = `Tu es le moteur de recommandation pour : « ${activity.name} » (${activity.domain}).

Profil de goûts / contraintes :
"""
${activity.note || "(pas de profil)"}
"""

Action proposée : « ${action.text} »

Sessions récentes (à ne pas répéter immédiatement) :
${recent.length ? recent.join("\n") : "(aucune)"}

Génère UNE recommandation concrète et nommée qui colle au profil et l'élargit légèrement. Pas la valeur sûre évidente — quelque chose d'adjacent qui surprend un peu. Réponds avec un titre court (nom de l'œuvre, du plat, du morceau…) et un sous-titre optionnel (artiste, réalisateur, note courte…).`;
  const out = await claudeJSON(key, prompt, {
    type: "object",
    properties: { title: { type: "string" }, subtitle: { type: "string" } },
    required: ["title"],
    additionalProperties: false,
  }, 250);
  return out.subtitle ? `${out.title} — ${out.subtitle}` : out.title;
}

function Throughline() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("now");
  const [activities, setActivities] = useState([]);
  const [log, setLog] = useState([]);
  const loaded = useRef(false);

  // now-flow
  const [place, setPlace] = useState(computePlace());
  const [stage, setStage] = useState("entry"); // entry | proposal | running | empty | done
  const [current, setCurrent] = useState(null);
  const [lastId, setLastId] = useState(null);
  const [showWhy, setShowWhy] = useState(false);

  // the live line. While "running", it fills from the CENTRE outward as real time
  // elapses — reaching the margins at the action's estimated minutes, then spilling
  // past them (dépassement) if you keep going. No clock is ever shown: the line is
  // the only feedback. A few seconds = a sliver; the whole time = full; beyond = overflow.
  const [running, setRunning] = useState(false);
  const [startedAt, setStartedAt] = useState(0);
  const [elapsedMs, setElapsedMs] = useState(0);

  // long-press to swap: hold the line and it retracts to nothing, then re-picks.
  // there is no visible "something else" button — this is the only way to change.
  // the hold starts at 10s and DOUBLES with every skip (20s, 40s…), so skipping
  // gets costlier through the day. it resets to 10s each new day.
  const BASE_HOLD_MS = 10000;
  const [holding, setHolding] = useState(false);
  const [holdMs, setHoldMs] = useState(BASE_HOLD_MS);
  const [holdDate, setHoldDate] = useState(todayKey());
  const holdTimer = useRef(null);
  const holdStart = useRef(0);
  const didHold = useRef(false);

  // misc
  const [pasteVal, setPasteVal] = useState("");
  const [msg, setMsg] = useState("");

  // after-session comment + the Claude bridge that advances pipeline pieces
  const [comment, setComment] = useState("");
  const [doneEntryId, setDoneEntryId] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  const [generating, setGenerating] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [keyOpen, setKeyOpen] = useState(false);

  useEffect(() => {
    // Ask the browser to keep our data — without this, phones may evict
    // localStorage under storage pressure. With it, data stays until you
    // clear site data or uninstall.
    try { navigator.storage?.persist?.(); } catch {}
    let alive = true;
    (async () => {
      const a = await loadJSON("tlx_activities", null);
      const l = await loadJSON("tlx_log", null);
      const hs = await loadJSON("tlx_hold", null);
      const k = await store.get("tlx_apiKey");
      if (!alive) return;
      setActivities(a ?? SEED);
      setLog(l ?? []);
      setApiKey(k || "");
      if (hs && hs.date === todayKey()) { setHoldMs(hs.ms); setHoldDate(hs.date); } // same day → keep the accumulated penalty
      else { setHoldMs(BASE_HOLD_MS); setHoldDate(todayKey()); }                    // new day → back to 10s
      setLoading(false);
      loaded.current = true;
    })();
    return () => { alive = false; };
  }, []);
  useEffect(() => { if (loaded.current) saveJSON("tlx_activities", activities); }, [activities]);
  useEffect(() => { if (loaded.current) saveJSON("tlx_log", log); }, [log]);

  // tick the live line while running — re-read the wall clock so it stays accurate
  // even if the tab was backgrounded.
  useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setElapsedMs(Date.now() - startedAt), 100);
    return () => clearInterval(t);
  }, [running, startedAt]);

  // ----- now-flow actions -----
  const propose = (logUse = log, actsUse = activities, relax = false, avoidId = null) => {
    const pl = computePlace(); setPlace(pl); // place is read from the clock, not chosen
    const p = pick(actsUse, logUse, pl, null, relax, avoidId);
    setShowWhy(false);
    setRunning(false); setElapsedMs(0);
    if (!p) { setCurrent(null); setStage("empty"); }
    else {
      setCurrent(p); setStage("proposal");
      if (p.activity.kind === "recommandeur" && p.activity.note) {
        (async () => {
          const key = (await store.get("tlx_apiKey")) || "";
          if (!key) return;
          setGenerating(true);
          try {
            const text = await generateReco(key, p.activity, p.action, logUse);
            setCurrent((c) => c && c.activity.id === p.activity.id ? { ...c, action: { ...c.action, text } } : c);
          } catch (e) {}
          finally { setGenerating(false); }
        })();
      }
    }
  };
  const start = () => propose();
  // swap the instruction for another — no judgement, no log. There is no "refuse"
  // anymore: if a suggestion doesn't fit you ask for another, or you engage for a
  // few seconds. The minimum viable move is a sliver of the line, not a clean exit.
  const swap = () => {
    const today = todayKey();
    const cur = holdDate === today ? holdMs : BASE_HOLD_MS; // fresh day → start from 10s
    const next = cur * 2; // every skip doubles the next hold
    setHoldMs(next); setHoldDate(today);
    saveJSON("tlx_hold", { date: today, ms: next });
    propose(log, activities, false, current ? current.activity.id : null);
  };
  const resetFlow = () => { setStage("entry"); setCurrent(null); setShowWhy(false); setRunning(false); setElapsedMs(0); setComment(""); setSyncMsg(""); setSyncing(false); setGenerating(false); };

  // ----- after-session comment → advance the pipeline piece via a direct Claude call -----
  // The comment is the ONLY thing that moves a pipeline piece forward (no tap-to-advance).
  // When one is left on a pipeline action, send it + the funnel + current stage to the
  // Messages API and let Claude decide the piece's new stage, inline at finish().
  const saveKey = () => { store.set("tlx_apiKey", apiKey.trim()); setKeyOpen(false); setMsg(apiKey.trim() ? "key saved" : "key cleared"); setTimeout(() => setMsg(""), 1500); };
  const clearKey = () => { store.set("tlx_apiKey", ""); setApiKey(""); setMsg("key cleared"); setTimeout(() => setMsg(""), 1500); };

  const advanceViaClaude = async (key, text) => {
    const act = current.activity, action = current.action;
    const stages = act.stages || [];
    const last = stages.length - 1;
    const piece = action.pieceId ? (act.items || []).find((it) => it.id === action.pieceId) : null;
    const ctx = action.fresh
      ? `Une pièce FRAÎCHE vient d'être lancée (pas encore de nom). Le pas proposé était : "${action.text}".`
      : `Pièce existante : « ${piece ? piece.text : "?"} », à l'étape ${action.pieceStage} (${(stages[action.pieceStage] || {}).text || "?"}).`;
    const prompt = `Tu suis l'avancement d'un poème dans un funnel d'écriture (erasure).
Étapes du funnel (index: nom) :
${stages.map((s, i) => `${i}: ${s.text}`).join("\n")}

${ctx}

Commentaire laissé après la session :
« ${text} »

Détermine où en est la pièce APRÈS cette session. new_stage = index (0 à ${last}) de l'étape courante : si une étape vient d'être finie, avance à la suivante, sinon garde l'étape. piece_name = nom court (existant, ou tiré du commentaire si fraîche). note = une ligne qui distille ce qui a été fait.`;
    setSyncing(true); setSyncMsg("lecture du commentaire…");
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: { piece_name: { type: "string" }, new_stage: { type: "integer" }, note: { type: "string" } },
        required: ["piece_name", "new_stage", "note"],
        additionalProperties: false,
      });
      const ns = Math.max(0, Math.min(last, parseInt(out.new_stage)));
      const aid = act.id;
      setActivities((arr) => arr.map((a) => {
        if (a.id !== aid) return a;
        let items = a.items || [];
        if (action.fresh) items = [...items, { id: uid(), text: out.piece_name || "(sans nom)", stage: ns }];
        else if (action.pieceId) items = items.map((it) => (it.id === action.pieceId ? { ...it, stage: ns } : it));
        return { ...a, items };
      }));
      if (doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text, claudeNote: out.note } : en)));
      setSyncMsg(`« ${out.piece_name} » → ${(stages[ns] || {}).text || "?"}`);
    } catch (err) {
      setSyncMsg("lecture impossible (" + (err.message || "erreur") + ") — commentaire gardé");
    } finally {
      setSyncing(false);
      setTimeout(() => { setSyncMsg(""); setComment(""); resetFlow(); }, 2400);
    }
  };

  // ----- practice / recommandeur: the comment feeds the activity's living `note` -----
  // practice → coaching memory accumulates (patterns, adjustments, observations).
  // recommandeur → the taste profile is refined for the next recommendation. Claude
  // rewrites the whole note integrating this session, and distils a one-line log note.
  const coachViaClaude = async (key, text) => {
    const act = current.activity;
    const reco = act.kind === "recommandeur";
    const role = reco
      ? `Le champ « note » de cette activité est un PROFIL DE GOÛTS qui sert à recommander le prochain item — quelque chose qui élargit le champ des possibles.`
      : `Le champ « note » de cette activité est une MÉMOIRE DE COACHING : patterns, ajustements, observations utiles pour les prochaines sessions.`;
    const prompt = `Activité : « ${act.name} » (type: ${act.kind}, domaine: ${act.domain}).
Action faite : « ${current.action.text} ».
${role}

Note actuelle :
"""
${act.note || "(vide)"}
"""

Commentaire laissé après cette session :
« ${text} »

Réécris la note en y intégrant ce qu'apporte ce commentaire — garde ce qui reste pertinent, condense, n'efface pas l'historique utile. ${reco ? "Affûte le profil pour mieux recommander la prochaine fois." : "Garde une mémoire de coaching actionnable."} updated_note = la note complète réécrite (concise). log_note = une ligne qui distille cette session.`;
    setSyncing(true); setSyncMsg("lecture du commentaire…");
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: { updated_note: { type: "string" }, log_note: { type: "string" } },
        required: ["updated_note", "log_note"],
        additionalProperties: false,
      });
      const aid = act.id;
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, note: out.updated_note } : a)));
      if (doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text, claudeNote: out.log_note } : en)));
      setSyncMsg(reco ? "profil affiné ✓" : "note coach mise à jour ✓");
    } catch (err) {
      setSyncMsg("lecture impossible (" + (err.message || "erreur") + ") — commentaire gardé");
    } finally {
      setSyncing(false);
      setTimeout(() => { setSyncMsg(""); setComment(""); resetFlow(); }, 2400);
    }
  };

  const submitComment = async () => {
    const text = comment.trim();
    if (text && doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text } : en)));
    const kind = current && current.activity.kind;
    // every commented session reaches Claude — pipeline advances the piece, practice
    // and recommandeur grow the note. tasks just keep the comment locally.
    const wantsClaude = !!text && (kind === "pipeline" || kind === "practice" || kind === "recommandeur");
    if (wantsClaude) {
      const key = (await store.get("tlx_apiKey")) || "";
      if (key) { (kind === "pipeline" ? advanceViaClaude : coachViaClaude)(key, text); return; }
      setSyncMsg(kind === "pipeline" ? "pas de clé API — commentaire gardé, pièce non avancée" : "pas de clé API — commentaire gardé, note non mise à jour");
      setTimeout(() => { setSyncMsg(""); setComment(""); resetFlow(); }, 2200);
      return;
    }
    setComment(""); resetFlow();
  };

  // section navigation — no tab bar; swipe left/right or tap the faint edge arrows.
  const TABS = ["now", "activities", "progress"];
  const go = (dir) => {
    const i = TABS.indexOf(tab);
    const ni = Math.min(TABS.length - 1, Math.max(0, i + dir));
    if (ni === i) return;
    const t = TABS[ni]; setTab(t); if (t === "now") resetFlow();
  };
  const touchRef = useRef(null);
  const onTouchStart = (e) => { const t = e.touches[0]; touchRef.current = { x: t.clientX, y: t.clientY }; };
  const onTouchEnd = (e) => {
    const s = touchRef.current; touchRef.current = null; if (!s) return;
    const t = e.changedTouches[0]; const dx = t.clientX - s.x, dy = t.clientY - s.y;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
  };

  // tap to begin acting — the line starts filling from the centre.
  const begin = () => { setStartedAt(Date.now()); setElapsedMs(0); setRunning(true); setStage("running"); };

  // tap "done" to stop — log the REAL time spent (the line's own truth), then move on.
  const finish = () => {
    if (!current) { resetFlow(); return; }
    const sec = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
    const aid = current.activity.id;
    setLastId(aid);
    const e = {
      id: uid(), date: todayKey(), ts: Date.now(), type: "done",
      activityId: aid, actionId: current.action.id, actionText: current.action.text,
      min: Math.round(sec / 60), sec, domain: current.activity.domain, note: "",
    };
    if (current.activity.kind === "task") {
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, done: true } : a)));
    }
    setDoneEntryId(e.id);
    setLog((L) => [...L, e]);
    setRunning(false); setShowWhy(false); // keep `current` so the line stays frozen-full on "done"
    setComment("");
    setStage("done");
  };

  // ----- the line is the whole control surface: short tap acts, long hold retracts & re-picks -----
  const tapAction = () => {
    if (stage === "entry" || stage === "done") start();
    else if (stage === "proposal") begin();
    else if (stage === "running") finish();
  };
  const canHold = stage === "proposal" || stage === "running"; // only "change activity" is a hold
  const effHold = holdDate === todayKey() ? holdMs : BASE_HOLD_MS; // ignore a stale day if left open past midnight
  const onLineDown = () => {
    didHold.current = false;
    if (!canHold) return;
    holdStart.current = Date.now();
    setHolding(true); // the line begins retracting toward the centre over the full hold time
    holdTimer.current = setTimeout(() => {
      didHold.current = true; holdTimer.current = null;
      setHolding(false); swap(); // fully retracted → a different thing
    }, effHold);
  };
  const cancelHold = () => { if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current = null; } setHolding(false); };
  const onLineUp = () => {
    const heldFor = holdStart.current ? Date.now() - holdStart.current : 0;
    cancelHold();
    if (didHold.current) { didHold.current = false; return; } // swap already fired
    if (canHold && heldFor >= 300) { holdStart.current = 0; return; } // aborted hold — spring back, no action
    holdStart.current = 0;
    tapAction();
  };
  const onLineCancel = () => { cancelHold(); didHold.current = false; holdStart.current = 0; };

  // ----- activity mutations -----
  const upd = (id, patch) => setActivities((arr) => arr.map((a) => (a.id === id ? { ...a, ...patch } : a)));
  const addActivity = () =>
    setActivities((arr) => [...arr, { id: uid(), name: "", domain: "creative", where: "home", perWeek: 1, kind: "practice", deadline: null, done: false, capMin: 0, capWeek: 0, actions: [{ id: uid(), text: "", min: 15 }], items: [], stages: [], note: "" }]);
  const delActivity = (id) => setActivities((arr) => arr.filter((a) => a.id !== id));
  const addAction = (id) => upd(id, { actions: [...activities.find((a) => a.id === id).actions, { id: uid(), text: "", min: 15 }] });
  const editAction = (id, aid, patch) => upd(id, { actions: activities.find((a) => a.id === id).actions.map((ac) => (ac.id === aid ? { ...ac, ...patch } : ac)) });
  const delAction = (id, aid) => upd(id, { actions: activities.find((a) => a.id === id).actions.filter((ac) => ac.id !== aid) });
  const addStage = (id) => upd(id, { stages: [...(activities.find((a) => a.id === id).stages || []), { id: uid(), text: "" }] });
  const editStage = (id, sid, patch) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).map((s) => (s.id === sid ? { ...s, ...patch } : s)) });
  const delStage = (id, sid) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).filter((s) => s.id !== sid) });
  const moveStage = (id, sid, dir) => upd(id, { stages: (() => {
    const arr = [...(activities.find((a) => a.id === id).stages || [])];
    const i = arr.findIndex((s) => s.id === sid), j = i + dir;
    if (i < 0 || j < 0 || j >= arr.length) return arr;
    [arr[i], arr[j]] = [arr[j], arr[i]]; return arr;
  })() });
  const addItem = (id, text) => {
    if (!text.trim()) return;
    const a = activities.find((x) => x.id === id);
    // pipeline pieces enter at the first stage; balance/task items keep the todo/doing/done model
    const piece = a && a.kind === "pipeline" ? { id: uid(), text, stage: 0 } : { id: uid(), text, status: "doing" };
    upd(id, { items: [...a.items, piece] });
  };
  const cycleItem = (id, iid) => {
    const a = activities.find((x) => x.id === id);
    if (a && a.kind === "pipeline") {
      // a pipeline piece advances through the funnel stages, not todo/doing/done.
      // Tapping here is for setup/correction in the editor — in the live flow, Claude
      // advances the stage from the after-session comment (no manual tapping there).
      const n = (a.stages || []).length || 1;
      upd(id, { items: a.items.map((it) => (it.id === iid ? { ...it, stage: (((it.stage ?? 0) + 1) % n) } : it)) });
      return;
    }
    const order = ["todo", "doing", "done"];
    upd(id, { items: a.items.map((it) => (it.id === iid ? { ...it, status: order[(order.indexOf(it.status) + 1) % 3] } : it)) });
  };
  const delItem = (id, iid) => upd(id, { items: activities.find((a) => a.id === id).items.filter((it) => it.id !== iid) });
  const quickLog = (a) => {
    const ac = a.actions[0] || { id: uid(), text: a.name, min: 15 };
    setLog((L) => [...L, { id: uid(), date: todayKey(), ts: Date.now(), activityId: a.id, actionId: ac.id, actionText: ac.text, min: ac.min, domain: a.domain }]);
    setMsg(`logged: ${a.name}`); setTimeout(() => setMsg(""), 1500);
  };
  const delLog = (id) => setLog((L) => L.filter((e) => e.id !== id));

  // ----- data -----
  const exportObj = () => ({ app: "throughline", version: 3, exportedAt: new Date().toISOString(), savedOn: fmtLong(todayKey()), activities, log });
  const exportText = () => JSON.stringify(exportObj(), null, 2);
  const download = () => {
    const blob = new Blob([exportText()], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `throughline-${stampKey()}.json`; a.click(); URL.revokeObjectURL(url);
    setMsg("file downloaded"); setTimeout(() => setMsg(""), 1800);
  };
  const copy = async () => { try { await navigator.clipboard.writeText(exportText()); setMsg("copied to clipboard"); } catch { setMsg("copy failed — use the file"); } setTimeout(() => setMsg(""), 1800); };
  // Best on phones: hand the backup file to the OS share sheet (Drive, email,
  // Keep…). Falls back to a plain download where sharing files isn't supported.
  const shareBackup = async () => {
    // Share as .txt / text/plain: .json is NOT on Chrome's Web Share allowlist,
    // so canShare({files}) returns false for it and we'd silently fall to download
    // (no destination prompt). The body is still JSON; load parses by content.
    const fname = `throughline-${stampKey()}.txt`;
    try {
      const file = new File([exportText()], fname, { type: "text/plain" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "throughline backup" });
        setMsg("shared ✓"); setTimeout(() => setMsg(""), 1800); return;
      }
    } catch (e) { if (e && e.name === "AbortError") return; }
    download();
  };
  const applyImport = (text) => {
    try {
      const o = JSON.parse(text);
      if (!o.activities) throw new Error("no activities");
      setActivities(o.activities); setLog(o.log || []);
      setMsg("loaded ✓"); setTab("now"); setStage("entry"); setPasteVal("");
    } catch { setMsg("couldn't read that — check the file/text"); }
    setTimeout(() => setMsg(""), 2200);
  };
  const onFile = (ev) => { const f = ev.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = () => applyImport(String(r.result)); r.readAsText(f); ev.target.value = ""; };
  const resetAll = () => { if (typeof window !== "undefined" && !window.confirm("Wipe all activities and history?")) return; setActivities(SEED); setLog([]); setMsg("reset to defaults"); setTimeout(() => setMsg(""), 1800); };

  if (loading) return (
    <div className="tl"><style dangerouslySetInnerHTML={{ __html: css }} /><div className="grain" /><div className="wrap"><span className="lab">loading…</span></div></div>
  );

  // live line geometry — fraction of the action's estimated time that has elapsed.
  // full (=1) means the line reaches the margins; >1 means you've gone beyond.
  const fullMs = Math.max(1, (current?.action?.min || 10) * 60000);
  const frac = (stage === "running" || stage === "done") ? elapsedMs / fullMs : 0;

  return (
    <div className="tl">
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="grain" />
      <div className="wrap" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

        {/* the only chrome: two faint arrows. swipe left/right works too. */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", height: 22 }}>
          <button className="navarr" style={{ visibility: tab === TABS[0] ? "hidden" : "visible" }} onClick={() => go(-1)} aria-label="previous">‹</button>
          <button className="navarr" style={{ visibility: tab === TABS[TABS.length - 1] ? "hidden" : "visible" }} onClick={() => go(1)} aria-label="next">›</button>
        </div>

        {/* =================== NOW =================== */}
        {tab === "now" && (
          <div style={{ display: "flex", flexDirection: "column", minHeight: "calc(100vh - 150px)" }}>

            {/* the stage: instruction above, the living line as hero, controls below — vertically centered */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: 30 }}>

              {/* ---------- above the line: the instruction ---------- */}
              <div style={{ minHeight: 130, display: "flex", flexDirection: "column", justifyContent: "flex-end", textAlign: "center", marginBottom: 30 }}>

                {(stage === "proposal" || stage === "running" || stage === "done") && current && (
                  <div className="fade">
                    <div className="mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint, marginBottom: 18 }}>
                      <span className="dot" style={{ background: dColor(current.activity.domain), display: "inline-block", marginRight: 10, verticalAlign: "middle" }} />{current.activity.name}
                    </div>
                    <div style={{ fontFamily: "var(--mono)", fontSize: 13, fontWeight: 400, lineHeight: 1.55, letterSpacing: ".02em", textTransform: "lowercase", color: stage === "done" ? C.mut : C.text }}>
                      {generating ? <span className="breathe" style={{ color: C.faint, letterSpacing: ".22em" }}>…</span> : current.action.text}
                    </div>
                  </div>
                )}

                {stage === "empty" && (
                  <div className="fade" style={{ fontFamily: "var(--serif)", fontSize: 20, fontWeight: 300, fontStyle: "italic", color: C.mut, lineHeight: 1.45 }}>
                    You've done everything {place} has on the board today. That's a real day.
                  </div>
                )}
              </div>

              {/* ---------- the living line: hollow track, fills from the centre while you act, ---------- */}
              {/* ---------- spills past the margins when you go beyond the estimate ---------- */}
              {(() => {
                const over = frac > 1;
                const widthPct = Math.min(frac, 1.85) * 100;
                // the line carries the whole loop. short tap acts; long hold retracts & re-picks.
                // the hollow track stays inset from the screen edges so the fill can visibly
                // overshoot it — that overshoot is the felt dépassement.
                const trackTransition = holding ? `transform ${effHold}ms linear` : "transform .3s cubic-bezier(.2,.7,.2,1)";
                const fillColor = current ? dColor(current.activity.domain) : C.bone; // the line carries the activity's colour
                return (
                  <div onPointerDown={onLineDown} onPointerUp={onLineUp} onPointerLeave={onLineCancel} onPointerCancel={onLineCancel}
                    onContextMenu={(e) => e.preventDefault()}
                    style={{ position: "relative", height: 44, width: "82%", margin: "0 auto",
                      display: "flex", justifyContent: "center", alignItems: "center",
                      overflow: "visible", cursor: "pointer", touchAction: "manipulation", userSelect: "none", WebkitUserSelect: "none" }}>
                    {/* hollow track — inset, never touches the edges */}
                    <div className={stage === "entry" && !holding ? "breathe" : ""}
                      style={{ position: "absolute", left: 0, right: 0, top: "50%", height: 2, background: stage === "entry" ? C.bone : C.soft,
                        transform: `translateY(-50%) scaleX(${holding ? 0 : 1})`, transformOrigin: "center", transition: trackTransition }} />
                    {/* centre fill — grows symmetrically from the middle, overshoots the track when you go beyond */}
                    {frac > 0 && (
                      <div style={{ position: "relative", flexShrink: 0, height: over ? 8 : 6, width: `${widthPct}%`,
                        background: fillColor, opacity: over ? 1 : 0.9,
                        boxShadow: over ? `0 0 14px ${fillColor}` : "none",
                        transform: `scaleX(${holding ? 0 : 1})`, transformOrigin: "center",
                        transition: holding ? `transform ${effHold}ms linear` : "width .25s linear, height .35s, box-shadow .35s, transform .3s" }} />
                    )}
                  </div>
                );
              })()}

              {/* ---------- below the line: controls ---------- */}
              <div style={{ minHeight: 130, marginTop: 30, textAlign: "center" }}>

                {/* entry: nothing. just the breathing line above. */}

                {/* proposal & running: nothing under the line. we know why. */}

                {stage === "empty" && (
                  <div className="fade">
                    <button className="primary" style={{ maxWidth: 280, margin: "0 auto", display: "block" }} onClick={() => propose(log, activities, true, lastId)}>give me something anyway</button>
                    <button className="link" style={{ marginTop: 16 }} onClick={resetFlow}>i'm done</button>
                  </div>
                )}

                {stage === "done" && (
                  <div className="fade">
                    {(syncing || syncMsg) ? (
                      <div className="mono" style={{ fontSize: 11, color: C.bone, letterSpacing: ".06em", lineHeight: 1.6 }}>{syncMsg || "…"}</div>
                    ) : (
                      <>
                        <input className="in" value={comment} placeholder="un mot sur cette session ?"
                          onChange={(e) => setComment(e.target.value)}
                          onKeyDown={(e) => { if (e.key === "Enter") submitComment(); }}
                          style={{ fontSize: 14, textAlign: "center", maxWidth: 360, margin: "0 auto", display: "block", borderBottom: `1px solid ${C.line}`, paddingBottom: 8, fontStyle: comment ? "normal" : "italic", color: comment ? C.text : C.faint }} />
                        <button className="link" style={{ marginTop: 18 }} onClick={submitComment}>{comment.trim() ? "valider" : "passer"}</button>
                        {current && (() => {
                          const k = current.activity.kind;
                          const hint = k === "pipeline" ? "ton mot fait avancer la pièce dans le funnel"
                            : k === "recommandeur" ? "ton mot affine le profil pour la prochaine reco"
                            : k === "practice" ? "ton mot nourrit la mémoire de l'activité"
                            : null;
                          return hint ? <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 14, letterSpacing: ".06em" }}>{hint}</div> : null;
                        })()}
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* =================== ACTIVITIES =================== */}
        {tab === "activities" && (
          <div style={{ marginTop: 26 }}>
            {activities.map((a) => (
              <ActivityCard key={a.id} a={a} upd={upd} del={delActivity}
                addAction={addAction} editAction={editAction} delAction={delAction}
                addStage={addStage} editStage={editStage} delStage={delStage} moveStage={moveStage}
                addItem={addItem} cycleItem={cycleItem} delItem={delItem} />
            ))}
            <button className="link" style={{ marginTop: 20 }} onClick={addActivity}>+ add activity</button>
          </div>
        )}

        {/* =================== PROGRESS =================== */}
        {tab === "progress" && <Progress activities={activities} log={log} quickLog={quickLog} delLog={delLog} />}

        {/* =================== FOOTER — save / load centered, reset tucked further below. no rule: the only line is the one in the centre. =================== */}
        <div className="fade" style={{ marginTop: 72, textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 26 }}>
            <button className="link" onClick={shareBackup}>save</button>
            <label className="link" style={{ cursor: "pointer" }}>load
              <input type="file" accept="application/json,.json,text/plain,.txt" onChange={onFile} style={{ display: "none" }} />
            </label>
            <button className="link" onClick={() => setKeyOpen((o) => !o)}>key{apiKey ? " ·" : ""}</button>
          </div>
          {keyOpen && (
            <div style={{ marginTop: 18, maxWidth: 320, marginLeft: "auto", marginRight: "auto" }}>
              <input className="in" type="password" value={apiKey} placeholder="anthropic api key — sk-ant-…"
                onChange={(e) => setApiKey(e.target.value)}
                style={{ fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, paddingBottom: 6 }} />
              <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 12 }}>
                <button className="link" onClick={saveKey}>save key</button>
                <button className="link" onClick={clearKey}>clear</button>
              </div>
              <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 10, lineHeight: 1.6 }}>
                stored only on this device — never committed. reads your after-session comments to advance the funnel; sent only to anthropic.
              </div>
            </div>
          )}
          <button className="link" style={{ color: C.line, marginTop: 22 }} onClick={resetAll}>reset</button>
        </div>

        {msg && (
          <div className="mono" style={{ position: "fixed", left: 0, right: 0, bottom: 24, textAlign: "center", fontSize: 10.5, letterSpacing: ".1em", textTransform: "uppercase", color: C.bone, zIndex: 3 }}>
            {msg}
          </div>
        )}
      </div>
    </div>
  );
}

/* ------------------------- activity editor ------------------------- */
function ActivityCard({ a, upd, del, addAction, editAction, delAction, addStage, editStage, delStage, moveStage, addItem, cycleItem, delItem }) {
  const [open, setOpen] = useState(false);
  const [itemDraft, setItemDraft] = useState("");
  const statusColor = (s) => (s === "done" ? C.bone : s === "doing" ? C.mut : C.faint);
  return (
    <div className="fade" style={{ borderBottom: `1px solid ${C.soft}`, padding: "16px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button className="dot" style={{ background: dColor(a.domain), border: "none", cursor: "pointer" }}
          onClick={() => upd(a.id, { domain: DKEYS[(DKEYS.indexOf(a.domain) + 1) % DKEYS.length] })} title="change domain" />
        <input className="in" value={a.name} placeholder="activity name"
          onChange={(e) => upd(a.id, { name: e.target.value })}
          style={{ fontFamily: "var(--serif)", fontSize: 18, fontWeight: 300, fontStyle: a.name ? "normal" : "italic", color: a.name ? C.text : C.faint }} />
        <button className="ghost" onClick={() => setOpen((o) => !o)}>{open ? "−" : "edit"}</button>
        <button className="x" onClick={() => del(a.id)}>×</button>
      </div>

      {open && (
        <div style={{ paddingLeft: 20, marginTop: 16 }}>
          {/* meta row */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "14px 20px", marginBottom: 18 }}>
            <Meta label="where">
              <div style={{ display: "flex", gap: 5 }}>
                {WHERES.map((w) => (
                  <button key={w} className={`chip ${a.where === w ? "on" : ""}`} onClick={() => upd(a.id, { where: w })}>{w}</button>
                ))}
              </div>
            </Meta>
            <Meta label="kind">
              <div style={{ display: "flex", gap: 5 }}>
                {KINDS.map((k) => (
                  <button key={k} className={`chip ${a.kind === k ? "on" : ""}`}
                    onClick={() => upd(a.id, { kind: k, done: false, ...(k === "pipeline" && !(a.stages || []).length ? { stages: mkStages(ERASURE_STAGES) } : {}) })}>{k}</button>
                ))}
              </div>
            </Meta>
            {a.kind !== "task" ? (
              <>
              <Meta label="per week">
                <input className="in mono" type="number" min="0" value={a.perWeek}
                  onChange={(e) => upd(a.id, { perWeek: Math.max(0, parseInt(e.target.value) || 0) })}
                  style={{ width: 40, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: C.text }} />
              </Meta>
              <Meta label="stop after (min/day)">
                <input className="in mono" type="number" min="0" value={a.capMin || 0}
                  onChange={(e) => upd(a.id, { capMin: Math.max(0, parseInt(e.target.value) || 0) })}
                  style={{ width: 48, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: a.capMin ? C.text : C.faint }} />
              </Meta>
              </>
            ) : (
              <Meta label="deadline">
                <input className="in mono" type="date" value={a.deadline || ""}
                  onChange={(e) => upd(a.id, { deadline: e.target.value || null })}
                  style={{ fontSize: 12, borderBottom: `1px solid ${C.line}`, color: a.deadline ? C.text : C.faint }} />
              </Meta>
            )}
          </div>

          {/* stages — the pipeline funnel, in order (the app serves the one that's starving) */}
          {a.kind === "pipeline" && (
            <div style={{ marginBottom: 22 }}>
              <div className="lab" style={{ marginBottom: 10 }}>stages — the funnel, in order</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                {(a.stages || []).map((s, i) => (
                  <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span className="mono" style={{ fontSize: 10, color: C.faint, width: 14, textAlign: "right" }}>{i + 1}</span>
                    <input className="in" value={s.text} placeholder="stage name"
                      onChange={(e) => editStage(a.id, s.id, { text: e.target.value })}
                      style={{ fontSize: 15, fontWeight: 300, fontStyle: s.text ? "normal" : "italic", color: s.text ? C.text : C.faint, borderBottom: `1px solid ${C.soft}`, paddingBottom: 5 }} />
                    <button className="ghost" onClick={() => moveStage(a.id, s.id, -1)} style={{ opacity: i === 0 ? 0.25 : 1, padding: "0 2px" }} aria-label="move up">↑</button>
                    <button className="ghost" onClick={() => moveStage(a.id, s.id, 1)} style={{ opacity: i === (a.stages.length - 1) ? 0.25 : 1, padding: "0 2px" }} aria-label="move down">↓</button>
                    <button className="x" onClick={() => delStage(a.id, s.id)}>×</button>
                  </div>
                ))}
                {!(a.stages || []).length && (
                  <div className="mono" style={{ fontSize: 11, color: C.faint, fontStyle: "italic" }}>no stages yet — add the funnel below</div>
                )}
              </div>
              <button className="link" style={{ marginTop: 12 }} onClick={() => addStage(a.id)}>+ stage</button>
            </div>
          )}

          {/* actions */}
          <div className="lab" style={{ marginBottom: 10 }}>actions — what shows up · m = minutes · /wk = own weekly target (blank = shares the activity's)</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
            {a.actions.map((ac) => (
              <div key={ac.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <input className="in" value={ac.text} placeholder="a concrete action"
                  onChange={(e) => editAction(a.id, ac.id, { text: e.target.value })}
                  style={{ fontSize: 15, fontWeight: 300, fontStyle: ac.text ? "normal" : "italic", color: ac.text ? C.text : C.faint, borderBottom: `1px solid ${C.soft}`, paddingBottom: 5 }} />
                <input className="in mono" type="number" min="1" value={ac.min}
                  onChange={(e) => editAction(a.id, ac.id, { min: Math.max(1, parseInt(e.target.value) || 1) })}
                  style={{ width: 34, fontSize: 12, textAlign: "right", color: C.mut }} />
                <span className="mono" style={{ fontSize: 10, color: C.faint }}>m</span>
                {/* optional per-action perWeek: blank → this action shares the activity's pool;
                    a number → it's scheduled on its own rolling-7-day target (Linge, Clean…) */}
                <input className="in mono" type="number" min="0" value={ac.perWeek ?? ""} placeholder="–"
                  onChange={(e) => editAction(a.id, ac.id, { perWeek: e.target.value === "" ? null : Math.max(0, parseFloat(e.target.value) || 0) })}
                  style={{ width: 30, fontSize: 12, textAlign: "right", color: typeof ac.perWeek === "number" ? C.text : C.faint }} />
                <span className="mono" style={{ fontSize: 10, color: C.faint }}>/wk</span>
                <button className="x" onClick={() => delAction(a.id, ac.id)}>×</button>
              </div>
            ))}
          </div>
          <button className="link" style={{ marginTop: 12 }} onClick={() => addAction(a.id)}>+ action</button>

          {/* progress items / pipeline pieces */}
          <div className="lab" style={{ margin: "22px 0 10px" }}>{a.kind === "pipeline" ? "pieces — where each sits in the funnel" : "progress — pieces, materials, milestones"}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {a.items.map((it) => {
              const isPipe = a.kind === "pipeline";
              const st = (a.stages || [])[it.stage ?? 0];
              const stageTxt = st ? st.text : "—";
              const isDone = !isPipe && it.status === "done";
              return (
              <div key={it.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button className="chip" onClick={() => cycleItem(a.id, it.id)}
                  title={isPipe ? "set stage (setup / correction)" : "cycle status"}
                  style={{ minWidth: 64, color: isPipe ? C.mut : statusColor(it.status), borderColor: isDone ? C.bone : C.line }}>{isPipe ? stageTxt : it.status}</button>
                <span style={{ flex: 1, fontSize: 14, fontWeight: 300, color: isDone ? C.mut : C.text, textDecoration: isDone ? "line-through" : "none" }}>{it.text}</span>
                <button className="x" onClick={() => delItem(a.id, it.id)}>×</button>
              </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 10, alignItems: "center" }}>
            <input className="in" value={itemDraft} placeholder={a.kind === "pipeline" ? "add a piece (e.g. a phrase)" : "add one"}
              onChange={(e) => setItemDraft(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { addItem(a.id, itemDraft); setItemDraft(""); } }}
              style={{ fontSize: 14, fontStyle: "italic", borderBottom: `1px solid ${C.soft}`, paddingBottom: 4 }} />
            <button className="link" onClick={() => { addItem(a.id, itemDraft); setItemDraft(""); }}>add</button>
          </div>

          {/* note */}
          <div className="lab" style={{ margin: "22px 0 8px" }}>note</div>
          <textarea className="in" rows={2} value={a.note} onChange={(e) => upd(a.id, { note: e.target.value })}
            placeholder="anything the coach should know"
            style={{ fontSize: 14, fontWeight: 300, lineHeight: 1.5, fontStyle: a.note ? "normal" : "italic", color: a.note ? C.text : C.faint }} />
        </div>
      )}
    </div>
  );
}
function Meta({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
      <span className="lab">{label}</span>
      {children}
    </div>
  );
}

/* ------------------------- progress ------------------------- */
function Progress({ activities, log, quickLog, delLog }) {
  const ws = weekStartKey();
  const today = todayKey();
  const nameOf = (id) => (activities.find((a) => a.id === id) || {}).name || "—";
  const minByDomain = {};
  DOMAINS.forEach((d) => (minByDomain[d.key] = 0));
  log.filter((e) => e.date >= ws && isDone(e)).forEach((e) => { minByDomain[e.domain] = (minByDomain[e.domain] || 0) + (e.min || 0); });
  const maxD = Math.max(1, ...Object.values(minByDomain));
  const totalWeek = Object.values(minByDomain).reduce((s, n) => s + n, 0);
  const todayLog = log.filter((e) => e.date === today && isDone(e)).slice().reverse();
  const skipsWeek = log.filter((e) => e.date >= ws && !isDone(e)).length;

  return (
    <div style={{ marginTop: 30 }}>
      {/* this week — time */}
      <div className="fade">
        <div className="lab" style={{ marginBottom: 16 }}>this week — time spent</div>
        {totalWeek === 0 && <div className="mono" style={{ fontSize: 12, color: C.faint, marginBottom: 8 }}>nothing logged yet this week</div>}
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {DOMAINS.map((d) => (
            <div key={d.key} style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span className="mono" style={{ fontSize: 10, width: 64, color: C.mut, letterSpacing: ".08em" }}>{d.label}</span>
              <div style={{ flex: 1, height: 6, background: C.soft }}>
                <div style={{ width: `${(minByDomain[d.key] / maxD) * 100}%`, height: "100%", background: d.color, opacity: 0.75 }} />
              </div>
              <span className="mono" style={{ fontSize: 10, width: 48, textAlign: "right", color: minByDomain[d.key] ? C.bone : C.faint }}>{fmtMin(minByDomain[d.key])}</span>
            </div>
          ))}
        </div>
        <div className="mono" style={{ fontSize: 9.5, color: C.faint, marginTop: 12, letterSpacing: ".06em" }}>
          {fmtMin(totalWeek)} this week · time, not tallies.{skipsWeek > 0 ? `  ·  ${skipsWeek} passed on` : ""}
        </div>
      </div>

      {/* today */}
      <div className="fade" style={{ marginTop: 38 }}>
        <hr className="softrule" />
        <div className="lab" style={{ margin: "24px 0 16px" }}>today</div>
        {todayLog.length === 0 && <div className="mono" style={{ fontSize: 12, color: C.faint }}>nothing logged today</div>}
        <div style={{ display: "flex", flexDirection: "column", gap: 13 }}>
          {todayLog.map((e) => (
            <div key={e.id} style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
              <span className="dot" style={{ background: dColor(e.domain), marginTop: 6 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 300 }}>{nameOf(e.activityId)} <span className="mono" style={{ fontSize: 10, color: C.faint }}>· {fmtMin(e.min)}</span></div>
                {e.note ? <div style={{ fontSize: 13.5, fontWeight: 300, fontStyle: "italic", color: C.mut, marginTop: 2, lineHeight: 1.4 }}>{e.note}</div> : null}
              </div>
              <button className="x" onClick={() => delLog(e.id)} aria-label="remove">×</button>
            </div>
          ))}
        </div>
      </div>

      {/* by activity */}
      <div className="fade" style={{ marginTop: 38 }}>
        <hr className="softrule" />
        <div className="lab" style={{ margin: "24px 0 18px" }}>by activity</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          {activities.map((a) => {
            const wkMin = log.filter((e) => e.date >= ws && e.activityId === a.id && isDone(e)).reduce((s, e) => s + (e.min || 0), 0);
            const totMin = log.filter((e) => e.activityId === a.id && isDone(e)).reduce((s, e) => s + (e.min || 0), 0);
            const items = a.items || [];
            const isPipe = a.kind === "pipeline";
            const doneItems = items.filter((i) => i.status === "done").length;
            const stageTxt = (it) => { const s = (a.stages || [])[it.stage ?? 0]; return s ? s.text : "—"; };
            return (
              <div key={a.id}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span className="dot" style={{ background: dColor(a.domain) }} />
                  <span style={{ flex: 1, fontSize: 16, fontWeight: 300 }}>{a.name || "untitled"}</span>
                  <span className="mono" style={{ fontSize: 10, color: C.mut }}>{fmtMin(wkMin)} this wk · {fmtMin(totMin)} total</span>
                </div>
                {items.length > 0 && (
                  <div style={{ paddingLeft: 18, marginTop: 8 }}>
                    <span className="mono" style={{ fontSize: 9.5, color: C.faint, letterSpacing: ".08em" }}>{isPipe ? `${items.length} piece${items.length > 1 ? "s" : ""} in the funnel` : `${doneItems}/${items.length} done`}</span>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 6 }}>
                      {items.map((it) => (
                        isPipe ? (
                          <span key={it.id} className="mono" style={{ fontSize: 10.5, color: C.text }}>
                            {it.text} <span style={{ color: C.faint }}>· {stageTxt(it)}</span>
                          </span>
                        ) : (
                          <span key={it.id} className="mono" style={{ fontSize: 10.5, color: it.status === "done" ? C.mut : C.text, textDecoration: it.status === "done" ? "line-through" : "none" }}>
                            {it.text}{it.status === "doing" ? " ·" : ""}
                          </span>
                        )
                      ))}
                    </div>
                  </div>
                )}
                <div style={{ paddingLeft: 18, marginTop: 6 }}>
                  <button className="link" onClick={() => quickLog(a)}>+ did this today</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Throughline />);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
