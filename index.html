<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================
 * throughline — the daily engine
 * You tell it how much time you have; it tells you one thing to do.
 * No menu to skip through, no streaks, no scores. A record you own.
 * ============================================================ */

// ---------- storage (localStorage so it survives reloads) ----------
const mem = {};
const store = {
  async get(k) {
    try { if (typeof localStorage !== "undefined") return localStorage.getItem(k); } catch {}
    return k in mem ? mem[k] : null;
  },
  async set(k, v) {
    try { if (typeof localStorage !== "undefined") { localStorage.setItem(k, v); return; } } catch {}
    mem[k] = v;
  },
};
async function loadJSON(key, fb) {
  const raw = await store.get(key);
  if (raw == null) return fb;
  try { return JSON.parse(raw); } catch { return fb; }
}
const saveJSON = (key, v) => store.set(key, JSON.stringify(v));

// ---------- dates ----------
const pad = (n) => String(n).padStart(2, "0");
const keyOf = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
// debug: override the current date+time for simulation (null = real clock)
let _debugDate = null;
const realNow = () => _debugDate ? new Date(_debugDate) : new Date();
// the "day" for logging/caps rolls over at 9am, not midnight — Maxence is often
// still awake past midnight and always asleep by 9am, so a midnight cutoff would
// split one waking stretch across two calendar days. Only affects date KEYS
// (todayKey/daysAgoKey/weekStartKey); wall-clock gates that care about the actual
// hour (meal times, work-shift boundaries) still read realNow() directly. Decided 10/07.
const DAY_PIVOT_HOUR = 9;
const logicalNow = (d = realNow()) => { const x = new Date(d); x.setHours(x.getHours() - DAY_PIVOT_HOUR); return x; };
const todayKey = () => keyOf(logicalNow());
const stampKey = () => { const d = new Date(); return `${keyOf(d)}-${pad(d.getHours())}${pad(d.getMinutes())}`; };
const fromKey = (s) => new Date(s + "T00:00:00");
const daysAgoKey = (n) => { const d = logicalNow(); d.setDate(d.getDate() - n); return keyOf(d); };
const weekStartKey = (d = realNow()) => {
  const x = logicalNow(d); const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow); x.setHours(0, 0, 0, 0); return keyOf(x);
};
const daysBetween = (a, b) => Math.round((fromKey(b) - fromKey(a)) / 86400000);
const fmtLong = (s) => fromKey(s).toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
const fmtHM = (d) => `${pad(d.getHours())}h${pad(d.getMinutes())}`;
const uid = () => Math.random().toString(36).slice(2, 9);
const fmtMin = (m) => { if (!m) return "0m"; if (m < 60) return m + "m"; const h = Math.floor(m / 60), r = m % 60; return r ? `${h}h ${r}m` : `${h}h`; };

// ---------- domains ----------
const DOMAINS = [
  { key: "physical", label: "physical", color: "#88a08a" },
  { key: "creative", label: "creative", color: "#b09277" },
  { key: "learning", label: "learning", color: "#7e8a99" },
  { key: "rest",     label: "rest",     color: "#ad8f9a" },
  { key: "mind",     label: "mind",     color: "#9b8aa0" },
  { key: "social",   label: "social",   color: "#7d96a3" },
  { key: "chore",    label: "chore",    color: "#807d76" },
];
const DKEYS = DOMAINS.map((d) => d.key);
const dColor = (k) => (DOMAINS.find((d) => d.key === k) || {}).color || "#807d76";
const WHERES = ["home", "anywhere", "out", "work"];
// "recommandeur" = a practice whose action is generated by Claude at proposal time
// from the taste profile in `note` + done history (Film, music, meal prep…). Until
// that generation lands it behaves like a practice that picks from actions[].
const KINDS = ["practice", "task", "pipeline", "recommandeur"];
// Default funnel for a new pipeline activity — the locked erasure model.
// Erasure = a pipeline: the app serves the stage that's starving the funnel.
const ERASURE_STAGES = ["Accroches", "Mots favoris", "Groupes", "Poème", "Forme"];
const mkStages = (labels) => labels.map((t) => ({ id: uid(), text: t }));

// ---------- seed (everything editable) ----------
const A = (name, domain, where, perWeek, actions, kind = "practice", items = [], capMin = 0, capWeek = 0, stages = []) => ({
  id: uid(), name, domain, where, perWeek, kind, deadline: null, done: false, capMin, capWeek,
  actions: actions.map(([text, min]) => ({ id: uid(), text, min })),
  items: items.map((t) => ({ id: uid(), text: t, status: "doing" })),
  stages: mkStages(stages),
  note: "",
});
// Generic starter set — a blank canvas. Edit these (or wipe them) in the
// Activities tab to make the app your own. Your real setup lives in your
// own saved data / backup file, not here.
const SEED = [
  A("Move your body", "physical", "home", 5, [["Do a short workout", 20], ["Go for a walk", 30]]),
  A("Get outside", "physical", "out", 2, [["Go for a longer walk or activity", 60]]),
  A("Make something", "creative", "anywhere", 3, [["Spend a focused block creating", 25], ["Sketch a quick idea", 15]]),
  A("Practice a skill", "learning", "home", 3, [["Practice your current thing", 25]]),
  A("Learn a little", "learning", "anywhere", 3, [["Study for a short block", 15]]),
  A("Read", "rest", "anywhere", 4, [["Read for a while", 20]]),
  A("Rest on purpose", "rest", "home", 2, [["Do something restful and intentional", 30]]),
  A("Reach out", "social", "anywhere", 2, [["Message or call someone", 10]]),
  A("Tidy / chore", "chore", "home", 1, [["Knock out one chore", 20]]),
];

// ---------- engine (loterie proportionnelle) ----------
// Every eligible action gets pulled into the draw with a weight = target/period
// (a rate — e.g. 5/week → 0.71/day, 1/day → 1/day). One weighted random draw,
// every single time. No "due" state, no calendar reset, no catch-up, no memory
// beyond not repeating the exact previous pick. Over any long enough stretch the
// observed frequency converges to the target ratio (law of large numbers) — but
// no single week is guaranteed. That trade is intentional: a deterministic
// catch-up (serve whoever's most overdue) makes the numbers exact but is "n'importe
// quoi" to live with day to day; a pure weighted lottery is simple, matches how
// Maxence actually thinks about it (target ⇒ share of the draws), and variance
// around the average is an accepted cost, not a bug. Decided 09/07 — replaces the
// old chapeau (due/calendar-reset lottery) and the counter/argmax engine (v7/v8),
// both removed.

const WORK_SUNDAY_ANCHOR = new Date(2026, 5, 7);
function isWorkShift(d = new Date()) {
  const h = d.getHours();
  let startDay, startDate;
  if (h >= 20) { startDay = d.getDay(); startDate = new Date(d); }
  else if (h < 8) { startDay = (d.getDay() + 6) % 7; startDate = new Date(d); startDate.setDate(startDate.getDate() - 1); }
  else return false;
  if (startDay === 4 || startDay === 5 || startDay === 6) return true;
  if (startDay === 0) {
    const a = new Date(WORK_SUNDAY_ANCHOR); a.setHours(0, 0, 0, 0);
    const s = new Date(startDate); s.setHours(0, 0, 0, 0);
    const weeks = Math.round((s - a) / (7 * 86400000));
    return ((weeks % 2) + 2) % 2 === 0;
  }
  return false;
}
const computePlace = (d = realNow()) => (isWorkShift(d) ? "work" : "home");
// is a work shift starting tonight? (used to drop work-day-only activities like
// tapis, which belongs to a free day, not the 1h home window before a shift)
const isWorkDayToday = (d = realNow()) => isWorkShift(new Date(d.getFullYear(), d.getMonth(), d.getDate(), 21, 0, 0));
const isDone = (e) => e.type !== "skip";

// --- period helpers ---
const PERIOD = { day: 1, week: 7 };
function periodDays(period) { return period === "day" ? 1 : 7; }

function minutesInPeriod(log, actId, actionId, period) {
  const since = daysAgoKey(period === "day" ? 0 : 6);
  return log
    .filter((e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e))
    .reduce((s, e) => s + (e.min || 0), 0);
}
// completionsInPeriod is informational only now (the "liste" tab progress readout,
// x/target this period) — it does NOT gate what pick() can draw. Kept as-is since
// the display still wants to show where you stand.
function completionsInPeriod(log, actId, actionId, period, opts = {}) {
  const since = period === "day" ? todayKey() : weekStartKey(realNow());
  return log.filter(
    (e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e)
      && (!opts.requireFinish || e.finished)
      && (!opts.requireProgress || e.progressed)
  ).length;
}
// rolling 7-day completions, for the week-period draw cap below — deliberately NOT
// weekStartKey (that's a calendar-Monday cliff, the exact "reset hebdo" shape tried
// and dropped three times this summer for the creative pipelines). A rolling window
// has no reset instant: the cap loosens by one day at a time as old sessions age out,
// never a verdict moment (decided 10/07).
function completionsInRollingWeek(log, actId, actionId) {
  const since = daysAgoKey(6);
  return log.filter((e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e)).length;
}

// place filters — v4 adds where:"work" (film, work-only)
function placeOkW(where, place) {
  if (where === "work") return place === "work";
  if (place === "work") return where === "anywhere";
  if (place === "out") return where === "out" || where === "anywhere";
  return true;
}
function placeOk(a, place) { return placeOkW(a.where, place); }

// --- pipeline picker ---
// One active piece at a time (decided 04/07): if a piece is live (not yet at
// the last stage), the funnel always serves the next step on THAT piece —
// deterministic, no lottery. A fresh piece only starts once none is live.
function pipelineStep(a) {
  const stages = a.stages || [];
  if (!stages.length) return null;
  const last = stages.length - 1;
  const label = (i) => (stages[i] ? stages[i].text : "—");
  const live = (a.items || []).find((it) => typeof it.stage === "number" && it.stage < last);
  if (!live) return { id: uid(), text: `${label(0)} — nouvelle pièce`, min: 15, pieceId: null, pieceStage: 0, fresh: true };
  return { id: uid(), text: `${label(live.stage)} — « ${live.text} »`, min: 15, pieceId: live.id, pieceStage: live.stage, fresh: false };
}

// --- items[] LRU picker (Chant micro, Ordre, Clean, Cuisiner…) ---
function hasDoingItems(a) {
  return (a.kind === "practice" || a.kind === "recommandeur") && (a.items || []).some((it) => it.status === "doing");
}
// shared LRU: among items[status=doing], pick the one least recently logged (by
// itemId in the log) — weighted so longer-idle items are favoured, not fixed.
function pickItemLRU(a, log, base) {
  const doing = (a.items || []).filter((it) => it.status === "doing");
  if (!doing.length) return base;
  const scored = doing.map((it) => {
    let last = null;
    for (const e of log) if (e.activityId === a.id && isDone(e) && e.itemId === it.id && (!last || e.date > last)) last = e.date;
    return { it, w: (last ? daysBetween(last, todayKey()) : 999) * (0.7 + Math.random() * 0.6) };
  });
  const chosen = scored.sort((x, y) => y.w - x.w)[0].it;
  return { id: base.id, text: chosen.text, min: base.min, dur: base.dur, itemId: chosen.id };
}
function itemStep(a, log) {
  return pickItemLRU(a, log, a.actions[0] || { id: uid(), text: "—", min: 15 });
}

// --- vaisselle: derived straight from the log (cooked − washed this week), not
// kept in a separate piece of state that resets to 0 on every reload. A completed
// meal-prep/cuisiner session queues a dish session; a completed vaisselle clears one.
function pendingVaisselleFrom(log) {
  const ws = weekStartKey(realNow());
  const cooked = log.filter((e) => (e.activityId === "a_mealprep" || e.activityId === "a_cuisiner") && e.date >= ws && isDone(e)).length;
  const washed = log.filter((e) => e.activityId === "a_vaisselle" && e.date >= ws && isDone(e)).length;
  return Math.max(0, cooked - washed);
}

// --- cuisiner: only proposed around meal times, never mid-afternoon ---
function isMealTime(now) {
  const h = now.getHours() + now.getMinutes() / 60;
  return (h >= 11.5 && h < 13.5) || (h >= 18 && h < 20.5);
}

// --- meal prep sequencing: garniture only surfaces once focaccia is done this week ---
function focacciaDoneDateThisWeek(log) {
  const ws = weekStartKey(realNow());
  let d = null;
  for (const e of log) if (e.activityId === "a_mealprep" && e.actionId === "x_mp_focaccia" && e.date >= ws && isDone(e) && (!d || e.date > d)) d = e.date;
  return d;
}

// --- lessive: plier+ranger only surfaces at least 24h (real elapsed time, not
// calendar day) after the last wash, once it's had time to dry ---
const LESSIVE_WASH_ACTION = "x_li_wash";
const LESSIVE_DRY_MS = 24 * 3600000;
function lastLessiveWashTs(log) {
  let ts = null;
  for (const e of log) if (e.activityId === "a_linge" && e.actionId === LESSIVE_WASH_ACTION && isDone(e) && (!ts || e.ts > ts)) ts = e.ts;
  return ts;
}

// --- build the draw pool: every eligible action right now, weighted by its
// rate (target ÷ period-in-days), filtered by place plus the same hand-wired
// correctness gates as before (vaisselle needs a pending dish, garniture needs
// focaccia first, cuisiner only at meal times, plier needs a dry wash). DAY-period
// rows get one exception: a daily target of 1/day has a rate as high as a 5/week
// chantier's, so without a limit the ~6 daily items structurally eat ~46% of every
// day's draws AND can duplicate (drawn twice same day) while a chantier waits —
// pure waste, not the accepted variance. So once a day-period row hits its target
// for TODAY it steps out of the pool for the rest of the day, freeing its share to
// everything else, and reopens on its own at midnight (no calendar wall, no
// carry-over, no dry week — worst case it just closes early on one day).
// WEEK-period rows get the same idea (added 10/07, closes the gap that let
// always-eligible rows like Erasure blow past their target — 5/week drawing 13/week
// in testing, because the lottery has no per-row ceiling): once its completions over
// the rolling last 7 days reach its target it steps out, freeing its share to
// everything else. Rolling, not weekStartKey — no Monday cliff, no reset hebdo,
// nothing that resembles the finish/progress verdicts already retired from these
// same pipelines. The cap just loosens a day at a time as old sessions age out.
// relax=true skips every gate (correctness gates + both caps) — used once a normal
// draw comes back empty because every row's gate happened to be closed.
function buildLotteryRows(activities, log, place, relax = false) {
  const rows = [];
  for (const a of activities) {
    if (a.kind === "task" && a.done) continue;
    if (a.kind === "pipeline" && !(a.stages || []).length) continue;
    if (a.skipWorkDays && isWorkDayToday()) continue; // e.g. tapis: a free-day thing, never a work day
    if (a.id === "a_vaisselle") {
      if (!placeOk(a, place)) continue;
      if (relax || pendingVaisselleFrom(log) > 0) rows.push({ activity: a, action: a.actions[0], period: "week", target: 1, rate: 1 / 7 });
      continue;
    }
    const acts = a.actions || [];
    const perActionTargets = acts.length && acts.some((x) => x.target);
    if (perActionTargets) {
      for (const action of acts) {
        if (!placeOkW(action.where || a.where, place)) continue;
        // an action that rotates through items[] has nothing to propose while that
        // list is empty (e.g. Répertoire before any piece has graduated from Piano)
        if (/\(LRU\)/.test(action.text || "") && !hasDoingItems(a)) continue;
        if (!relax) {
          if (action.id === "x_cu_faire" && !isMealTime(realNow())) continue;
          if (action.id === "x_mp_garniture" && !focacciaDoneDateThisWeek(log)) continue;
          if (action.id === "x_li_plier") {
            const wts = lastLessiveWashTs(log);
            if (!wts || realNow().getTime() - wts < LESSIVE_DRY_MS) continue;
          }
        }
        const period = action.period || a.period || "week";
        const target = action.target || 1;
        if (!relax && period === "day" && completionsInPeriod(log, a.id, action.id, period) >= target) continue;
        if (!relax && period === "week" && completionsInRollingWeek(log, a.id, action.id) >= target) continue;
        rows.push({ activity: a, action, period, target, rate: target / periodDays(period) });
      }
    } else {
      if (!placeOk(a, place)) continue;
      if (/\(LRU\)/.test((acts[0] || {}).text || "") && !hasDoingItems(a)) continue;
      const period = a.period || "week";
      const target = a.target || a.perWeek || 1;
      if (!relax && period === "day" && completionsInPeriod(log, a.id, null, period) >= target) continue;
      if (!relax && period === "week" && completionsInRollingWeek(log, a.id, null) >= target) continue;
      rows.push({ activity: a, action: null, period, target, rate: target / periodDays(period) });
    }
  }
  return rows;
}

// --- pick: one weighted random draw over the pool that's currently open (rows past
// their day/rolling-week cap are excluded upstream by buildLotteryRows — no other
// priority boosts). The target ratio IS the draw probability among open rows; the
// action-pickers (pipeline funnel, items LRU) only shape WHAT a chosen activity
// proposes. Variance below the cap is expected and accepted — what converges is
// the average over weeks, not any single day.
function pick(activities, log, place, options = {}) {
  const { avoidId = null, relax = false } = options;
  const rows = buildLotteryRows(activities, log, place, relax).filter((r) => r.activity.id !== avoidId);
  if (!rows.length) return null;
  const total = rows.reduce((s, r) => s + r.rate, 0);
  let roll = Math.random() * total;
  let drawn = rows[rows.length - 1];
  for (const r of rows) { roll -= r.rate; if (roll <= 0) { drawn = r; break; } }
  const a = drawn.activity;
  let action = drawn.action
    ? drawn.action
    : a.kind === "pipeline"
      ? pipelineStep(a)
      : hasDoingItems(a)
        ? itemStep(a, log)
        : a.actions[Math.floor(Math.random() * a.actions.length)];
  // a per-action target (cuisiner's "recette choisie", linge's "faire une lessive")
  // means the generic items-LRU path above never runs — apply it explicitly here
  // whenever that specific action is the "(LRU)" one.
  if (drawn.action && action && /\(LRU\)/.test(action.text || "") && hasDoingItems(a)) {
    action = pickItemLRU(a, log, action);
  }
  return action ? { activity: a, action } : null;
}

// ---------- sandbox mode (?sim=1) ----------
// A clone of the real app, on isolated storage, so Maxence can DRIVE the checklist
// himself and watch it drain/refill — instead of reading a node simulator. Same
// code, same UI, same engine (zero drift). Everything below is inert unless SIM.
const SIM = typeof location !== "undefined" && new URLSearchParams(location.search).get("sim") === "1";
// namespace storage so the sandbox NEVER touches real data (activities/log/hold).
// The API key is shared (it's just a key), so pipeline advancing works in both.
const NS = (k) => (SIM && k !== "tlx_apiKey" ? k.replace("tlx_", "tlx_sim_") : k);

// buildHat = the whole draw pool laid open (for the sandbox "Liste" view). Same
// rows pick() draws from (buildLotteryRows), plus `done` (informational — how
// many completions logged this period) and `rate` (its actual draw weight) for
// display. Neither field affects what pick() does with the pool.
function buildHat(activities, log, place) {
  return buildLotteryRows(activities, log, place, false).map((r) => ({
    key: r.activity.id + (r.action ? ":" + r.action.id : ""),
    activity: r.activity, action: r.action, period: r.period, target: r.target, rate: r.rate,
    done: completionsInPeriod(log, r.activity.id, r.action ? r.action.id : null, r.period, { requireFinish: !!r.activity.requireFinish, requireProgress: !!r.activity.requireProgress }),
    label: r.action ? r.activity.name + " — " + r.action.text : r.activity.name,
  }));
}

// ---------- Claude bridge (shared) ----------
// One direct browser→Messages-API call returning structured JSON. Both the pipeline
// advancer and the practice/recommandeur coach go through here, so the transport,
// model and JSON-parsing live in one place.
async function claudeJSON(key, prompt, schema, maxTokens = 400) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "content-type": "application/json",
    },
    body: JSON.stringify({
      model: "claude-opus-4-8",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }],
      output_config: { format: { type: "json_schema", schema } },
    }),
  });
  if (!res.ok) throw new Error("http " + res.status);
  const data = await res.json();
  const txt = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("");
  return JSON.parse(txt);
}

// ---------- recommandeur: named suggestion generated at proposal time ----------
// Reads the taste profile from activity.note + last 20 session notes, returns a
// one-line string ("title — subtitle") to replace the generic action text.
// When the activity also keeps a curated items[] library (e.g. Cuisiner's recipe
// rotation), the deterministic LRU pick still runs first (in pick()) — this only
// dresses that choice up, or occasionally proposes something outside it. The
// library keeps driving the rotation; recommandeur doesn't replace it.
async function generateReco(key, activity, action, log) {
  const recent = log
    .filter((e) => e.activityId === activity.id && isDone(e))
    .slice(-20)
    .map((e) => e.claudeNote || e.note || e.actionText || "")
    .filter(Boolean);
  const library = (activity.items || []).filter((it) => it.status === "doing").map((it) => it.text);
  const usesLibrary = !!action.itemId && library.length > 0;
  const prompt = `Tu es le moteur de recommandation pour : « ${activity.name} » (${activity.domain}).

Profil de goûts / contraintes :
"""
${activity.note || "(pas de profil)"}
"""

Action proposée : « ${action.text} »
${library.length ? `\nBibliothèque actuelle (déjà validée par Maxence, à conserver comme base) :\n${library.map((t) => "- " + t).join("\n")}\n` : ""}
Sessions récentes (à ne pas répéter immédiatement) :
${recent.length ? recent.join("\n") : "(aucune)"}

${usesLibrary
    ? `La rotation a déjà choisi « ${action.text} » dans la bibliothèque ci-dessus. Présente CE choix comme une recommandation concrète et engageante (garde le nom reconnaissable ; tu peux ajouter un détail qui donne envie). N'en propose un autre que si celui-ci a visiblement été refait trop souvent récemment — et dans ce cas choisis un AUTRE item de la bibliothèque, jamais hors-liste.`
    : `Génère UNE recommandation concrète et nommée qui colle au profil et l'élargit légèrement${library.length ? ", en dehors de la bibliothèque ci-dessus (c'est le mode découverte)" : ""}. Pas la valeur sûre évidente — quelque chose d'adjacent qui surprend un peu.`}
Réponds avec un titre court (nom de l'œuvre, du plat, du morceau…) et un sous-titre optionnel (artiste, réalisateur, note courte…).`;
  const out = await claudeJSON(key, prompt, {
    type: "object",
    properties: { title: { type: "string" }, subtitle: { type: "string" } },
    required: ["title"],
    additionalProperties: false,
  }, 250);
  return out.subtitle ? `${out.title} — ${out.subtitle}` : out.title;
}

function Throughline() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("now");
  const [activities, setActivities] = useState([]);
  const [log, setLog] = useState([]);
  const loaded = useRef(false);

  // now-flow
  const [place, setPlace] = useState(computePlace());
  const [stage, setStage] = useState("entry"); // entry | proposal | running | empty | done
  const [current, setCurrent] = useState(null);
  const [lastId, setLastId] = useState(null);
  const [showWhy, setShowWhy] = useState(false);
  const [simRes, setSimRes] = useState(null); // SIM-only: last in-app simulation result (visible, re-runnable)
  const [simCfg, setSimCfg] = useState({ jours: 7, tirages: 10 }); // editable sim conditions

  // the live line. While "running", it fills from the CENTRE outward as real time
  // elapses — reaching the margins at the action's estimated minutes, then spilling
  // past them (dépassement) if you keep going. No clock is ever shown: the line is
  // the only feedback. A few seconds = a sliver; the whole time = full; beyond = overflow.
  const [running, setRunning] = useState(false);
  const [startedAt, setStartedAt] = useState(0);
  const [elapsedMs, setElapsedMs] = useState(0);
  // pause — for a real interruption mid-session (phone call, someone at the door).
  // freezes the line; resuming shifts startedAt forward by the paused gap so the
  // logged time excludes it. Distinct from the sandbox's "+5m/+10m" time-travel pause.
  const [paused, setPaused] = useState(false);
  const pauseStartRef = useRef(0);
  const togglePause = () => {
    if (paused) { setStartedAt((s) => s + (Date.now() - pauseStartRef.current)); setPaused(false); }
    else { pauseStartRef.current = Date.now(); setPaused(true); }
  };

  // long-press to swap: hold the line and it retracts to nothing, then re-picks.
  // there is no visible "something else" button — this is the only way to change.
  // the hold starts at 10s and DOUBLES with every skip (20s, 40s…), so skipping
  // gets costlier through the day. it resets to 10s each new day.
  const BASE_HOLD_MS = 10000;
  const [holding, setHolding] = useState(false);
  const [holdMs, setHoldMs] = useState(BASE_HOLD_MS);
  const [holdDate, setHoldDate] = useState(todayKey());
  const holdTimer = useRef(null);
  const holdStart = useRef(0);
  const didHold = useRef(false);

  // debug time override
  const [manualMin, setManualMin] = useState("");
  const [debugDay, setDebugDay] = useState("");
  const [debugHour, setDebugHour] = useState("");
  // sandbox-only: which list row is being completed, + optional time/comment
  const [simEdit, setSimEdit] = useState(null);
  const [simMin, setSimMin] = useState("");
  const [simNote, setSimNote] = useState("");
  // sandbox-only: which list row has its target/period/where controls expanded —
  // lets Maxence tweak the catalogue right where he tests it, no tab switch
  const [paramEdit, setParamEdit] = useState(null);
  const [clock, setClock] = useState(0); // bump to re-render after a time jump

  const applyDebugTime = (day, hour) => {
    if (day && hour !== "") {
      _debugDate = new Date(`${day}T${String(parseInt(hour)).padStart(2,"0")}:00:00`);
    } else {
      _debugDate = null;
    }
    setClock((c) => c + 1);
    resetFlow();
  };
  // sandbox time travel: jump N days from the current (real or debug) moment,
  // keeping the hour, so dailies refill tomorrow and everything refills Monday.
  const jumpDays = (n) => {
    const base = _debugDate ? new Date(_debugDate) : new Date();
    base.setDate(base.getDate() + n);
    const d = keyOf(base), h = String(base.getHours());
    setDebugDay(d); setDebugHour(h); applyDebugTime(d, h);
  };
  const clockReal = () => { setDebugDay(""); setDebugHour(""); applyDebugTime("", ""); };
  // minute-precision sim clock: advance the current (debug or real) moment by N
  // minutes and freeze the clock there — used for pause buttons ("+1h de pause")
  // and to auto-advance when you log a session's real duration (do a 10min sudoku
  // at 16h00 → the clock reads 16h10 once you validate).
  const simAdvanceMinutes = (mins) => {
    const base = _debugDate ? new Date(_debugDate) : new Date();
    base.setMinutes(base.getMinutes() + mins);
    _debugDate = base;
    setDebugDay(keyOf(base)); setDebugHour(String(base.getHours()));
    setClock((c) => c + 1);
  };

  // misc
  const [pasteVal, setPasteVal] = useState("");
  const [msg, setMsg] = useState("");

  // after-session comment + the Claude bridge that advances pipeline pieces
  const [comment, setComment] = useState("");
  const [doneEntryId, setDoneEntryId] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  const [generating, setGenerating] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [keyOpen, setKeyOpen] = useState(false);

  useEffect(() => {
    // Ask the browser to keep our data — without this, phones may evict
    // localStorage under storage pressure. With it, data stays until you
    // clear site data or uninstall.
    try { navigator.storage?.persist?.(); } catch {}
    let alive = true;
    (async () => {
      let a = await loadJSON(NS("tlx_activities"), null);
      const l = await loadJSON(NS("tlx_log"), null);
      const hs = await loadJSON(NS("tlx_hold"), null);
      const fl = await loadJSON(NS("tlx_flow"), null);
      const k = await store.get("tlx_apiKey");
      // sandbox with no data yet → seed from the served catalogue copy so the
      // clone opens on the REAL activities. Falls back to SEED if it isn't there.
      if (SIM && a == null) {
        try { const r = await fetch("throughline-catalogue.json", { cache: "no-store" }); if (r.ok) { const c = await r.json(); if (Array.isArray(c.activities)) a = c.activities; } } catch {}
      }
      if (!alive) return;
      setActivities(a ?? SEED);
      setLog(l ?? []);
      setApiKey(k || "");
      if (hs && hs.date === todayKey()) { setHoldMs(hs.ms); setHoldDate(hs.date); } // same day → keep the accumulated penalty
      else { setHoldMs(BASE_HOLD_MS); setHoldDate(todayKey()); }                    // new day → back to 10s
      // restore the live proposal so a backgrounded tab getting killed and reopened
      // (common on phones) resumes exactly where it left off, instead of silently
      // re-picking — that silent re-pick was an unintended free skip. Only same-day:
      // a proposal from a previous day is stale, start fresh instead.
      if (fl && fl.date === todayKey() && fl.stage && fl.stage !== "entry" && fl.stage !== "empty") {
        setStage(fl.stage); setCurrent(fl.current || null);
        setStartedAt(fl.startedAt || 0); setElapsedMs(fl.startedAt ? Date.now() - fl.startedAt : 0);
        setRunning(!!fl.running); setPaused(!!fl.paused);
        setDoneEntryId(fl.doneEntryId || null); setComment(fl.comment || ""); setManualMin(fl.manualMin || "");
      }
      setLoading(false);
      loaded.current = true;
    })();
    return () => { alive = false; };
  }, []);
  useEffect(() => { if (loaded.current) saveJSON(NS("tlx_activities"), activities); }, [activities]);
  useEffect(() => { if (loaded.current) saveJSON(NS("tlx_log"), log); }, [log]);
  // persist the live flow so it survives a tab getting backgrounded and killed
  useEffect(() => {
    if (!loaded.current) return;
    saveJSON(NS("tlx_flow"), { date: todayKey(), stage, current, startedAt, running, paused, doneEntryId, comment, manualMin });
  }, [stage, current, startedAt, running, paused, doneEntryId, comment, manualMin]);

  // tick the live line while running — re-read the wall clock so it stays accurate
  // even if the tab was backgrounded.
  useEffect(() => {
    if (!running || paused) return;
    const t = setInterval(() => setElapsedMs(Date.now() - startedAt), 100);
    return () => clearInterval(t);
  }, [running, startedAt, paused]);

  // ----- now-flow actions -----
  const propose = (logUse = log, actsUse = activities, relax = false, avoidId = null) => {
    const pl = computePlace(); setPlace(pl); // place is read from the clock, not chosen
    // if every row is past its day/week cap right now, don't stop — relax and redraw
    // immediately (decided 10/07: "quand tout est arrivé à complétion, on relance
    // juste", no stopping-point verdict to hit at the wrong moment). The "empty"
    // stage below now only fires when there's truly nothing eligible for this place
    // even with every gate relaxed (e.g. an empty catalogue for that context).
    let p = pick(actsUse, logUse, pl, { relax, avoidId });
    // the relax redraw skips every cap/gate, so without this the very thing that just
    // hit its target could come right back — avoid at least an immediate repeat
    // (decided 10/07, doesn't apply to the normal non-relax draw: that variance is accepted).
    if (!p && !relax) p = pick(actsUse, logUse, pl, { relax: true, avoidId: avoidId ?? lastId });
    setShowWhy(false);
    setRunning(false); setElapsedMs(0);
    if (!p) { setCurrent(null); setStage("empty"); }
    else {
      setCurrent(p); setStage("proposal");
      if (p.activity.kind === "recommandeur" && p.activity.note) {
        (async () => {
          const key = (await store.get("tlx_apiKey")) || "";
          if (!key) return;
          setGenerating(true);
          try {
            const text = await generateReco(key, p.activity, p.action, logUse);
            setCurrent((c) => c && c.activity.id === p.activity.id ? { ...c, action: { ...c.action, text } } : c);
          } catch (e) {}
          finally { setGenerating(false); }
        })();
      }
    }
  };
  const start = () => propose();
  // swap the instruction for another — no judgement, no log. There is no "refuse"
  // anymore: if a suggestion doesn't fit you ask for another, or you engage for a
  // few seconds. The minimum viable move is a sliver of the line, not a clean exit.
  const swap = () => {
    const today = todayKey();
    const cur = holdDate === today ? holdMs : BASE_HOLD_MS; // fresh day → start from 10s
    const next = cur * 2; // every skip doubles the next hold
    setHoldMs(next); setHoldDate(today);
    saveJSON(NS("tlx_hold"), { date: today, ms: next });
    propose(log, activities, false, current ? current.activity.id : null);
  };
  const resetFlow = () => { setStage("entry"); setCurrent(null); setShowWhy(false); setRunning(false); setElapsedMs(0); setPaused(false); setComment(""); setSyncMsg(""); setSyncing(false); setGenerating(false); };

  // ----- after-session comment → advance the pipeline piece via a direct Claude call -----
  // The comment is the ONLY thing that moves a pipeline piece forward (no tap-to-advance).
  // When one is left on a pipeline action, send it + the funnel + current stage to the
  // Messages API and let Claude decide the piece's new stage, inline at finish().
  const saveKey = () => { store.set("tlx_apiKey", apiKey.trim()); setKeyOpen(false); setMsg(apiKey.trim() ? "key saved" : "key cleared"); setTimeout(() => setMsg(""), 1500); };
  const clearKey = () => { store.set("tlx_apiKey", ""); setApiKey(""); setMsg("key cleared"); setTimeout(() => setMsg(""), 1500); };

  const advanceViaClaude = async (key, text) => {
    const act = current.activity, action = current.action;
    const stages = act.stages || [];
    const last = stages.length - 1;
    const piece = action.pieceId ? (act.items || []).find((it) => it.id === action.pieceId) : null;
    const ctx = action.fresh
      ? `Une pièce FRAÎCHE vient d'être lancée (pas encore de nom). Le pas proposé était : "${action.text}".`
      : `Pièce existante : « ${piece ? piece.text : "?"} », à l'étape ${action.pieceStage} (${(stages[action.pieceStage] || {}).text || "?"}).`;
    // named after the activity itself, not hardcoded to erasure — this same function
    // drives every pipeline (piano, cover, parfum-création…), not just poems.
    const prompt = `Tu suis l'avancement d'une pièce dans un funnel « ${act.name} » (domaine : ${act.domain}).
Étapes du funnel (index: nom) :
${stages.map((s, i) => `${i}: ${s.text}`).join("\n")}

${ctx}

Commentaire laissé après la session :
« ${text} »

Détermine où en est la pièce APRÈS cette session. new_stage = index (0 à ${last}) de l'étape courante : si une étape vient d'être finie, avance à la suivante, sinon garde l'étape. piece_name = nom court (existant, ou tiré du commentaire si fraîche). progressed = true si cette session a fait avancer concrètement la pièce (même sans changer d'étape — un chunk appris, une itération réelle), false si elle n'a rien fait gagner (rejoué sans progrès, session avortée, bloqué). note = une ligne qui distille ce qui a été fait.`;
    setSyncing(true); setSyncMsg("lecture du commentaire…");
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: { piece_name: { type: "string" }, new_stage: { type: "integer" }, progressed: { type: "boolean" }, note: { type: "string" } },
        required: ["piece_name", "new_stage", "progressed", "note"],
        additionalProperties: false,
      });
      const ns = Math.max(0, Math.min(last, parseInt(out.new_stage)));
      const aid = act.id;
      const pieceName = out.piece_name || (piece ? piece.text : "(sans nom)");
      // reaching the last stage this session (not already there) graduates the piece
      // into another activity's items[] — e.g. a mastered Piano piece joins Répertoire.
      // The comment is what drives it, same as everything else in the funnel.
      const prevStage = action.fresh ? 0 : (piece ? piece.stage : 0);
      // the piece reached the funnel's last stage THIS session — the one thing that
      // counts as a real completion (e.g. a_erasure.requireFinish uses this to gate
      // its weekly target on a finished poem, not just any session touching a piece).
      const justFinished = ns === last && prevStage < last;
      const justGraduated = act.graduatesTo && justFinished;
      setActivities((arr) => arr.map((a) => {
        if (a.id === aid) {
          let items = a.items || [];
          if (action.fresh) items = [...items, { id: uid(), text: pieceName, stage: ns }];
          else if (action.pieceId) items = items.map((it) => (it.id === action.pieceId ? { ...it, stage: ns } : it));
          return { ...a, items };
        }
        if (justGraduated && a.id === act.graduatesTo) {
          return { ...a, items: [...(a.items || []), { id: uid(), text: pieceName, status: "doing" }] };
        }
        return a;
      }));
      // progressed = real forward movement this session, independent of a full stage
      // transition (e.g. a_piano.requireProgress gates its weekly target on this —
      // touching the piece isn't enough, but finishing the whole piece is too rare
      // a bar for a weekly cadence).
      if (doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text, claudeNote: out.note, finished: justFinished, progressed: !!out.progressed } : en)));
      setSyncMsg(`« ${out.piece_name} » → ${(stages[ns] || {}).text || "?"}`);
    } catch (err) {
      setSyncMsg("lecture impossible (" + (err.message || "erreur") + ") — commentaire gardé");
    } finally {
      setSyncing(false);
      setTimeout(() => { setSyncMsg(""); setComment(""); resetFlow(); }, 2400);
    }
  };

  // ----- practice / recommandeur: the comment feeds the activity's living `note` -----
  // practice → coaching memory accumulates (patterns, adjustments, observations).
  // recommandeur → the taste profile is refined for the next recommendation. Claude
  // rewrites the whole note integrating this session, and distils a one-line log note.
  const coachViaClaude = async (key, text) => {
    const act = current.activity;
    const reco = act.kind === "recommandeur";
    const role = reco
      ? `Le champ « note » de cette activité est un PROFIL DE GOÛTS qui sert à recommander le prochain item — quelque chose qui élargit le champ des possibles.`
      : `Le champ « note » de cette activité est une MÉMOIRE DE COACHING : patterns, ajustements, observations utiles pour les prochaines sessions.`;
    const prompt = `Activité : « ${act.name} » (type: ${act.kind}, domaine: ${act.domain}).
Action faite : « ${current.action.text} ».
${role}

Note actuelle :
"""
${act.note || "(vide)"}
"""

Commentaire laissé après cette session :
« ${text} »

Réécris la note en y intégrant ce qu'apporte ce commentaire — garde ce qui reste pertinent, condense, n'efface pas l'historique utile. ${reco ? "Affûte le profil pour mieux recommander la prochaine fois." : "Garde une mémoire de coaching actionnable."} updated_note = la note complète réécrite (concise). log_note = une ligne qui distille cette session.`;
    setSyncing(true); setSyncMsg("lecture du commentaire…");
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: { updated_note: { type: "string" }, log_note: { type: "string" } },
        required: ["updated_note", "log_note"],
        additionalProperties: false,
      });
      const aid = act.id;
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, note: out.updated_note } : a)));
      if (doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text, claudeNote: out.log_note } : en)));
      setSyncMsg(reco ? "profil affiné ✓" : "note coach mise à jour ✓");
    } catch (err) {
      setSyncMsg("lecture impossible (" + (err.message || "erreur") + ") — commentaire gardé");
    } finally {
      setSyncing(false);
      setTimeout(() => { setSyncMsg(""); setComment(""); resetFlow(); }, 2400);
    }
  };

  const submitComment = async () => {
    const text = comment.trim();
    const parsedManual = manualMin.trim() ? parseInt(manualMin) : null;
    const existing = log.find((en) => en.id === doneEntryId);
    const finalMin = parsedManual > 0 ? parsedManual : existing?.min;
    if (doneEntryId) {
      setLog((L) => L.map((en) => {
        if (en.id !== doneEntryId) return en;
        const patch = {};
        if (parsedManual > 0) { patch.min = parsedManual; patch.sec = parsedManual * 60; }
        if (text) patch.note = text;
        return { ...en, ...patch };
      }));
    }
    if (SIM && finalMin) simAdvanceMinutes(finalMin);
    const kind = current && current.activity.kind;
    // every commented session reaches Claude — pipeline advances the piece, practice
    // and recommandeur grow the note. tasks just keep the comment locally.
    const wantsClaude = !!text && (kind === "pipeline" || kind === "practice" || kind === "recommandeur");
    if (wantsClaude) {
      const key = (await store.get("tlx_apiKey")) || "";
      if (key) { (kind === "pipeline" ? advanceViaClaude : coachViaClaude)(key, text); return; }
      setSyncMsg(kind === "pipeline" ? "pas de clé API — commentaire gardé, pièce non avancée" : "pas de clé API — commentaire gardé, note non mise à jour");
      setTimeout(() => { setSyncMsg(""); setComment(""); resetFlow(); }, 2200);
      return;
    }
    setComment(""); resetFlow();
  };

  // section navigation — no tab bar; swipe left/right or tap the faint edge arrows.
  const TABS = SIM ? ["now", "liste", "simulateur", "activities", "progress"] : ["now", "activities", "progress"];
  const go = (dir) => {
    const i = TABS.indexOf(tab);
    const ni = Math.min(TABS.length - 1, Math.max(0, i + dir));
    if (ni === i) return;
    const t = TABS[ni]; setTab(t); if (t === "now") resetFlow();
  };
  const touchRef = useRef(null);
  const onTouchStart = (e) => { const t = e.touches[0]; touchRef.current = { x: t.clientX, y: t.clientY }; };
  const onTouchEnd = (e) => {
    const s = touchRef.current; touchRef.current = null; if (!s) return;
    const t = e.changedTouches[0]; const dx = t.clientX - s.x, dy = t.clientY - s.y;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
  };

  // tap to begin — for timed activities the line pre-fills with already-done minutes this period
  const begin = () => {
    let preMs = 0;
    if (current?.activity?.timed) {
      const done = minutesInPeriod(log, current.activity.id, null, current.activity.period || "day");
      preMs = Math.min(done, current.activity.target || 30) * 60000;
    }
    setStartedAt(Date.now() - preMs);
    setElapsedMs(preMs);
    setManualMin("");
    setPaused(false);
    setRunning(true); setStage("running");
  };

  // tap "done" — log real time (or manual override), trigger vaisselle if cooking done
  const finish = () => {
    if (!current) { resetFlow(); return; }
    const realSec = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
    const minLogged = Math.max(1, Math.round(realSec / 60));
    const aid = current.activity.id;
    setLastId(aid);
    const e = {
      id: uid(), date: todayKey(), ts: Date.now(), type: "done",
      activityId: aid, actionId: current.action.id, actionText: current.action.text,
      min: minLogged, sec: minLogged * 60, domain: current.activity.domain, note: "",
      ...(current.action.itemId ? { itemId: current.action.itemId } : {}),
    };
    if (current.activity.kind === "task") {
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, done: true } : a)));
    }
    setDoneEntryId(e.id);
    setLog((L) => [...L, e]);
    setRunning(false); setShowWhy(false);
    setComment(""); setManualMin("");
    setStage("done");
  };

  // ----- the line is the whole control surface: short tap acts, long hold retracts & re-picks -----
  const tapAction = () => {
    if (stage === "entry" || stage === "done") start();
    else if (stage === "proposal") begin();
    else if (stage === "running" && !paused) finish(); // resume before finishing — paused time shouldn't count
  };
  const canHold = stage === "proposal"; // skip is only useful before you've started — once running, finish or pause
  const effHold = holdDate === todayKey() ? holdMs : BASE_HOLD_MS; // ignore a stale day if left open past midnight
  const onLineDown = () => {
    didHold.current = false;
    if (!canHold) return;
    holdStart.current = Date.now();
    setHolding(true); // the line begins retracting toward the centre over the full hold time
    holdTimer.current = setTimeout(() => {
      didHold.current = true; holdTimer.current = null;
      setHolding(false); swap(); // fully retracted → a different thing
    }, effHold);
  };
  const cancelHold = () => { if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current = null; } setHolding(false); };
  const onLineUp = () => {
    const heldFor = holdStart.current ? Date.now() - holdStart.current : 0;
    cancelHold();
    if (didHold.current) { didHold.current = false; return; } // swap already fired
    if (canHold && heldFor >= 300) { holdStart.current = 0; return; } // aborted hold — spring back, no action
    holdStart.current = 0;
    tapAction();
  };
  const onLineCancel = () => { cancelHold(); didHold.current = false; holdStart.current = 0; };

  // ----- activity mutations -----
  const upd = (id, patch) => setActivities((arr) => arr.map((a) => (a.id === id ? { ...a, ...patch } : a)));
  const addActivity = () =>
    setActivities((arr) => [...arr, { id: uid(), name: "", domain: "creative", where: "home", target: 1, period: "week", kind: "practice", deadline: null, done: false, capMin: 0, capWeek: 0, actions: [{ id: uid(), text: "", min: 15 }], items: [], stages: [], note: "" }]);
  const delActivity = (id) => setActivities((arr) => arr.filter((a) => a.id !== id));
  const addAction = (id) => upd(id, { actions: [...activities.find((a) => a.id === id).actions, { id: uid(), text: "", min: 15 }] });
  const editAction = (id, aid, patch) => upd(id, { actions: activities.find((a) => a.id === id).actions.map((ac) => (ac.id === aid ? { ...ac, ...patch } : ac)) });
  const delAction = (id, aid) => upd(id, { actions: activities.find((a) => a.id === id).actions.filter((ac) => ac.id !== aid) });
  const addStage = (id) => upd(id, { stages: [...(activities.find((a) => a.id === id).stages || []), { id: uid(), text: "" }] });
  const editStage = (id, sid, patch) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).map((s) => (s.id === sid ? { ...s, ...patch } : s)) });
  const delStage = (id, sid) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).filter((s) => s.id !== sid) });
  const moveStage = (id, sid, dir) => upd(id, { stages: (() => {
    const arr = [...(activities.find((a) => a.id === id).stages || [])];
    const i = arr.findIndex((s) => s.id === sid), j = i + dir;
    if (i < 0 || j < 0 || j >= arr.length) return arr;
    [arr[i], arr[j]] = [arr[j], arr[i]]; return arr;
  })() });
  const addItem = (id, text) => {
    if (!text.trim()) return;
    const a = activities.find((x) => x.id === id);
    // pipeline pieces enter at the first stage; balance/task items keep the todo/doing/done model
    const piece = a && a.kind === "pipeline" ? { id: uid(), text, stage: 0 } : { id: uid(), text, status: "doing" };
    upd(id, { items: [...a.items, piece] });
  };
  const cycleItem = (id, iid) => {
    const a = activities.find((x) => x.id === id);
    if (a && a.kind === "pipeline") {
      // a pipeline piece advances through the funnel stages, not todo/doing/done.
      // Tapping here is for setup/correction in the editor — in the live flow, Claude
      // advances the stage from the after-session comment (no manual tapping there).
      const n = (a.stages || []).length || 1;
      upd(id, { items: a.items.map((it) => (it.id === iid ? { ...it, stage: (((it.stage ?? 0) + 1) % n) } : it)) });
      return;
    }
    const order = ["todo", "doing", "done"];
    let justMastered = false;
    let items = a.items.map((it) => {
      if (it.id !== iid) return it;
      const next = order[(order.indexOf(it.status) + 1) % 3];
      if (next === "done") justMastered = true;
      return { ...it, status: next };
    });
    // mastering an item frees a rotation slot — pull the next item from the todo
    // reserve into doing so the rotation size stays constant (e.g. Chant micro's
    // ~10-song rotation backed by a todo reserve).
    if (justMastered) {
      const idx = items.findIndex((it) => it.status === "todo");
      if (idx !== -1) items = items.map((it, i) => (i === idx ? { ...it, status: "doing" } : it));
    }
    upd(id, { items });
  };
  const delItem = (id, iid) => upd(id, { items: activities.find((a) => a.id === id).items.filter((it) => it.id !== iid) });
  const quickLog = (a) => {
    const ac = a.actions[0] || { id: uid(), text: a.name, min: 15 };
    setLog((L) => [...L, { id: uid(), date: todayKey(), ts: Date.now(), activityId: a.id, actionId: ac.id, actionText: ac.text, min: ac.min, domain: a.domain }]);
    setMsg(`logged: ${a.name}`); setTimeout(() => setMsg(""), 1500);
  };
  const delLog = (id) => setLog((L) => L.filter((e) => e.id !== id));

  // sandbox quick-complete: tick one checklist obligation. Same log shape as
  // finish(), but no timer flow — a tap (with optional minutes/comment) is enough.
  // Mirrors the real side-effects: task→done, and (sim-only, API-free) advancing
  // the pipeline funnel one stage so the drain is visible. Vaisselle no longer
  // needs a side-effect here — it's derived straight from the log.
  const simComplete = (row, min, note) => {
    const a = row.activity, action = row.action;
    const m = parseInt(min) || a.dur || (action && action.min) || 15;
    const e = {
      id: uid(), date: todayKey(), ts: Date.now(), type: "done",
      activityId: a.id, actionId: action ? action.id : (a.actions[0] ? a.actions[0].id : null),
      actionText: action ? action.text : (a.actions[0] ? a.actions[0].text : a.name),
      min: m, sec: m * 60, domain: a.domain, note: (note || "").trim(),
      ...(action && action.itemId ? { itemId: action.itemId } : {}),
    };
    if (a.kind === "task") setActivities((arr) => arr.map((x) => (x.id === a.id ? { ...x, done: true } : x)));
    if (a.kind === "pipeline") {
      // advance the most-live piece one stage, or start a fresh one — so the funnel moves
      setActivities((arr) => arr.map((x) => {
        if (x.id !== a.id) return x;
        const last = (x.stages || []).length - 1;
        const pieces = (x.items || []).filter((it) => typeof it.stage === "number");
        const live = pieces.filter((p) => p.stage < last).sort((u, v) => v.stage - u.stage);
        if (live.length) return { ...x, items: x.items.map((it) => (it.id === live[0].id ? { ...it, stage: it.stage + 1 } : it)) };
        return { ...x, items: [...(x.items || []), { id: uid(), text: e.note || "pièce " + (pieces.length + 1), stage: 0 }] };
      }));
    }
    setLog((L) => [...L, e]);
    setSimEdit(null); setSimMin(""); setSimNote("");
    simAdvanceMinutes(m); // the session took m minutes — the sim clock lives it
    setMsg(`✓ ${a.name} (+${m}m)`); setTimeout(() => setMsg(""), 1200);
  };
  // SIM-only week driver — plays the sandbox forward the way a human would, using
  // the REAL shipped engine (pick, the proportional lottery) on deep copies of the
  // live state, so the numbers come from the engine that ships, not a
  // re-implementation. Time is NEVER a constraint here (corrected 09/07 — an
  // earlier version capped a work-night's home block at 60min then 4h of shift,
  // which made 15 draws/day look like it "didn't fit" some nights; Maxence has
  // ~10h free both at work and at home, so that ceiling was fiction). The ONLY
  // thing that bounds a simulated day is drawsPerDay — the click count. A work
  // day is 100% work-context, a free day 100% home-context (corrected again
  // 09/07 — no more splitting one day into a home slice then a work slice:
  // Maxence only engages the app at work on days he works, full stop).
  // Pipelines are logged like any other activity here — no finished/progressed
  // completion-rate tracking (removed 09/07: the point is session rate, advancing,
  // not hitting a "poems finished/week" objective).
  const simWeek = ({ days = 7, drawsPerDay = 13 } = {}) => {
    const acts = JSON.parse(JSON.stringify(activities));
    const logArr = JSON.parse(JSON.stringify(log));
    const savedDebug = _debugDate;

    const runBlock = (cur, startHour, maxDraws = Infinity, place) => {
      const dayKey = keyOf(cur); // the simulated day, fixed — never drifts even if `now` crosses midnight
      let now = new Date(cur); now.setHours(startHour, 0, 0, 0);
      let guard = 0, draws = 0;
      while (draws < maxDraws && guard++ < 400) {
        // gate clock: same hour/minute as `now` (meal-time / dry-time gates need the
        // real hour), but the DATE stays pinned to dayKey. Without this, enough idle
        // 30min hops (or a long run of draws) push `now` past midnight while dayKey
        // stays put — todayKey() would then read the NEXT day and the day-cap gate
        // resets mid-block, letting a day-period row (e.g. Livre) log more than once
        // under the SAME dayKey. Found 10/07 verifying the week-cap fix.
        _debugDate = fromKey(dayKey);
        _debugDate.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
        const pl = place; // forced, not derived from the clock — a work day is 100% work-context, a free day 100% home
        const p = pick(acts, logArr, pl, {});
        if (!p) { now = new Date(now.getTime() + 30 * 60000); continue; } // nothing owed → idle 30min
        const a = acts.find((x) => x.id === p.activity.id);
        const action = p.action;
        const m = a.dur || (action && (action.dur || action.min)) || 15;
        const e = {
          id: uid(), date: dayKey, ts: now.getTime(), type: "done",
          activityId: a.id, actionId: action ? action.id : (a.actions[0] ? a.actions[0].id : null),
          actionText: action ? action.text : (a.actions[0] ? a.actions[0].text : a.name),
          min: m, sec: m * 60, domain: a.domain, note: "",
          ...(action && action.itemId ? { itemId: action.itemId } : {}),
        };
        logArr.push(e);
        draws += 1;
        now = new Date(now.getTime() + m * 60000);
      }
      return draws;
    };

    let day = _debugDate ? new Date(_debugDate) : new Date();
    day.setHours(0, 0, 0, 0);
    for (let d = 0; d < days; d++) {
      const cur = new Date(day); cur.setDate(cur.getDate() + d);
      const dayCap = drawsPerDay > 0 ? drawsPerDay : 13; // clicks are the only budget for a simulated day
      const workEve = isWorkShift(new Date(cur.getFullYear(), cur.getMonth(), cur.getDate(), 21, 0, 0));
      if (workEve) {
        runBlock(cur, 20, dayCap, "work");                 // work day: 100% work-context, no home block
      } else {
        runBlock(cur, 10, dayCap, "home");                 // free day: 100% home-context
      }
    }
    _debugDate = savedDebug; setClock((c) => c + 1);
    return { app: "throughline", version: 4, days,
      exportedAt: new Date().toISOString(), activities: acts, log: logArr };
  };

  const simReseed = async () => {
    try {
      const r = await fetch("throughline-catalogue.json", { cache: "no-store" });
      const c = await r.json();
      if (Array.isArray(c.activities)) { setActivities(c.activities); setLog([]); setMsg("catalogue rechargé — sandbox vidé"); }
    } catch { setMsg("throughline-catalogue.json introuvable"); }
    setTimeout(() => setMsg(""), 1800);
  };

  // SIM-only: run simWeek and aggregate into a visible, re-runnable result. Same
  // params every time so results are comparable: N days, ~tirages draws/day,
  // averaged over 5 runs. Sessions/week only — no completion-rate stat (removed
  // 09/07, kept as a possible future idea, not a current goal: avancer > objectifs
  // clairs). Rows split per-action for activities whose cadence lives on the
  // action (own target), so the simulateur tab can edit the real lever either way
  // (added 09/07 — was showing an un-editable "par action" placeholder before).
  const runSimViz = () => {
    const RUNS = 5, DAYS = Math.max(1, simCfg.jours), WEEKS = DAYS / 7;
    const opts = { days: DAYS, drawsPerDay: Math.max(1, simCfg.tirages) };
    const acc = {}, names = {}, labels = {};
    let tot = 0; const drawsDays = [];
    for (let r = 0; r < RUNS; r++) {
      const exp = simWeek(opts);
      (exp.activities || []).forEach((a) => { names[a.id] = a.name; });
      const lg = exp.log.filter((e) => e.type !== "skip");
      tot += lg.length;
      const byDay = {}; lg.forEach((e) => { byDay[e.date] = (byDay[e.date] || 0) + 1; });
      Object.values(byDay).forEach((v) => drawsDays.push(v));
      lg.forEach((e) => {
        // group by activity, unless the LIVE catalogue gives this activity's
        // actions their own target — then group by action, so the sub-cadences
        // that actually drive the draw can each get their own editable row
        const act = activities.find((x) => x.id === e.activityId);
        const ownTarget = act && act.actions.some((x) => typeof x.target === "number");
        const key = ownTarget ? `${e.activityId}:${e.actionId}` : e.activityId;
        acc[key] = (acc[key] || 0) + 1;
        if (!labels[key]) {
          labels[key] = {
            activityId: e.activityId, actionId: ownTarget ? e.actionId : null,
            name: ownTarget ? `${names[e.activityId] || e.activityId} — ${e.actionText}` : (names[e.activityId] || e.activityId),
          };
        }
      });
    }
    const rows = Object.keys(acc).map((key) => ({ key, ...labels[key], spw: acc[key] / RUNS / WEEKS })).sort((a, b) => b.spw - a.spw);
    const avgDraws = drawsDays.reduce((s, x) => s + x, 0) / Math.max(drawsDays.length, 1);
    setSimRes({
      drawsPerDay: +avgDraws.toFixed(1), totalPerWeek: +(tot / RUNS / WEEKS).toFixed(0), rows,
    });
  };

  // ----- data -----
  const exportObj = () => ({ app: "throughline", version: 4, exportedAt: new Date().toISOString(), savedOn: fmtLong(todayKey()), activities, log });
  const exportText = () => JSON.stringify(exportObj(), null, 2);
  const download = () => {
    const blob = new Blob([exportText()], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `throughline-${stampKey()}.json`; a.click(); URL.revokeObjectURL(url);
    setMsg("file downloaded"); setTimeout(() => setMsg(""), 1800);
  };
  const copy = async () => { try { await navigator.clipboard.writeText(exportText()); setMsg("copied to clipboard"); } catch { setMsg("copy failed — use the file"); } setTimeout(() => setMsg(""), 1800); };
  // Best on phones: hand the backup file to the OS share sheet (Drive, email,
  // Keep…). Falls back to a plain download where sharing files isn't supported.
  const shareBackup = async () => {
    // Share as .txt / text/plain: .json is NOT on Chrome's Web Share allowlist,
    // so canShare({files}) returns false for it and we'd silently fall to download
    // (no destination prompt). The body is still JSON; load parses by content.
    const fname = `throughline-${stampKey()}.txt`;
    try {
      const file = new File([exportText()], fname, { type: "text/plain" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "throughline backup" });
        setMsg("shared ✓"); setTimeout(() => setMsg(""), 1800); return;
      }
    } catch (e) { if (e && e.name === "AbortError") return; }
    download();
  };
  const applyImport = (text) => {
    try {
      const o = JSON.parse(text);
      if (!o.activities) throw new Error("no activities");
      setActivities(o.activities); setLog(o.log || []);
      setMsg("loaded ✓"); setTab("now"); setStage("entry"); setPasteVal("");
    } catch { setMsg("couldn't read that — check the file/text"); }
    setTimeout(() => setMsg(""), 2200);
  };
  const onFile = (ev) => { const f = ev.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = () => applyImport(String(r.result)); r.readAsText(f); ev.target.value = ""; };
  const resetAll = () => { if (typeof window !== "undefined" && !window.confirm("Wipe all activities and history?")) return; setActivities(SEED); setLog([]); setMsg("reset to defaults"); setTimeout(() => setMsg(""), 1800); };

  // sandbox test harness — call window.__tlx.* from devtools/preview_eval instead of
  // simulating pointer events on the DOM. Runs every render so closures stay fresh.
  useEffect(() => {
    if (!SIM) return;
    window.__tlx = {
      stage, tab, current, activities, log, holdMs, holdDate, place,
      begin, finish, tapAction, submitComment, start, resetFlow,
      setManualMin, setComment, setTab, applyDebugTime, simWeek, simReseed,
      setLog, setActivities,
      debugNow: () => (_debugDate || new Date()).toString(),
    };
  });

  if (loading) return (
    <div className="tl"><style dangerouslySetInnerHTML={{ __html: css }} /><div className="grain" /><div className="wrap"><span className="lab">loading…</span></div></div>
  );

  // live line geometry. For timed activities: fills toward the period target (e.g. 30 min/day).
  // For binary: fills toward dur (session feel). >1 = went beyond — tant mieux.
  const actDurMin = current?.activity?.timed
    ? (current.activity.target || 30)
    : (current?.action?.dur || current?.activity?.dur || current?.action?.min || 15);
  const fullMs = Math.max(1, actDurMin * 60000);
  const frac = (stage === "running" || stage === "done") ? elapsedMs / fullMs : 0;

  return (
    <div className="tl">
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="grain" />
      <div className="wrap" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

        {/* sandbox banner — makes it impossible to confuse the clone with the real app */}
        {SIM && (
          <div className="mono" style={{ textAlign: "center", fontSize: 9.5, letterSpacing: ".14em", textTransform: "uppercase",
            color: C.bg, background: C.bone, padding: "5px 10px", margin: "-8px -20px 14px", }}>
            bac à sable · données de test isolées · {_debugDate ? fmtLong(todayKey()) + " · " + fmtHM(_debugDate) + " · " + computePlace() : "temps réel"}
          </div>
        )}

        {/* the only chrome: two faint arrows. swipe left/right works too. */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", height: 22 }}>
          <button className="navarr" style={{ visibility: tab === TABS[0] ? "hidden" : "visible" }} onClick={() => go(-1)} aria-label="previous">‹</button>
          <button className="navarr" style={{ visibility: tab === TABS[TABS.length - 1] ? "hidden" : "visible" }} onClick={() => go(1)} aria-label="next">›</button>
        </div>

        {/* =================== NOW =================== */}
        {tab === "now" && (
          <div style={{ display: "flex", flexDirection: "column", minHeight: "calc(100vh - 150px)" }}>

            {/* the stage: instruction above, the living line as hero, controls below — vertically centered */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: 30 }}>

              {/* ---------- above the line: the instruction ---------- */}
              <div style={{ minHeight: 130, display: "flex", flexDirection: "column", justifyContent: "flex-end", textAlign: "center", marginBottom: 30 }}>

                {(stage === "proposal" || stage === "running" || stage === "done") && current && (
                  <div className="fade">
                    <div className="mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint, marginBottom: 18 }}>
                      <span className="dot" style={{ background: dColor(current.activity.domain), display: "inline-block", marginRight: 10, verticalAlign: "middle" }} />{current.activity.name}
                    </div>
                    <div style={{ fontFamily: "var(--mono)", fontSize: 13, fontWeight: 400, lineHeight: 1.55, letterSpacing: ".02em", textTransform: "lowercase", color: stage === "done" ? C.mut : C.text }}>
                      {generating ? <span className="breathe" style={{ color: C.faint, letterSpacing: ".22em" }}>…</span> : current.action.text}
                    </div>
                  </div>
                )}

                {stage === "empty" && (
                  <div className="fade" style={{ fontFamily: "var(--serif)", fontSize: 20, fontWeight: 300, fontStyle: "italic", color: C.mut, lineHeight: 1.45 }}>
                    Nothing left to draw for {place} right now.
                  </div>
                )}
              </div>

              {/* ---------- the living line: hollow track, fills from the centre while you act, ---------- */}
              {/* ---------- spills past the margins when you go beyond the estimate ---------- */}
              {(() => {
                const over = frac > 1;
                const widthPct = Math.min(frac, 1.85) * 100;
                // the line carries the whole loop. short tap acts; long hold retracts & re-picks.
                // the hollow track stays inset from the screen edges so the fill can visibly
                // overshoot it — that overshoot is the felt dépassement.
                const trackTransition = holding ? `transform ${effHold}ms linear` : "transform .3s cubic-bezier(.2,.7,.2,1)";
                const fillColor = current ? dColor(current.activity.domain) : C.bone; // the line carries the activity's colour
                return (
                  <div onPointerDown={onLineDown} onPointerUp={onLineUp} onPointerLeave={onLineCancel} onPointerCancel={onLineCancel}
                    onContextMenu={(e) => e.preventDefault()}
                    style={{ position: "relative", height: 44, width: "82%", margin: "0 auto",
                      display: "flex", justifyContent: "center", alignItems: "center",
                      overflow: "visible", cursor: "pointer", touchAction: "manipulation", userSelect: "none", WebkitUserSelect: "none" }}>
                    {/* hollow track — inset, never touches the edges */}
                    <div className={stage === "entry" && !holding ? "breathe" : ""}
                      style={{ position: "absolute", left: 0, right: 0, top: "50%", height: 2, background: stage === "entry" ? C.bone : C.soft,
                        transform: `translateY(-50%) scaleX(${holding ? 0 : 1})`, transformOrigin: "center", transition: trackTransition }} />
                    {/* centre fill — grows symmetrically from the middle, overshoots the track when you go beyond */}
                    {frac > 0 && (
                      <div style={{ position: "relative", flexShrink: 0, height: over ? 8 : 6, width: `${widthPct}%`,
                        background: fillColor, opacity: over ? 1 : 0.9,
                        boxShadow: over ? `0 0 14px ${fillColor}` : "none",
                        transform: `scaleX(${holding ? 0 : 1})`, transformOrigin: "center",
                        transition: holding ? `transform ${effHold}ms linear` : "width .25s linear, height .35s, box-shadow .35s, transform .3s" }} />
                    )}
                  </div>
                );
              })()}

              {/* ---------- below the line: controls ---------- */}
              <div style={{ minHeight: 130, marginTop: 30, textAlign: "center" }}>

                {/* entry: nothing. just the breathing line above. */}

                {/* proposal: nothing under the line, except in the sandbox — testing wants
                    to reroll fast without the hold gesture, just to see what comes up. */}
                {SIM && stage === "proposal" && (
                  <div className="fade">
                    <button className="link" onClick={swap}>skip (test)</button>
                  </div>
                )}

                {/* running: a quiet pause, for when something outside interrupts the session
                    (a call, someone at the door) — not for skipping, just for stopping the clock. */}
                {stage === "running" && (
                  <div className="fade">
                    <button className="link" onClick={togglePause}>{paused ? "reprendre" : "pause"}</button>
                  </div>
                )}

                {stage === "empty" && (
                  <div className="fade">
                    <button className="link" onClick={resetFlow}>i'm done</button>
                  </div>
                )}

                {stage === "done" && (
                  <div className="fade">
                    {(syncing || syncMsg) ? (
                      <div className="mono" style={{ fontSize: 11, color: C.bone, letterSpacing: ".06em", lineHeight: 1.6 }}>{syncMsg || "…"}</div>
                    ) : (
                      <>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 18 }}>
                          <span className="mono" style={{ fontSize: 10, color: C.faint, letterSpacing: ".1em" }}>temps réel :</span>
                          {SIM ? (
                            // sandbox only — testing needs to fake a duration without waiting it out.
                            // placeholder (not a forced value) so the field can actually go empty while typing.
                            <input
                              type="number" min="1" className="in mono"
                              value={manualMin}
                              placeholder={String(Math.max(1, Math.round((Date.now() - startedAt) / 60000)))}
                              onChange={(e) => setManualMin(e.target.value)}
                              style={{ width: 44, fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, color: C.mut }}
                            />
                          ) : (
                            // real app: time is whatever actually elapsed, never hand-typed
                            <span className="mono" style={{ fontSize: 12, color: C.mut }}>
                              {Math.max(1, Math.round((Date.now() - startedAt) / 60000))}
                            </span>
                          )}
                          <span className="mono" style={{ fontSize: 10, color: C.faint }}>min</span>
                        </div>
                        <input className="in" value={comment} placeholder="un mot sur cette session ?"
                          onChange={(e) => setComment(e.target.value)}
                          onKeyDown={(e) => { if (e.key === "Enter") submitComment(); }}
                          style={{ fontSize: 14, textAlign: "center", maxWidth: 360, margin: "0 auto", display: "block", borderBottom: `1px solid ${C.line}`, paddingBottom: 8, fontStyle: comment ? "normal" : "italic", color: comment ? C.text : C.faint }} />
                        <button className="link" style={{ marginTop: 18 }} onClick={submitComment}>{comment.trim() ? "valider" : "passer"}</button>
                        {current && (() => {
                          const k = current.activity.kind;
                          const hint = k === "pipeline" ? "ton mot fait avancer la pièce dans le funnel"
                            : k === "recommandeur" ? "ton mot affine le profil pour la prochaine reco"
                            : k === "practice" ? "ton mot nourrit la mémoire de l'activité"
                            : null;
                          return hint ? <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 14, letterSpacing: ".06em" }}>{hint}</div> : null;
                        })()}
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* =================== LISTE (sandbox verification view) =================== */}
        {tab === "liste" && SIM && (() => {
          const place = computePlace();
          const rows = buildHat(activities, log, place);
          const owed = rows.filter((r) => r.done < r.target);
          const daily = owed.filter((r) => r.period === "day");
          const weekly = owed.filter((r) => r.period === "week");
          const doneRows = rows.filter((r) => r.done >= r.target);
          const Row = (r) => {
            const remaining = r.target - r.done;
            const editing = simEdit === r.key;
            const editingParams = paramEdit === r.key;
            // own cadence at the action level wins (same rule as the Activities tab) —
            // edit there instead of the activity's shared target/period
            const ownTarget = r.action && typeof r.action.target === "number";
            return (
              <div key={r.key} style={{ borderBottom: `1px solid ${C.soft}`, padding: "9px 0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span className="dot" style={{ background: dColor(r.activity.domain), flex: "none" }} />
                  <span style={{ flex: 1, fontSize: 14, color: C.text }}>{r.label}</span>
                  {r.target > 1 && <span className="mono" style={{ fontSize: 10, color: C.faint }}>{r.done}/{r.target}</span>}
                  <button className="ghost" style={{ fontSize: 11 }}
                    onClick={() => setParamEdit(editingParams ? null : r.key)}>{editingParams ? "−" : "⚙"}</button>
                  <button className="seg" onClick={() => { if (editing) { setSimEdit(null); } else { setSimEdit(r.key); setSimMin(""); setSimNote(""); } }}>
                    {editing ? "×" : "fait" + (remaining > 1 ? ` (×${remaining})` : "")}
                  </button>
                </div>
                {editingParams && (
                  <div className="fade" style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10, marginTop: 10, paddingLeft: 18 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min="0" className="in mono"
                        value={ownTarget ? r.action.target : (r.activity.target ?? 1)}
                        onChange={(e) => {
                          const v = Math.max(0, parseFloat(e.target.value) || 0);
                          if (ownTarget) editAction(r.activity.id, r.action.id, { target: v });
                          else upd(r.activity.id, { target: v });
                        }}
                        style={{ width: 32, fontSize: 12, textAlign: "right", borderBottom: `1px solid ${C.line}`, color: C.text }} />
                      <div style={{ display: "flex", gap: 3 }}>
                        {["day", "week"].map((p) => (
                          <button key={p} className={`chip ${((ownTarget ? r.action.period : r.activity.period) || "week") === p ? "on" : ""}`}
                            onClick={() => ownTarget ? editAction(r.activity.id, r.action.id, { period: p }) : upd(r.activity.id, { period: p })}
                            style={{ fontSize: 10, padding: "2px 6px" }}>{p === "day" ? "/j" : "/sem"}</button>
                        ))}
                      </div>
                      {ownTarget && <span className="mono" style={{ fontSize: 9, color: C.faint, fontStyle: "italic" }}>(cette action)</span>}
                    </div>
                    <div style={{ display: "flex", gap: 3 }}>
                      {WHERES.map((w) => (
                        <button key={w} className={`chip ${r.activity.where === w ? "on" : ""}`}
                          onClick={() => upd(r.activity.id, { where: w })} style={{ fontSize: 10, padding: "2px 6px" }}>{w}</button>
                      ))}
                    </div>
                    <button className="link" style={{ color: C.line, fontSize: 10 }}
                      onClick={() => { if (window.confirm(`Supprimer "${r.activity.name}" ?`)) { delActivity(r.activity.id); setParamEdit(null); } }}>
                      supprimer l'activité
                    </button>
                  </div>
                )}
                {editing && (
                  <div className="fade" style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, paddingLeft: 18 }}>
                    <input type="number" min="1" placeholder="min" value={simMin} onChange={(e) => setSimMin(e.target.value)}
                      className="in mono" style={{ width: 46, fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, color: C.mut }} />
                    <input placeholder="un mot (avance le funnel / la mémoire)" value={simNote} onChange={(e) => setSimNote(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") simComplete(r, simMin, simNote); }}
                      className="in" style={{ flex: 1, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: C.text }} />
                    <button className="seg on" onClick={() => simComplete(r, simMin, simNote)}>valider</button>
                  </div>
                )}
              </div>
            );
          };
          return (
            <div style={{ marginTop: 20 }}>
              {/* the sim clock — where you are right now in the playthrough */}
              <div className="mono" style={{ textAlign: "center", fontSize: 13, color: C.bone, letterSpacing: ".06em", marginBottom: 4 }}>
                {_debugDate ? fmtLong(todayKey()) + " · " + fmtHM(_debugDate) : "temps réel (pas encore figé)"}
              </div>
              <div className="mono" style={{ textAlign: "center", fontSize: 9.5, color: C.faint, marginBottom: 14 }}>lieu : {place}</div>

              {/* pause — advance the clock without doing anything, to feel time between actions */}
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
