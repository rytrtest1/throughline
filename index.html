      // importing it used to silently wipe or reintroduce stale dated history into
      // a live session, producing debts (e.g. vaisselle) that looked like a bug but
      // were really old data leaking back in (Maxence 11/07).
      // But when the live log is empty (fresh session — e.g. recovering after a
      // lost session), a real backup file's log should come back too, or "load"
      // can never actually restore history (Maxence 13/07).
      setActivities(o.activities);
      if (log.length === 0 && Array.isArray(o.log) && o.log.length > 0) setLog(o.log);
      lastLoadDateRef.current = todayKey();
      store.set(NS("tlx_lastLoadDate"), todayKey());
      setMsg("loaded ✓"); setTab("now"); setStage("entry");
    } catch { setMsg("couldn't read that — check the file/text"); }
    setTimeout(() => setMsg(""), 2200);
  };
  const onFile = (ev) => {
    const f = ev.target.files?.[0]; if (!f) return;
    if (lastLoadDateRef.current === todayKey()) {
      setMsg("déjà chargé aujourd'hui"); setTimeout(() => setMsg(""), 2200);
      ev.target.value = ""; return;
    }
    const r = new FileReader(); r.onload = () => applyImport(String(r.result)); r.readAsText(f); ev.target.value = "";
  };
  const resetAll = () => {
    if (typeof window !== "undefined" && !window.confirm("Wipe all activities and history?")) return;
    // a real reset means real zero — a debug date left jumped ahead used to survive
    // this, so post-reset taps kept logging under a stale simulated clock, making
    // it look like old data hadn't actually gone away (Maxence 11/07).
    clockReal();
    setActivities(SEED); setLog([]);
    setStage("entry"); setCurrent(null); setLastId(null);
    setHoldMs(BASE_HOLD_MS); setHoldDate(todayKey());
    setSimRes(null);
    setMsg("reset to defaults"); setTimeout(() => setMsg(""), 1800);
  };

  // sandbox test harness — call window.__tlx.* from devtools/preview_eval instead of
  // simulating pointer events on the DOM. Runs every render so closures stay fresh.
  useEffect(() => {
    if (!SIM) return;
    window.__tlx = {
      stage, tab, current, activities, log, holdMs, holdDate, place,
      begin, finish, tapAction, submitComment, start, resetFlow,
      setManualMin, setComment, setTab, applyDebugTime, simReseed, runSimBatch,
      setLog, setActivities, setStage, setCurrent,
      albumTitles, albumIdx, setAlbumTitles, setAlbumIdx, advanceAlbumTitle,
      rating, setRating, setRatingFromPointer,
      reportIdx, reportPhase, setReportIdx, setReportPhase,
      reportExpanded, setReportExpanded, reportFillPct,
      traceIdx, setTraceIdx,
      gameQueue, gameIdx, startGame,
      debugNow: () => (_debugDate || new Date()).toString(),
    };
  });

  if (loading) return (
    <div className="tl" key="loading"><style dangerouslySetInnerHTML={{ __html: css }} /><div className="wrap"><span className="lab">loading…</span></div></div>
  );

  // interactive layout once playback has run through: "trace" (default, Maxence
  // 17/07 — "réfléchis mieux, creuse toi la tête") settles the day into ONE full
  // line, divided into its true proportional segments, dim/silent at rest — you
  // drag a finger across it to explore (name above, comment below), same
  // "the line is the whole control surface" language as the rest of the app,
  // rather than N separate tap targets. "grid" (same day, earlier design — one row
  // per activity stacked vertically) and "spotlight" (14/07 — swipe/dots single
  // focus) are both kept in the code as explicit rollbacks, nothing deleted; flip
  // this constant to bring either back.
  const REPORT_END_LAYOUT = "trace"; // "trace" | "grid" | "spotlight"

  // rapport screen: full takeover of "the line", same spirit as "empty" — no tab, no
  // chrome. Plays back the day's activities one at a time (name in the same spot the
  // "now" tab uses, line filling cumulatively as % of the day's total time — no
  // comments shown yet, silent until you can navigate), then hands over to the
  // REPORT_END_LAYOUT so any activity — and its full comment — can be revisited.
  // Closing goes back to the live line via resetFlow(), same door as everywhere else.
  if (stage === "game") {
    const cur = gameQueue[gameIdx];
    const onGameDown = (e) => onGamePaddleMove(e.clientX ?? (e.touches && e.touches[0].clientX));
    const onGameMove = (e) => onGamePaddleMove(e.clientX ?? (e.touches && e.touches[0].clientX));
    return (
      <div className="tl" key="game">
        <style dangerouslySetInnerHTML={{ __html: css }} />
        <div ref={gameAreaRef}
          onPointerDown={onGameDown} onPointerMove={onGameMove} onTouchStart={onGameDown} onTouchMove={onGameMove}
          onContextMenu={(e) => e.preventDefault()}
          style={{ position: "relative", width: "100%", height: "100vh", overflow: "hidden", touchAction: "none", userSelect: "none", WebkitUserSelect: "none" }}>
          {/* one target at a time, centre screen — never a grid (un doigt, une
              ligne, jamais de liste applies here too, Maxence 19/07). The outer
              div only centres and caps the wrap width; the inner span is what
              gets measured for the hitbox, so it hugs the text's real box exactly
              — including every wrapped line on a longer title, not just the first. */}
          {cur && (
            <div style={{ position: "absolute", top: "24%", left: 0, right: 0, textAlign: "center", padding: "0 14%" }}>
              <span ref={gameTargetElRef} key={cur.id} className="fade mono" style={{
                display: "inline-block", fontSize: 11, letterSpacing: ".08em", color: C.bone }}>
                {cur.text}
              </span>
            </div>
          )}
          {/* ball — sized and lit to match the line's own restraint, not a separate
              game-y object (Maxence 20/07: the old 14px + full-strength glow read
              as cheap against everything else here). */}
          <div ref={gameBallRef} style={{
            position: "absolute", top: 0, left: 0, width: BALL_PX, height: BALL_PX, borderRadius: "50%",
            background: C.bone, boxShadow: `0 0 5px rgba(214,207,191,0.55)` }} />
          {/* paddle — same thickness as the line everywhere else (2px), not its own
              scale (Maxence 20/07) */}
          <div ref={gamePaddleRef} style={{
            position: "absolute", top: "86%", width: "26%", height: 2, background: C.bone, opacity: 0.9 }} />
        </div>
      </div>
    );
  }

  if (stage === "report") {
    // real completions only (isClick) — a free-log "note" entry (submitFreeLog) isn't
    // an activity done, it shouldn't take a share of the line.
    const todayAll = log.filter((e) => e.date === todayKey() && isDone(e)).sort((a, b) => a.ts - b.ts);
    const todayLog = todayAll.filter(isClick);
    const totalMin = todayLog.reduce((s, e) => s + (e.min || 0), 0);

    // the day as one full line — no gaps for real elapsed time (a hole between two
    // sessions read as "not enough was done", per Maxence 14/07). Each activity's
    // share is relative to the day's total *active* minutes, always summing to 100%.
    let cum = 0;
    const segs = todayLog.map((e) => {
      const wPct = totalMin ? (e.min / totalMin) * 100 : 0;
      const leftPct = cum;
      cum += wPct;
      return { e, leftPct, wPct };
    });

    const n = segs.length;
    const playing = reportPhase === "playing";
    const idx = Math.min(reportIdx, Math.max(0, n - 1));
    const cur = segs[idx];

    const onReportTouchStart = (e) => { const t = e.touches[0]; reportTouchRef.current = { x: t.clientX, y: t.clientY }; };
    const onReportTouchEnd = (e) => {
      const s = reportTouchRef.current; reportTouchRef.current = null; if (!s || playing) return;
      const t = e.changedTouches[0]; const dx = t.clientX - s.x, dy = t.clientY - s.y;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        setReportIdx((i) => Math.min(n - 1, Math.max(0, i + (dx < 0 ? 1 : -1))));
      }
    };

    // grid rows: tap toggles that activity's comment open/closed — closed by default,
    // independent per row (several can be open at once).
    const toggleReportExpanded = (id) => setReportExpanded((prev) => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });

    // fixed-length comment text so the fixed-height box below the line (see render)
    // never has to grow — a long comment gets cut, never the line above it moved.
    const truncateNote = (s, max = 100) => (s.length > max ? s.slice(0, max - 1).trim() + "…" : s);

    // trace layout: which EQUAL slice sits under a dragged finger, resolved by
    // mapping clientX onto the line's own width (same idiom as setRatingFromPointer
    // above) then dividing evenly by activity count — not a proportional search,
    // since the trace line itself renders equal-width slices (see below).
    const traceSeg = REPORT_END_LAYOUT === "trace" && traceIdx != null ? segs[traceIdx] : null;
    const traceIndexFromX = (clientX) => {
      const el = traceRef.current;
      if (!el || clientX == null || !segs.length) return null;
      const rect = el.getBoundingClientRect();
      if (!rect.width) return null;
      const pct = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
      return Math.max(0, Math.min(segs.length - 1, Math.floor(pct / (100 / segs.length))));
    };
    const cancelReportHold = () => { if (reportHoldTimer.current) { clearTimeout(reportHoldTimer.current); reportHoldTimer.current = null; } setReportHolding(false); };
    const onTraceDown = (e) => {
      traceDraggingRef.current = true; setTraceIdx(traceIndexFromX(e.clientX));
      reportHoldStartX.current = e.clientX;
      setReportHolding(true);
      reportHoldTimer.current = setTimeout(() => { reportHoldTimer.current = null; setReportHolding(false); resetFlow(); }, REPORT_HOLD_MS);
    };
    const onTraceMove = (e) => {
      if (traceDraggingRef.current) setTraceIdx(traceIndexFromX(e.clientX));
      if (reportHoldTimer.current && e.clientX != null && Math.abs(e.clientX - reportHoldStartX.current) > 8) cancelReportHold();
    };
    const onTraceEnd = () => { traceDraggingRef.current = false; setTraceIdx(null); cancelReportHold(); };
    // unified "what's shown above/below the line right now" — during playback or
    // spotlight nav it's the idx-driven segment; in trace it's whatever's touched
    // (or nothing, at rest).
    const heroSeg = REPORT_END_LAYOUT === "trace" ? (playing ? cur : traceSeg) : cur;

    return (
      <div className="tl" key="report">
        <style dangerouslySetInnerHTML={{ __html: css }} />
        <div className="wrap" style={{ minHeight: "100vh", padding: "40px 20px", display: "flex", flexDirection: "column" }}
          onTouchStart={onReportTouchStart} onTouchEnd={onReportTouchEnd}>
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div className="mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint, marginBottom: 8 }}>
              rapport · {fmtLong(todayKey())}
            </div>
            <div className="mono" style={{ fontSize: 11, letterSpacing: ".05em", color: C.faint }}>
              {todayLog.length} clics · {totalMin} min
            </div>
          </div>

          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>

            {/* activity name — same spot/style as the "now" tab's hero label. During
                playback or spotlight nav it's idx-driven; in trace it's whatever's
                under the finger right now (nothing at rest — silent by design). Grid
                rows carry their own title instead, so this slot stays empty there. */}
            {(playing || REPORT_END_LAYOUT === "spotlight" || REPORT_END_LAYOUT === "trace") && (
              <div style={{ height: 24, overflow: "hidden", textAlign: "center", marginBottom: 24 }}>
                {heroSeg && (
                  <div key={`n-${heroSeg.e.id}`} className="fade mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint }}>
                    {heroSeg.e.actionText}
                  </div>
                )}
              </div>
            )}

            {/* the line — the exact same centre-out fill as the "now" screen (a flex
                child whose `width` is animated; justifyContent:"center" on the parent
                is what keeps it centred, no scaleX/offset trickery needed). While
                playing, `reportFillPct` (set in the effect above) climbs cumulatively
                as each activity plays — full only once the whole day has shown. */}
            {(playing || REPORT_END_LAYOUT === "spotlight") && (
              <div style={{ position: "relative", height: 44, width: "82%", margin: "0 auto",
                display: "flex", justifyContent: "center", alignItems: "center" }}>
                <div style={{ position: "absolute", left: 0, right: 0, top: "50%", height: 2, background: C.soft, transform: "translateY(-50%)" }} />
                {reportFillPct > 0 && (
                  <div style={{ position: "relative", flexShrink: 0, height: 2, width: `${reportFillPct}%`,
                    background: C.bone, opacity: 0.9, transition: "width .5s cubic-bezier(.2,.7,.2,1)" }} />
                )}
              </div>
            )}

            {/* trace layout (default, Maxence 17/07 — "creuse toi la tête") — the day
                settles into ONE full line, dim/silent and perfectly uniform at rest:
                same height and brightness end to end, no divider lines, no gaps —
                a single unbroken stroke, not a row of visibly separate pieces
                (Maxence: "rend la ligne uniforme... la séparation se voit juste avec
                la luminosité"). Each activity gets an EQUAL share of the line here
                (not its real % of the day, which the fill above already carries) —
                a deliberate simplification that also reads truer to "they're equal,
                none ranked above another" (see throughline-cant-prioritize-parallel-
                progress). Drag a finger across it to explore — the touched slice
                brightens (name above, comment below), release and it fades back to
                silent; the only separation you ever see is that brightness delta,
                never a structural line. x→slice mapping mirrors setRatingFromPointer
                above, just with equal division instead of a proportional search. */}
            {!playing && REPORT_END_LAYOUT === "trace" && (
              <div ref={traceRef} onPointerDown={onTraceDown} onPointerMove={onTraceMove}
                onPointerUp={onTraceEnd} onPointerLeave={onTraceEnd} onPointerCancel={onTraceEnd}
                onContextMenu={(e) => e.preventDefault()}
                style={{ position: "relative", height: 44, width: "82%", margin: "0 auto",
                  display: "flex", alignItems: "center", cursor: "pointer",
                  touchAction: "none", userSelect: "none", WebkitUserSelect: "none",
                  transform: `scaleX(${reportHolding ? 0 : 1})`, transformOrigin: "center",
                  transition: reportHolding ? `transform ${REPORT_HOLD_MS}ms linear` : "transform .3s cubic-bezier(.2,.7,.2,1)" }}>
                {segs.map((s, i) => {
                  const active = traceIdx === i;
                  return (
                    <div key={s.e.id} style={{
                      position: "relative", flex: `0 0 ${100 / n}%`, height: 5,
                      background: C.bone, opacity: active ? 1 : 0.32,
                      transition: "opacity .2s ease",
                    }} />
                  );
                })}
              </div>
            )}

            {/* dots under the bar — spotlight layout only, showing where you are and
                that swiping (or tapping the line/a dot) moves between activities. */}
            {REPORT_END_LAYOUT === "spotlight" && (
              <div style={{ display: "flex", justifyContent: "center", gap: 7, marginTop: 14, minHeight: 8 }}>
                {!playing && n > 1 && segs.map((s, i) => (
                  <button key={s.e.id} className="dot fade" onClick={() => setReportIdx(i)}
                    style={{ background: i === idx ? C.bone : C.line, border: "none", cursor: "pointer" }} />
                ))}
              </div>
            )}

            {/* comment below the line — never during playback (Maxence 17/07: "ne montre
                les commentaires qu'à la seconde étape, quand on peut naviguer"), only
                once handed over: trace shows whatever's under the finger, spotlight
                shows the focused activity. FIXED height + truncated text (not
                minHeight) so a long comment can never grow this box and shift the
                line above it — the line stays at the same spot no matter what's
                showing below it (Maxence: "la ligne change de place selon la taille
                des commentaires"). Not rendered at all in grid, which shows comments
                per-row instead. */}
            {REPORT_END_LAYOUT !== "grid" && (
              <div style={{ height: 66, textAlign: "center", marginTop: 20, padding: "0 10px", overflow: "hidden" }}>
                {!playing && REPORT_END_LAYOUT === "spotlight" && cur && cur.e.note && cur.e.note.trim() && (
                  <div key={`f${idx}`} className="fade" style={{ fontFamily: "var(--serif)", fontStyle: "italic", fontWeight: 300, fontSize: 14, color: C.text, lineHeight: 1.55 }}>
                    « {truncateNote(cur.e.note.trim())} »
                  </div>
                )}
                {!playing && REPORT_END_LAYOUT === "trace" && traceSeg && traceSeg.e.note && traceSeg.e.note.trim() && (
                  <div key={`t-${traceSeg.e.id}`} className="fade" style={{ fontFamily: "var(--serif)", fontStyle: "italic", fontWeight: 300, fontSize: 14, color: C.text, lineHeight: 1.55 }}>
                    « {truncateNote(traceSeg.e.note.trim())} »
                  </div>
                )}
              </div>
            )}

            {/* grid layout — the line "decuples": one row per activity done today,
                stacked vertically, spread across the screen (Maxence 17/07). Each
                row's bar keeps the exact width it had as a segment of the single line
                (its true % share of the day) — same visual DNA, just un-stacked —
                and fades/rises in staggered by index (.fade's own animation, delayed
                per row) so the split reads as the line coming apart rather than a
                list popping in all at once. Title sits above the bar, same slot/style
                as the hero label. Tapping a row's bar toggles that activity's comment
                open or closed (several can be open at once); rows with no comment
                aren't clickable. */}
            {!playing && REPORT_END_LAYOUT === "grid" && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "space-evenly", gap: 18, padding: "6px 0" }}>
                {segs.map((s, i) => {
                  const hasNote = s.e.note && s.e.note.trim();
                  const isOpen = hasNote && reportExpanded.has(s.e.id);
                  return (
                    <div key={s.e.id} style={{ textAlign: "center" }}>
                      <div className="fade mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint,
                        marginBottom: 9, animationDelay: `${i * 60}ms` }}>
                        {s.e.actionText}
                      </div>
                      <div onClick={() => hasNote && toggleReportExpanded(s.e.id)}
                        style={{ position: "relative", height: 14, display: "flex", alignItems: "center", justifyContent: "center",
                          cursor: hasNote ? "pointer" : "default", touchAction: "manipulation" }}>
                        <div className="fade" style={{
                          width: `${Math.max(s.wPct, 6)}%`, height: 3, borderRadius: 1, background: C.bone,
                          animationDelay: `${i * 60}ms` }} />
                      </div>
                      {hasNote && isOpen && (
                        <div className="fade" style={{ marginTop: 9, fontFamily: "var(--serif)", fontStyle: "italic", fontWeight: 300,
                          fontSize: 13, color: C.text, lineHeight: 1.5, padding: "0 12px" }}>
                          « {s.e.note.trim()} »
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // live line geometry. For timed activities: fills toward the period target (e.g. 30 min/day).
  // For binary: fills toward dur (session feel). >1 = went beyond — tant mieux.
  const actDurMin = current?.activity?.timed
    ? (current.activity.target || 30)
    : (current?.action?.dur || current?.activity?.dur || current?.action?.min || 15);
  const fullMs = Math.max(1, actDurMin * 60000);
  const frac = (stage === "running" || stage === "done") ? elapsedMs / fullMs : 0;

  return (
    <div className="tl" key="main">
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="wrap" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>


        {/* sandbox banner — makes it impossible to confuse the clone with the real app. */}
        {SIM && (
          <div className="mono" style={{ textAlign: "center", fontSize: 9.5, letterSpacing: ".14em", textTransform: "uppercase",
            color: C.bg, background: C.bone, padding: "5px 10px", margin: "-8px -20px 14px",
            display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div style={{ width: "100%", display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span>bac à sable · {fmtLong(todayKey())} · {fmtHM(realNow())} · {computePlace()} · {log.filter((e) => e.date === todayKey() && isClick(e)).length} clics</span>
            </div>
            {/* time controls, same actions as the "liste" tab's clock block, surfaced
                here too (added 10/07) so a hand-run week never needs a tab switch just
                to advance the clock or jump a day. */}
            <div style={{ width: "100%", display: "flex", justifyContent: "center", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
              {[["+5m", () => simAdvanceMinutes(5)], ["+10m", () => simAdvanceMinutes(10)], ["+1h", () => simAdvanceMinutes(60)],
                ["+1j", () => jumpDays(1)], ["+1sem", () => jumpDays(7)], ["temps réel", clockReal],
                // manual shake trigger — devicemotion ne se déclenche jamais en testant à
                // la main depuis un navigateur (Maxence 17/07), donc pas d'autre façon de
                // voir le shake reveal sans un vrai téléphone secoué.
                ["secouer", () => startBalanceReveal()]].map(([label, fn]) => (
                <button key={label} onClick={fn}
                  style={{ font: "inherit", letterSpacing: "inherit", textTransform: "inherit", cursor: "pointer",
                    border: `1px solid ${C.bg}`, borderRadius: 20, padding: "1px 7px", background: "transparent", color: C.bg }}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* prod: swipe only, no visible chrome at all — the arrows stay in the sandbox
            only, where testing from a desktop preview needs a click-through option. */}
        {SIM && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", height: 22 }}>
            <button className="navarr" style={{ visibility: tab === TABS[0] ? "hidden" : "visible" }} onClick={() => go(-1)} aria-label="previous">‹</button>
            <button className="navarr" style={{ visibility: tab === TABS[TABS.length - 1] ? "hidden" : "visible" }} onClick={() => go(1)} aria-label="next">›</button>
          </div>
        )}

        {/* =================== NOW =================== */}
        {/* full viewport height (not calc(100vh-150px) as before): guarantees the line is
            the only thing on screen at open — save/load/log/reset below only reach the
            fold on scroll (Maxence 12/07: was visible without scrolling on his phone). */}
        {tab === "now" && (
          <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>

            {/* the stage: instruction above, the living line as hero, controls below — vertically centered */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: 30 }}>

              {/* ---------- above the line: the instruction ---------- */}
              {/* ambient (Maxence 24/07): stays mounted, just fades via opacity — slow
                  out settling into ambient, quick back in on waking (same asymmetric-
                  duration idiom as the "done" vs "running" tilt transition elsewhere).
                  pointerEvents off while faded so a stray tap can't land on a hidden
                  button instead of just waking the screen. */}
              <div style={{ minHeight: 130, display: "flex", flexDirection: "column", justifyContent: "flex-end", textAlign: "center", marginBottom: 30,
                opacity: ambient ? 0 : 1, pointerEvents: ambient ? "none" : "auto",
                transition: `opacity ${ambient ? AMBIENT_FADE_OUT_MS : AMBIENT_FADE_IN_MS}ms ease` }}>

                {(stage === "proposal" || stage === "running" || stage === "done") && current && (
                  <div className="fade">
                    <div className="mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint, marginBottom: 18 }}>
                      {current.activity.name}
                    </div>
                    {/* sub-activity: shown whenever the main line no longer carries it — a
                        Claude-generated title (musique/film) replaces the underlying action
                        entirely (titre vs album, etc.), so surface the original alongside it. */}
                    {current.action.baseText && current.action.baseText !== current.action.text && (
                      <div className="mono" style={{ fontSize: 10, letterSpacing: ".1em", color: C.faint, marginBottom: 8 }}>{current.action.baseText}</div>
                    )}
                    {/* the item shows immediately — for a recommandeur it's the real curated
                        library entry (already meaningful). If the (non-blocking) embellisher
                        returns a nicer title, it swaps in place; if it's slow or fails, you
                        never wait on it. No "…" placeholder anymore (Maxence 13/07, fix 2). */}
                    <div style={{ fontFamily: "var(--mono)", fontSize: 13, fontWeight: 400, lineHeight: 1.55, letterSpacing: ".02em", textTransform: "lowercase", color: stage === "done" ? C.mut : C.text }}>
                      {current.action.text}
                    </div>
                    {/* recommandeur (musique, film…): the line above is ONLY the title — what
                        describes it (artist/director/note) sits behind a reveal/hide toggle,
                        collapsed by default (Maxence 12/07). */}
                    {current.action.desc && (
                      <div style={{ marginTop: 10 }}>
                        <button className="link" onClick={() => setDescOpen((o) => !o)}>{descOpen ? "cacher" : "détails"}</button>
                        {descOpen && (
                          <div className="fade mono" style={{ fontSize: 11, color: C.mut, marginTop: 8, lineHeight: 1.5 }}>{current.action.desc}</div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {stage === "empty" && (
                  <div className="fade" style={{ fontFamily: "var(--serif)", fontSize: 20, fontWeight: 300, fontStyle: "italic", color: C.mut, lineHeight: 1.45 }}>
                    Nothing left to draw for {place} right now.
                  </div>
                )}
              </div>

              {/* ---------- the living line: hollow track, fills from the centre while you act, ---------- */}
              {/* ---------- spills past the margins when you go beyond the estimate ---------- */}
              {(() => {
                const over = frac > 1;
                const widthPct = Math.min(frac, 1.85) * 100;
                // the line carries the whole loop. short tap acts; long hold retracts & re-picks.
                // the hollow track stays inset from the screen edges so the fill can visibly
                // overshoot it — that overshoot is the felt dépassement.
                const trackTransition = holding ? `transform ${effHold}ms linear` : "transform .3s cubic-bezier(.2,.7,.2,1)";
                const fillColor = C.bone; // monochrome — the line is always bone, the one living mark
                // LINE_MODE "tilt": no clock read at all — same sin sway as the shake
                // reveal (startBalanceReveal above), same spread reading (frozen at
                // begin(), not recomputed). Differences from the shake: (1) the envelope
                // damps over the session's own progress (frac 0→1) instead of a fixed
                // ~5s timer — full swing near the start, calm as the estimated duration
                // runs out, flat exactly at frac=1, and overshoot (frac>1) stays flat too,
                // no reward shape for going long (Maxence's call). (2) the period is longer
                // than the shake's (3.5-7s) but not as long as round 3's 12-18s, which read
                // as unnaturally sluggish once he actually watched it — 8-12s lands between
                // the two (Maxence 16/07, round 4). (3) the angle itself is half the
                // shake's ampDeg — full amplitude read as too marked sustained over a
                // whole session (round 3, kept). (4) "done" is excluded here (was
                // included before) — finishing early left frac<1 and the line still
                // visibly crooked on the done screen, which read as unresolved/frustrating
                // instead of settled (Maxence 16/07, round 5). Done always reads flat now,
                // regardless of how much of the estimate was actually used.
                const tiltActive = LINE_MODE === "tilt" && stage === "running";
                const tiltSpread = sessionTiltRef.current;
                const tiltAmpDeg = tiltSpread * 6 * 0.5;
                const tiltPeriodMs = (12 - tiltSpread * 4) * 1000; // 8s (very imbalanced) to 12s (near-balanced)
                const tiltEnvelope = tiltActive ? Math.max(0, 1 - Math.min(frac, 1)) : 0;
                const tiltDeg = tiltActive
                  ? tiltAmpDeg * Math.sin((2 * Math.PI * elapsedMs) / tiltPeriodMs) * tiltEnvelope
                  : 0;
                // domain balance, felt not read: the line sways wider AND faster when
                // one domain is neglected relative to the others, settles wide and slow
                // as it evens out — like something physically unsettled, not a metronome
                // with a parameter. Motion carries the signal, a static lean read as a glitch.
                // Hidden by default (zero footprint) — a shake reveals it, then it settles
                // back to flat on its own (see startBalanceReveal above).
                // the tilt itself is driven imperatively frame-by-frame on lineRef (see
                // startBalanceReveal) — a continuous sin(elapsed) whose envelope eases to
                // 0, so there's no React re-render in the loop and no animation/transition
                // handoff to snap.
                return (
                  <div ref={lineRef} onPointerDown={onLineDown} onPointerMove={onLineMove} onPointerUp={onLineUp} onPointerLeave={onLineCancel} onPointerCancel={onLineCancel}
                    onContextMenu={(e) => e.preventDefault()}
                    style={{ position: "relative", height: 44, width: "82%", margin: "0 auto",
                      display: "flex", justifyContent: "center", alignItems: "center",
                      overflow: "visible", cursor: "pointer", touchAction: ratingActive ? "none" : "manipulation", userSelect: "none", WebkitUserSelect: "none",
                      // GPU-composited layer for the rotation (Maxence 24/07: a "staircase"
                      // artifact instead of a clean diagonal on the swaying line) — without
                      // this hint some renderers rasterize a rotated 2px-tall line on the CPU
                      // at low quality (visibly stepped edges); promoting it to its own
                      // compositor layer gets it anti-aliased properly.
                      willChange: "transform", backfaceVisibility: "hidden",
                      // done: eases back to flat over .7s instead of snapping — finishing
                      // early used to leave it crooked one frame then jump straight, which
                      // read as abrupt (Maxence 16/07, round 6). Running keeps the tight
                      // .1s linear so it tracks the tick-driven angle without lag.
                      // Excluded entirely while a shake-reveal is active (revealActiveRef):
                      // that rAF loop owns transform/transition on this node for its whole
                      // duration — any re-render here (session auto-start, the 100ms running
                      // tick…) would otherwise reapply this branch mid-reveal and stomp the
                      // loop's own writes, which read as the reveal randomly decelerating
                      // partway through (Maxence 16/07, round 4).
                      // Reverted 24/07 back to resting-static-unless-shaken (Maxence: the
                      // permanent sway wasn't what he meant by "toujours" — only wanted the
                      // reading to be live/un-frozen, not the line always visibly moving at
                      // rest; the shake still exists specifically to nudge toward action by
                      // showing clicks-remaining, see startBalanceReveal).
                      ...(LINE_MODE === "tilt" && !ratingActive && !revealActiveRef.current ? { transform: `rotate(${tiltDeg}deg)`,
                        transition: stage === "done" ? "transform .7s cubic-bezier(.2,.7,.2,1)" : "transform .1s linear" } : {}) }}>
                    {/* hollow track — inset, never touches the edges. Breathes on entry
                        (always was) AND whenever ambient is active (Maxence 24/07: "le
                        breathe veut dire 'touche-moi'" — the invitation should show up
                        whichever stage ambient caught the app in, not just entry), bone-
                        colored in both cases so the pulse is actually visible instead of
                        the dim C.soft an ambient running/done/proposal line would
                        otherwise keep. */}
                    <div className={(stage === "entry" || ambient) && !holding ? "breathe" : ""}
                      style={{ position: "absolute", left: 0, right: 0, top: "50%", height: 2, background: (stage === "entry" || ambient) ? C.bone : C.soft,
                        transform: `translateY(-50%) scaleX(${holding ? 0 : 1})`, transformOrigin: "center", transition: trackTransition }} />
                    {/* centre fill — grows symmetrically from the middle, overshoots the track when you go beyond.
                        LINE_MODE "tilt" skips this entirely: the tilt on the wrapper above is the only signal. */}
                    {!ratingActive && LINE_MODE === "fill" && frac > 0 && (
                      <div style={{ position: "relative", flexShrink: 0, height: over ? 8 : 6, width: `${widthPct}%`,
                        background: fillColor, opacity: over ? 1 : 0.9,
                        boxShadow: over ? `0 0 14px ${fillColor}` : "none",
                        transform: `scaleX(${holding ? 0 : 1})`, transformOrigin: "center",
                        transition: holding ? `transform ${effHold}ms linear` : "width .25s linear, height .35s, box-shadow .35s, transform .3s" }} />
                    )}
                    {/* recommandeur "done": the same centre-out fill, driven by `rating`
                        (drag) instead of session-time frac — reuses the exact visual
                        language of the mini album slider, just on the hero line itself.
                        Also retracts on `holding` (17/07) so a stationary hold-to-skip
                        reads the same here as everywhere else on the line. */}
                    {ratingActive && (
                      <div style={{ position: "relative", flexShrink: 0, height: 6, width: `${rating}%`,
                        background: fillColor, opacity: 0.9,
                        transform: `scaleX(${holding ? 0 : 1})`, transformOrigin: "center",
                        transition: holding ? `transform ${effHold}ms linear` : "width .08s linear" }} />
                    )}
                  </div>
                );
              })()}

              {/* ---------- below the line: controls ---------- */}
              {/* ambient: fades (slow out, quick back in) rather than unmounting — same
                  reasoning as the block above the line. */}
              <div style={{ minHeight: 130, marginTop: 30, textAlign: "center",
                opacity: ambient ? 0 : 1, pointerEvents: ambient ? "none" : "auto",
                transition: `opacity ${ambient ? AMBIENT_FADE_OUT_MS : AMBIENT_FADE_IN_MS}ms ease` }}>

                {/* entry: nothing, except the one-time first-launch hint. */}
                {stage === "entry" && showTapHint && (
                  <div className="fade mono" style={{ fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", color: C.faint }}>
                    tape pour commencer
                  </div>
                )}

                {/* rapport button — unlocks itself once today's objective is reached,
                    replacing the old "type rapport to open it" discovery mechanic
                    (Maxence 19/07: a button is more direct than typing a keyword by
                    hand). Pinned to the true bottom of the screen, not just under the
                    line, so it reads as its own footer rather than part of the entry
                    hint above it. Absent entirely below the click threshold — no
                    disabled/greyed state, matches "ne pas ajouter par défaut". */}
                {stage === "entry" && log.filter((e) => e.date === todayKey() && isClick(e)).length >= RAPPORT_MIN_CLICS && (
                  <div className="fade" style={{ position: "fixed", left: 0, right: 0, bottom: 28, textAlign: "center" }}>
                    <button className="link" onClick={() => setStage("report")}>rapport</button>
                  </div>
                )}

                {/* proposal: nothing under the line, except in the sandbox — testing wants
                    to reroll fast without the hold gesture, just to see what comes up. */}
                {SIM && stage === "proposal" && (
                  <div className="fade">
                    <button className="link" onClick={swap}>skip (test)</button>
                  </div>
                )}

                {/* running: a quiet pause, for when something outside interrupts the session
                    (a call, someone at the door) — for stopping the clock without abandoning
                    the activity. Abandoning it entirely is still the hold-the-line gesture
                    (17/07: now reachable from here too, not just "proposal").
                    Comment field open here too (Maxence 16/07): a thought worth catching mid-session
                    used to have nowhere to go until "done" — same `comment` state either way, so
                    whatever's typed here is just already there once the session ends. */}
                {stage === "running" && (() => {
                  const curTitle = isAlbumActivity ? (albumTitles[albumIdx] || { text: "", rating: 50 }) : null;
                  const curFrac = curTitle ? curTitle.rating / 100 : 0;
                  return (
                  <div className="fade">
                    {/* Album de la semaine (Maxence 16/07, item 4 — redesigned same day: no
                        native sliders, no separate screen. The hero line above already carries
                        the album name; this is the same visual family, half-scale, repurposed as
                        a draggable appreciation control for whichever title is focused. Swipe (or
                        tap a dot) to move between titles already noted; the trailing slot is
                        always a fresh, uncommitted one. Finishing is still just tapping the main
                        line, same as every other activity. */}
                    {isAlbumActivity && (
                      <div onTouchStart={onAlbumTouchStart} onTouchEnd={onAlbumTouchEnd} style={{ marginBottom: 22 }}>
                        {/* same font/case as the main title above the hero line — no border, no
                            gap: this and the slider just below read as one piece, not a form field
                            sitting over a separate control (Maxence 16/07, round 2). */}
                        <input className="in" value={curTitle.text} placeholder="titre écouté"
                          onChange={(e) => { const v = e.target.value; setAlbumTitles((arr) => arr.map((t, i) => (i === albumIdx ? { ...t, text: v } : t))); }}
                          onKeyDown={(e) => { if (e.key === "Enter") advanceAlbumTitle(1); }}
                          style={{ fontFamily: "var(--mono)", fontSize: 13, fontWeight: 400, lineHeight: 1.55, letterSpacing: ".02em", textTransform: "lowercase",
                            textAlign: "center", maxWidth: 360, margin: "0 auto", display: "block",
                            fontStyle: curTitle.text ? "normal" : "italic", color: curTitle.text ? C.text : C.faint }} />
                        {/* the slider itself — dragging it sets the rating, it never advances on
                            its own. Same centre-out fill language as the hero line, half its
                            width, thinner track and fill. Number readout dropped (Maxence 20/07,
                            same call as the hero line) — the fill position is legible on its own. */}
                        <div ref={albumLineRef} onPointerDown={onAlbumLineDown} onPointerMove={onAlbumLineMove} onPointerUp={onAlbumLineUp} onPointerCancel={onAlbumLineUp}
                          onContextMenu={(e) => e.preventDefault()}
                          style={{ position: "relative", height: 16, width: "55%", margin: "10px auto 0", display: "flex", justifyContent: "center", alignItems: "center", cursor: "pointer", touchAction: "none", userSelect: "none" }}>
                          <div style={{ position: "absolute", left: 0, right: 0, top: "50%", height: 1, background: C.soft, transform: "translateY(-50%)" }} />
                          {curFrac > 0 && (
                            <div style={{ position: "relative", height: 2, width: `${curFrac * 100}%`, background: C.bone, opacity: 0.9 }} />
                          )}
                        </div>
                        {albumTitles.length > 1 && (
                          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 10 }}>
                            {albumTitles.map((t, i) => (
                              <button key={t.id} className="dot" onClick={() => setAlbumIdx(i)}
                                style={{ width: 4, height: 4, background: i === albumIdx ? C.bone : C.line, border: "none", cursor: "pointer" }} />
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                    {/* running: a quiet pause, for when something outside interrupts the session
                        (a call, someone at the door) — not for skipping, just for stopping the
                        clock. Keeps its normal spot right under the line (Maxence 16/07). */}
                    <button className="link" onClick={togglePause}>{paused ? "reprendre" : "pause"}</button>
                    {/* comment field, open here too so a thought worth catching mid-session has
                        somewhere to go before "done" (same `comment` state either way) — sits
                        below pause. Margin tuned so the gap from pause down to the cursor hint's
                        top matches the gap from the line's visual bottom up to pause (44px, not
                        the line wrapper's own 30px margin — that box has 22px of invisible
                        touch-target padding above/below the actual stroke) (Maxence 16/07, round
                        7). autoFocus popped the keyboard on every session start, too aggressive
                        (round 4) — a quiet cursor hint instead, rendered as its own overlay (not
                        the native placeholder). Same font/size/color as the activity text above
                        once you actually type — a different register there read as inconsistent. */}
                    <div style={{ position: "relative", maxWidth: 320, margin: "54px auto 0" }}>
                      <input className="in" value={comment}
                        onChange={(e) => setComment(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") submitRunningComment(); }}
                        style={{ fontFamily: "var(--mono)", fontSize: 13, textAlign: "center", display: "block", color: C.text }} />
                      {!comment && (
                        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: COMMENT_HINT_MODE === "cursor" ? "flex-start" : "center", justifyContent: "center", gap: 6, pointerEvents: "none", fontFamily: "var(--mono)", fontSize: 13, color: C.faint }}>
                          {COMMENT_HINT_MODE === "cursor"
                            ? <span className="hintcursor" />
                            : <><span>«</span><span>...</span><span>»</span></>}
                        </div>
                      )}
                    </div>
                    {/* same brief acknowledgment language as "done"'s syncMsg, just local —
                        a running note never round-trips the API, but still deserves proof it
                        landed (Maxence 17/07). */}
                    {runNoteMsg && (
                      <div className="mono fade" style={{ fontSize: 10, color: C.faint, letterSpacing: ".08em", marginTop: 10 }}>{runNoteMsg}</div>
                    )}
                  </div>
                  );
                })()}

                {stage === "empty" && (
                  <div className="fade">
                    <button className="link" onClick={resetFlow}>i'm done</button>
                  </div>
                )}

                {stage === "done" && (
                  <div className="fade">
                    {/* hero-line slider's number dropped (Maxence 20/07) — now that a plain
                        tap confirms distinctly from a drag, the fill position on the line is
                        legible enough on its own. */}
                    {(syncing || syncMsg) ? (
                      <div className="mono" style={{ fontSize: 11, color: C.bone, letterSpacing: ".06em", lineHeight: 1.6 }}>{syncMsg || "…"}</div>
                    ) : (
                      <>
                        {/* duration is always logged in data (finish() records the real elapsed
                            minutes) — the readout is sandbox-only now: prod never shows the time
                            spent (Maxence 13/07), the session just ends on the comment line. */}
                        {SIM && (
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 18 }}>
                            <span className="mono" style={{ fontSize: 10, color: C.faint, letterSpacing: ".1em" }}>temps réel :</span>
                            <input
                              type="number" min="1" className="in mono"
                              value={manualMin}
                              placeholder={String(Math.max(1, Math.round(actDurMin)))}
                              onChange={(e) => setManualMin(e.target.value)}
                              style={{ width: 44, fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, color: C.mut }}
                            />
                            <span className="mono" style={{ fontSize: 10, color: C.faint }}>min</span>
                          </div>
                        )}
                        {/* same "« … »" idea as the running field (Maxence 16/07, round 6): a
                            styled overlay, not the native placeholder, dots spaced out and grey
                            throughout, same font/size as the activity text. No border under it
                            once done — the borderBottom read as a "big line" that didn't belong
                            once the session already ended (round 6, was here since round 1). */}
                        <div style={{ position: "relative", maxWidth: 360, margin: "0 auto" }}>
                          <input className="in" value={comment}
                            onChange={(e) => setComment(e.target.value)}
                            onKeyDown={(e) => { if (e.key === "Enter") submitComment(); }}
                            style={{ fontFamily: "var(--mono)", fontSize: 13, textAlign: "center", display: "block", color: C.text }} />
                          {!comment && (
                            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: COMMENT_HINT_MODE === "cursor" ? "flex-start" : "center", justifyContent: "center", gap: 6, pointerEvents: "none", fontFamily: "var(--mono)", fontSize: 13, color: C.faint }}>
                              {COMMENT_HINT_MODE === "cursor"
                                ? <span className="hintcursor" />
                                : <><span>«</span><span>...</span><span>»</span></>}
                            </div>
                          )}
                        </div>
                        {/* the "what your word does" hint teaches once (showDoneHint, seen-once-
                            ever like the tap hint) then gets out of the way for good — an
                            instruction, not a standing affordance (Maxence 16/07). */}
                        {showDoneHint && current && (() => {
                          const k = current.activity.kind;
                          const hint = k === "pipeline" ? "ton mot fait avancer la pièce dans le funnel"
                            : k === "recommandeur" ? "glisse la ligne pour noter, tape pour valider"
                            : k === "practice" ? "ton mot nourrit la mémoire de l'activité"
                            : null;
                          return hint ? <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 14, letterSpacing: ".06em" }}>{hint}</div> : null;
                        })()}
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* =================== LISTE (sandbox verification view) =================== */}
        {tab === "liste" && SIM && (() => {
          const place = computePlace();
          const rows = buildHat(activities, log, place);
          const owed = rows.filter((r) => r.done < r.target);
          const daily = owed.filter((r) => r.period === "day");
          const weekly = owed.filter((r) => r.period === "week");
          const doneRows = rows.filter((r) => r.done >= r.target);
          const Row = (r) => {
            const remaining = r.target - r.done;
            const editing = simEdit === r.key;
            const editingParams = paramEdit === r.key;
            // own cadence at the action level wins (same rule as the Activities tab) —
            // edit there instead of the activity's shared target/period
            const ownTarget = r.action && typeof r.action.target === "number";
            return (
              <div key={r.key} style={{ borderBottom: `1px solid ${C.soft}`, padding: "9px 0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span className="dot" style={{ background: dColor(r.activity.domain), flex: "none" }} />
                  <span style={{ flex: 1, fontSize: 14, color: C.text }}>{r.label}</span>
                  {r.target > 1 && <span className="mono" style={{ fontSize: 10, color: C.faint }}>{r.done}/{r.target}</span>}
                  <button className="ghost" style={{ fontSize: 11 }}
                    onClick={() => setParamEdit(editingParams ? null : r.key)}>{editingParams ? "−" : "⚙"}</button>
                  <button className="seg" onClick={() => { if (editing) { setSimEdit(null); } else { setSimEdit(r.key); setSimMin(""); setSimNote(""); } }}>
                    {editing ? "×" : "fait" + (remaining > 1 ? ` (×${remaining})` : "")}
                  </button>
                </div>
                {editingParams && (
                  <div className="fade" style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10, marginTop: 10, paddingLeft: 18 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min="0" className="in mono"
                        value={ownTarget ? r.action.target : (r.activity.target ?? 1)}
                        onChange={(e) => {
                          const v = Math.max(0, parseFloat(e.target.value) || 0);
                          if (ownTarget) editAction(r.activity.id, r.action.id, { target: v });
                          else upd(r.activity.id, { target: v });
                        }}
                        style={{ width: 32, fontSize: 12, textAlign: "right", borderBottom: `1px solid ${C.line}`, color: C.text }} />
                      <div style={{ display: "flex", gap: 3 }}>
                        {["day", "week"].map((p) => (
                          <button key={p} className={`chip ${((ownTarget ? r.action.period : r.activity.period) || "week") === p ? "on" : ""}`}
                            onClick={() => ownTarget ? editAction(r.activity.id, r.action.id, { period: p }) : upd(r.activity.id, { period: p })}
                            style={{ fontSize: 10, padding: "2px 6px" }}>{p === "day" ? "/j" : "/sem"}</button>
                        ))}
                      </div>
                      {ownTarget && <span className="mono" style={{ fontSize: 9, color: C.faint, fontStyle: "italic" }}>(cette action)</span>}
                    </div>
                    <div style={{ display: "flex", gap: 3 }}>
                      {WHERES.map((w) => (
                        <button key={w} className={`chip ${r.activity.where === w ? "on" : ""}`}
                          onClick={() => upd(r.activity.id, { where: w })} style={{ fontSize: 10, padding: "2px 6px" }}>{w}</button>
                      ))}
                    </div>
                    <button className="link" style={{ color: C.line, fontSize: 10 }}
                      onClick={() => { if (window.confirm(`Supprimer "${r.activity.name}" ?`)) { delActivity(r.activity.id); setParamEdit(null); } }}>
                      supprimer l'activité
                    </button>
                  </div>
                )}
                {editing && (
                  <div className="fade" style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, paddingLeft: 18 }}>
                    <input type="number" min="1" placeholder="min" value={simMin} onChange={(e) => setSimMin(e.target.value)}
                      className="in mono" style={{ width: 46, fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, color: C.mut }} />
                    <input placeholder="un mot (avance le funnel / la mémoire)" value={simNote} onChange={(e) => setSimNote(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") simComplete(r, simMin, simNote); }}
                      className="in" style={{ flex: 1, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: C.text }} />
                    <button className="seg on" onClick={() => simComplete(r, simMin, simNote)}>valider</button>
                  </div>
                )}
              </div>
            );
          };
          return (
            <div style={{ marginTop: 20 }}>
              {/* the sim clock — where you are right now in the playthrough */}
              <div className="mono" style={{ textAlign: "center", fontSize: 13, color: C.bone, letterSpacing: ".06em", marginBottom: 4 }}>
                {fmtLong(todayKey())} · {fmtHM(realNow())}
              </div>
              <div className="mono" style={{ textAlign: "center", fontSize: 9.5, color: C.faint, marginBottom: 14 }}>lieu : {place} · {log.filter((e) => e.date === todayKey() && isClick(e)).length} clics aujourd'hui</div>

              {/* pause — advance the clock without doing anything, to feel time between actions */}
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                <span className="mono" style={{ fontSize: 9.5, color: C.faint, letterSpacing: ".1em", textTransform: "uppercase" }}>pause</span>
                <button className="seg" onClick={() => simAdvanceMinutes(5)}>+5m</button>
                <button className="seg" onClick={() => simAdvanceMinutes(10)}>+10m</button>
                <button className="seg" onClick={() => simAdvanceMinutes(60)}>+1h</button>
              </div>

              {/* time travel */}
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
                <button className="seg" onClick={() => jumpDays(1)}>+1 jour</button>
                <button className="seg" onClick={() => jumpDays(7)}>+1 semaine</button>
                <button className="seg" onClick={clockReal}>temps réel</button>
                <button className="seg" onClick={simReseed}>recharger catalogue</button>
              </div>

              <div className="lab" style={{ marginBottom: 4 }}>aujourd'hui · journalier</div>
              {daily.length ? daily.map(Row) : <div className="mono" style={{ fontSize: 11, color: C.faint, padding: "8px 0 16px" }}>cible du jour atteinte partout — reste tiré quand même, juste moins souvent</div>}

              <div className="lab" style={{ marginTop: 26, marginBottom: 4 }}>cette semaine · hebdo</div>
              {weekly.length ? weekly.map(Row) : <div className="mono" style={{ fontSize: 11, color: C.faint, padding: "8px 0 16px" }}>cible de la semaine atteinte partout — reste tiré quand même, juste moins souvent</div>}

              <div className="mono" style={{ fontSize: 10, color: C.faint, marginTop: 22, lineHeight: 1.6 }}>
                {owed.length} pas encore à la cible ({daily.length} jour · {weekly.length} sem) · {place} ·
                {" "}coche → suit juste ta progression, le tirage lui reste pondéré par target/période, indifférent au "fait".
              </div>

              {doneRows.length > 0 && (
                <>
                  <div className="lab" style={{ marginTop: 26, marginBottom: 8, color: C.mut }}>fait cette période ({doneRows.length})</div>
                  <div style={{ opacity: 0.6 }}>{doneRows.map(Row)}</div>
                </>
              )}
            </div>
          );
        })()}

        {/* =================== SIMULATEUR (comme à la main, en rafale — commit réel au sandbox) =================== */}
        {tab === "simulateur" && SIM && (() => {
          const max = simRes ? Math.max(...simRes.rows.map((r) => r.count), 1) : 1;
          return (
            <div style={{ marginTop: 20 }}>
              <div className="lab" style={{ marginBottom: 10, color: C.bone }}>simulateur — rafale de séances « comme à la main »</div>
              <div className="mono" style={{ fontSize: 9.5, color: C.faint, marginBottom: 14, lineHeight: 1.6 }}>
                tire avec le vrai moteur (pickAging), avance les pipelines pièce par pièce comme un tap réel, et écrit le résultat directement dans le log/activités du sandbox — pas un aperçu jetable.
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", marginBottom: 16 }}>
                {[{ k: "jours", lab: "jours" }, { k: "tirages", lab: "tirages/j" }].map(({ k, lab }) => (
                  <label key={k} className="mono" style={{ fontSize: 9.5, color: C.faint, display: "flex", alignItems: "center", gap: 5, letterSpacing: ".08em" }}>
                    <input type="number" min="1" step="1" value={simCfg[k]}
                      onChange={(e) => setSimCfg((c) => ({ ...c, [k]: parseFloat(e.target.value) || c[k] }))}
                      style={{ width: 44, background: "transparent", border: "none", borderBottom: `1px solid ${C.line}`, color: C.text, fontFamily: "inherit", fontSize: 12, textAlign: "right", outline: "none", padding: "2px 4px" }} />
                    {lab}
                  </label>
                ))}
                <button className="seg on" onClick={() => runSimBatch({ days: Math.max(1, simCfg.jours), drawsPerDay: Math.max(1, simCfg.tirages) })}>simuler</button>
              </div>

              {!simRes ? (
                <div className="mono" style={{ fontSize: 11, color: C.faint, padding: "10px 0" }}>appuie sur simuler pour jouer N jours et voir la répartition</div>
              ) : (
                <>
                  <div className="mono" style={{ fontSize: 10, color: C.mut, marginBottom: 14 }}>
                    {simRes.sessions} séances ajoutées sur {simRes.days}j — déjà dans le log
                  </div>
                  {simRes.rows.map((r) => {
                    const a = activities.find((x) => x.id === r.activityId);
                    if (!a) return null;
                    const action = r.actionId ? a.actions.find((x) => x.id === r.actionId) : null;
                    if (r.actionId && !action) return null;
                    return (
                      <div key={r.key} style={{ borderBottom: `1px solid ${C.soft}`, padding: "7px 0" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span className="dot" style={{ background: dColor(a.domain), flex: "none", opacity: action ? 0.4 : 1 }} />
                          <span style={{ width: 148, flex: "none", fontSize: 11.5, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.name}</span>
                          <div style={{ flex: 1, height: 8, background: C.soft }}>
                            <div style={{ width: `${Math.round((r.count / max) * 100)}%`, height: 8, background: C.faint }} />
                          </div>
                          <span className="mono" style={{ width: 24, textAlign: "right", fontSize: 10, color: C.mut }}>{r.count}</span>
                        </div>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          );
        })()}

        {/* =================== ACTIVITIES =================== */}
        {tab === "activities" && (
          <div style={{ marginTop: 26 }}>
            <div style={{ textAlign: "center", marginBottom: 10 }}>
              <button className="link" style={{ fontSize: 10.5, color: placeFilterOn ? C.text : C.faint }}
                onClick={() => setPlaceFilterOn((v) => !v)}>
                {placeFilterOn ? `ici (${computePlace()})` : "toutes"}
              </button>
            </div>
            {(placeFilterOn ? activities.filter((a) => placeOk(a, computePlace())) : activities).map((a) => (
              <ActivityCard key={a.id} a={a} upd={upd} del={delActivity}
                addAction={addAction} editAction={editAction} delAction={delAction}
                addStage={addStage} editStage={editStage} delStage={delStage} moveStage={moveStage}
                addItem={addItem} cycleItem={cycleItem} delItem={delItem} />
            ))}
            <button className="link" style={{ marginTop: 20 }} onClick={addActivity}>+ add activity</button>
          </div>
        )}

        {/* =================== FOOTER — save / load centered, reset tucked further below. no rule: the only line is the one in the centre. Stays on every tab including "now" (Maxence 12/07: not moved off it) — pushed below the fold instead via the "now" tab's full-viewport minHeight below, so opening the app shows only the line; scrolling down reveals this. =================== */}
        <div className="fade" style={{ marginTop: 72, textAlign: "center" }}>
          <div>
            <button className="link" onClick={toggleOut}>{computePlace().toUpperCase()}</button>
          </div>
          <div style={{ marginTop: 14, display: "flex", justifyContent: "center", alignItems: "center", gap: 26 }}>
            <button className="link" onClick={shareBackup}>save</button>
            <label className="link" style={{ cursor: "pointer" }}>load
              <input type="file" accept="application/json,.json,text/plain,.txt" onChange={onFile} style={{ display: "none" }} />
            </label>
          </div>
          <div style={{ marginTop: 14 }}>
            <button className="link" onClick={() => setLogOpen((o) => !o)}>log</button>
          </div>
          {logOpen && (
            <div style={{ marginTop: 18, maxWidth: 320, marginLeft: "auto", marginRight: "auto" }}>
              <input className="in" value={logText} placeholder="qu'as-tu fait ?"
                onChange={(e) => setLogText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") submitFreeLog(); }}
                disabled={logBusy}
                style={{ fontSize: 14, textAlign: "center", borderBottom: `1px solid ${C.line}`, paddingBottom: 8, fontStyle: logText ? "normal" : "italic", color: logText ? C.text : C.faint }} />
              {logBusy && <div className="mono" style={{ fontSize: 10, color: C.faint, marginTop: 10 }}>…</div>}
            </div>
          )}
          <div style={{ marginTop: 14 }}>
            <button className="link" onClick={() => setKeyOpen((o) => !o)}>key{apiKey ? " ·" : ""}</button>
          </div>
          {keyOpen && (
            <div style={{ marginTop: 18, maxWidth: 320, marginLeft: "auto", marginRight: "auto" }}>
              <input className="in" type="password" value={apiKey} placeholder="anthropic api key — sk-ant-…"
                onChange={(e) => setApiKey(e.target.value)}
                style={{ fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, paddingBottom: 6 }} />
              <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 12 }}>
                <button className="link" onClick={saveKey}>save key</button>
                <button className="link" onClick={clearKey}>clear</button>
              </div>
              <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 10, lineHeight: 1.6 }}>
                stored only on this device — never committed. reads your after-session comments to advance the funnel; sent only to anthropic.
              </div>
            </div>
          )}
          <div style={{ marginTop: 22, textAlign: "center" }}>
            {/* sandbox only (18/07, Maxence: "enlever reset de l'app normale") — a
                one-tap wipe in the real app is a way to dodge the engine's own caps/
                debt (log something, don't like the fallout, reset, try again), same
                risk class as the fake-clock override just below it. Sandbox keeps it
                because hand-testing the engine genuinely needs a clean slate. */}
            {SIM && <button className="link" style={{ color: C.line }} onClick={resetAll}>reset</button>}
            {/* fake-clock override — sandbox only. Shipping this in prod meant the real
                app could have its date/time silently forced away from realNow(), which
                the live engine (pickAging, caps, place) reads directly — a real user has
                no legitimate reason to lie to the engine about what time it is. */}
            {SIM && (
              <div style={{ marginTop: 14, display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <input type="date"
                  value={debugDay}
                  onChange={e => { setDebugDay(e.target.value); applyDebugTime(e.target.value, debugHour); }}
                  className="mono"
                  style={{ fontSize: 11, color: C.mut, background: "transparent", border: "none", borderBottom: `1px solid ${C.soft}`, outline: "none", padding: "2px 4px" }} />
                <input type="number" min="0" max="23" placeholder="h"
                  value={debugHour}
                  onChange={e => { setDebugHour(e.target.value); applyDebugTime(debugDay, e.target.value); }}
                  className="mono"
                  style={{ width: 38, fontSize: 11, color: C.mut, background: "transparent", border: "none", borderBottom: `1px solid ${C.soft}`, outline: "none", padding: "2px 4px", textAlign: "center" }} />
                <span className="mono" style={{ fontSize: 11, color: C.faint }}>h</span>
                {_debugDate && (
                  <>
                    <span className="mono" style={{ fontSize: 10, color: C.faint, letterSpacing: ".08em" }}>→ {computePlace()}</span>
                    <button className="link" style={{ color: C.faint, fontSize: 10 }} onClick={() => { setDebugDay(""); setDebugHour(""); applyDebugTime("", ""); }}>↺</button>
                  </>
                )}
              </div>
            )}
          </div>
        </div>

        {msg && (
          <div className="mono" style={{ position: "fixed", left: 0, right: 0, bottom: 24, textAlign: "center", fontSize: 10.5, letterSpacing: ".1em", textTransform: "uppercase", color: C.bone, zIndex: 3 }}>
            {msg}
          </div>
        )}
      </div>
    </div>
  );
}

/* ------------------------- activity editor ------------------------- */
function ActivityCard({ a, upd, del, addAction, editAction, delAction, addStage, editStage, delStage, moveStage, addItem, cycleItem, delItem }) {
  const [open, setOpen] = useState(false);
  const [itemDraft, setItemDraft] = useState("");
  const statusColor = (s) => (s === "done" ? C.bone : s === "doing" ? C.mut : C.faint);
  return (
    <div className="fade" style={{ borderBottom: `1px solid ${C.soft}`, padding: "16px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button className="dot" style={{ background: dColor(a.domain), border: "none", cursor: "pointer" }}
          onClick={() => upd(a.id, { domain: DKEYS[(DKEYS.indexOf(a.domain) + 1) % DKEYS.length] })} title="change domain" />
        <input className="in" value={a.name} placeholder="activity name"
          onChange={(e) => upd(a.id, { name: e.target.value })}
          style={{ fontFamily: "var(--serif)", fontSize: 18, fontWeight: 300, fontStyle: a.name ? "normal" : "italic", color: a.name ? C.text : C.faint }} />
        <button className="ghost" onClick={() => setOpen((o) => !o)}>{open ? "−" : "edit"}</button>
        <button className="x" onClick={() => del(a.id)}>×</button>
      </div>

      {open && (
        <div style={{ paddingLeft: 20, marginTop: 16 }}>
          {/* meta row */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "14px 20px", marginBottom: 18 }}>
            <Meta label="where">
              <div style={{ display: "flex", gap: 5 }}>
                {WHERES.map((w) => (
                  <button key={w} className={`chip ${a.where === w ? "on" : ""}`} onClick={() => upd(a.id, { where: w })}>{w}</button>
                ))}
              </div>
            </Meta>
            <Meta label="kind">
              <div style={{ display: "flex", gap: 5 }}>
                {KINDS.map((k) => (
                  <button key={k} className={`chip ${a.kind === k ? "on" : ""}`}
                    onClick={() => upd(a.id, { kind: k, done: false, ...(k === "pipeline" && !(a.stages || []).length ? { stages: mkStages(ERASURE_STAGES) } : {}) })}>{k}</button>
                ))}
              </div>
            </Meta>
            {a.kind !== "task" && (
              <Meta label="fréquence — target/période = poids de tirage">
                {a.actions.some((x) => x.target) ? (
                  <span className="mono" style={{ fontSize: 11, color: C.faint, fontStyle: "italic" }}>
                    pilotée par action ci-dessous (ce champ est ignoré)
                  </span>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input className="in mono" type="number" min="0" value={a.target ?? a.perWeek ?? 1}
                      onChange={(e) => upd(a.id, { target: Math.max(0, parseInt(e.target.value) || 0) })}
                      style={{ width: 34, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: C.text }} />
                    <div style={{ display: "flex", gap: 4 }}>
                      {["day", "week"].map((p) => (
                        <button key={p} className={`chip ${(a.period || "week") === p ? "on" : ""}`}
                          onClick={() => upd(a.id, { period: p })}>{p === "day" ? "/j" : "/sem"}</button>
                      ))}
                    </div>
                    <span className="mono" style={{ fontSize: 10, color: C.faint }}>
                      ≈ {((a.target ?? a.perWeek ?? 1) / (a.period === "day" ? 1 : 7)).toFixed(2)} poids/j
                    </span>
                  </div>
                )}
              </Meta>
            )}
          </div>

          {/* stages — the pipeline funnel, in order (the app serves the one that's starving) */}
          {a.kind === "pipeline" && (
            <div style={{ marginBottom: 22 }}>
              <div className="lab" style={{ marginBottom: 10 }}>stages — the funnel, in order</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                {(a.stages || []).map((s, i) => (
                  <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span className="mono" style={{ fontSize: 10, color: C.faint, width: 14, textAlign: "right" }}>{i + 1}</span>
                    <input className="in" value={s.text} placeholder="stage name"
                      onChange={(e) => editStage(a.id, s.id, { text: e.target.value })}
                      style={{ fontSize: 15, fontWeight: 300, fontStyle: s.text ? "normal" : "italic", color: s.text ? C.text : C.faint, borderBottom: `1px solid ${C.soft}`, paddingBottom: 5 }} />
                    <button className="ghost" onClick={() => moveStage(a.id, s.id, -1)} style={{ opacity: i === 0 ? 0.25 : 1, padding: "0 2px" }} aria-label="move up">↑</button>
                    <button className="ghost" onClick={() => moveStage(a.id, s.id, 1)} style={{ opacity: i === (a.stages.length - 1) ? 0.25 : 1, padding: "0 2px" }} aria-label="move down">↓</button>
                    <button className="x" onClick={() => delStage(a.id, s.id)}>×</button>
                  </div>
                ))}
                {!(a.stages || []).length && (
                  <div className="mono" style={{ fontSize: 11, color: C.faint, fontStyle: "italic" }}>no stages yet — add the funnel below</div>
                )}
              </div>
              <button className="link" style={{ marginTop: 12 }} onClick={() => addStage(a.id)}>+ stage</button>
            </div>
          )}

          {/* actions */}
          <div className="lab" style={{ marginBottom: 10 }}>actions — what shows up · m = minutes · target/période = sa propre cadence (vide = partage le poids de l'activité)</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
            {a.actions.map((ac) => (
              <div key={ac.id} style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <input className="in" value={ac.text} placeholder="a concrete action"
                  onChange={(e) => editAction(a.id, ac.id, { text: e.target.value })}
                  style={{ fontSize: 15, fontWeight: 300, fontStyle: ac.text ? "normal" : "italic", color: ac.text ? C.text : C.faint, borderBottom: `1px solid ${C.soft}`, paddingBottom: 5, flex: 1, minWidth: 120 }} />
                <input className="in mono" type="number" min="1" value={ac.min}
                  onChange={(e) => editAction(a.id, ac.id, { min: Math.max(1, parseInt(e.target.value) || 1) })}
                  style={{ width: 34, fontSize: 12, textAlign: "right", color: C.mut }} />
                <span className="mono" style={{ fontSize: 10, color: C.faint }}>m</span>
                {/* optional per-action target/period: blank target → shares the activity's pool
                    weight; a number → its own rate = target/period, drawn independently
                    (Linge, Clean…) — same fields the live engine (buildLotteryRows) reads */}
                <input className="in mono" type="number" min="0" value={ac.target ?? ""} placeholder="–"
                  onChange={(e) => editAction(a.id, ac.id, { target: e.target.value === "" ? null : Math.max(0, parseFloat(e.target.value) || 0) })}
                  style={{ width: 30, fontSize: 12, textAlign: "right", color: typeof ac.target === "number" ? C.text : C.faint }} />
                {typeof ac.target === "number" && (
                  <>
                    <div style={{ display: "flex", gap: 3 }}>
                      {["day", "week"].map((p) => (
                        <button key={p} className={`chip ${(ac.period || "week") === p ? "on" : ""}`}
                          onClick={() => editAction(a.id, ac.id, { period: p })}
                          style={{ fontSize: 10, padding: "2px 6px" }}>{p === "day" ? "/j" : "/sem"}</button>
                      ))}
                    </div>
                    <span className="mono" style={{ fontSize: 9.5, color: C.faint }}>
                      ≈ {(ac.target / (ac.period === "day" ? 1 : 7)).toFixed(2)}/j
                    </span>
                  </>
                )}
                <button className="x" onClick={() => delAction(a.id, ac.id)}>×</button>
              </div>
            ))}
          </div>
          <button className="link" style={{ marginTop: 12 }} onClick={() => addAction(a.id)}>+ action</button>

          {/* progress items / pipeline pieces */}
          <div className="lab" style={{ margin: "22px 0 10px" }}>{a.kind === "pipeline" ? "pieces — where each sits in the funnel" : "progress — pieces, materials, milestones"}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {a.items.map((it) => {
              const isPipe = a.kind === "pipeline";
              const st = (a.stages || [])[it.stage ?? 0];
              const stageTxt = st ? st.text : "—";
              const isDone = !isPipe && it.status === "done";
              return (
              <div key={it.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button className="chip" onClick={() => cycleItem(a.id, it.id)}
                  title={isPipe ? "set stage (setup / correction)" : "cycle status"}
                  style={{ minWidth: 64, color: isPipe ? C.mut : statusColor(it.status), borderColor: isDone ? C.bone : C.line }}>{isPipe ? stageTxt : it.status}</button>
                <span style={{ flex: 1, fontSize: 14, fontWeight: 300, color: isDone ? C.mut : C.text, textDecoration: isDone ? "line-through" : "none" }}>{it.text}</span>
                <button className="x" onClick={() => delItem(a.id, it.id)}>×</button>
              </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 10, alignItems: "center" }}>
            <input className="in" value={itemDraft} placeholder={a.kind === "pipeline" ? "add a piece (e.g. a phrase)" : "add one"}
              onChange={(e) => setItemDraft(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { addItem(a.id, itemDraft); setItemDraft(""); } }}
              style={{ fontSize: 14, fontStyle: "italic", borderBottom: `1px solid ${C.soft}`, paddingBottom: 4 }} />
            <button className="link" onClick={() => { addItem(a.id, itemDraft); setItemDraft(""); }}>add</button>
          </div>

          {/* note: mechanics only (rules, constraints, structure) — human-authored,
              Claude never rewrites this field (24/07 split, see coachViaClaude). */}
          <div className="lab" style={{ margin: "22px 0 8px" }}>note — mécanique (fixe)</div>
          <textarea className="in" rows={2} value={a.note} onChange={(e) => upd(a.id, { note: e.target.value })}
            placeholder="règles, contraintes, structure — édité ici, jamais par Claude"
            style={{ fontSize: 14, fontWeight: 300, lineHeight: 1.5, fontStyle: a.note ? "normal" : "italic", color: a.note ? C.text : C.faint }} />

          {/* observations: living memory, grown by coachViaClaude after each session
              with a text comment — editable here only to prune, not the source. */}
          <div className="lab" style={{ margin: "22px 0 8px" }}>observations — mémoire (écrite par Claude)</div>
          <textarea className="in" rows={3} value={a.observations || ""} onChange={(e) => upd(a.id, { observations: e.target.value })}
            placeholder="s'accumule après chaque session commentée — rien pour l'instant"
            style={{ fontSize: 14, fontWeight: 300, lineHeight: 1.5, fontStyle: a.observations ? "normal" : "italic", color: a.observations ? C.text : C.faint }} />
        </div>
      )}
    </div>
  );
}
function Meta({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
      <span className="lab">{label}</span>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Throughline />);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
