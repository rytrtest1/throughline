<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================
 * BALANCE (née throughline) — the daily engine
 * You tell it how much time you have; it tells you one thing to do.
 * No menu to skip through, no streaks, no scores. A record you own.
 * ============================================================ */

// ---------- storage (localStorage so it survives reloads) ----------
const mem = {};
const store = {
  async get(k) {
    try { if (typeof localStorage !== "undefined") return localStorage.getItem(k); } catch {}
    return k in mem ? mem[k] : null;
  },
  async set(k, v) {
    try { if (typeof localStorage !== "undefined") { localStorage.setItem(k, v); return; } } catch {}
    mem[k] = v;
  },
};
async function loadJSON(key, fb) {
  const raw = await store.get(key);
  if (raw == null) return fb;
  try { return JSON.parse(raw); } catch { return fb; }
}
const saveJSON = (key, v) => store.set(key, JSON.stringify(v));

// ---------- dates ----------
const pad = (n) => String(n).padStart(2, "0");
const keyOf = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
// debug: override the current date+time for simulation (null = real clock)
let _debugDate = null;
const realNow = () => _debugDate ? new Date(_debugDate) : new Date();
// the "day" for logging/caps rolls over at 9am, not midnight — Maxence is often
// still awake past midnight and always asleep by 9am, so a midnight cutoff would
// split one waking stretch across two calendar days. Only affects date KEYS
// (todayKey/daysAgoKey); wall-clock gates that care about the actual
// hour (meal times, work-shift boundaries) still read realNow() directly. Decided 10/07.
const DAY_PIVOT_HOUR = 9;
const logicalNow = (d = realNow()) => { const x = new Date(d); x.setHours(x.getHours() - DAY_PIVOT_HOUR); return x; };
const todayKey = () => keyOf(logicalNow());
const stampKey = () => { const d = new Date(); return `${keyOf(d)}-${pad(d.getHours())}${pad(d.getMinutes())}`; };
const fromKey = (s) => new Date(s + "T00:00:00");
const daysAgoKey = (n) => { const d = logicalNow(); d.setDate(d.getDate() - n); return keyOf(d); };
const daysBetween = (a, b) => Math.round((fromKey(b) - fromKey(a)) / 86400000);
const fmtLong = (s) => fromKey(s).toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
const fmtHM = (d) => `${pad(d.getHours())}h${pad(d.getMinutes())}`;
const uid = () => Math.random().toString(36).slice(2, 9);

// manual place override — the "dehors" footer link toggles this for today
// (Maxence 20/07: any user should be able to flip it, but it can't clutter the
// épuré main screen — so it lives below the fold, same weight as save/load/key).
// Persisted keyed to the logical day so it self-expires at the next 9h pivot
// instead of needing an explicit clear — same "no verdict moment" shape as the
// rest of the engine.
function placeOverride() {
  try {
    const raw = localStorage.getItem("placeOverride");
    if (!raw) return null;
    const o = JSON.parse(raw);
    return o.day === todayKey() ? o.place : null;
  } catch { return null; }
}
const fmtMin = (m) => { if (!m) return "0m"; if (m < 60) return m + "m"; const h = Math.floor(m / 60), r = m % 60; return r ? `${h}h ${r}m` : `${h}h`; };

// ---------- domains ----------
const DOMAINS = [
  { key: "physical", label: "physical" },
  { key: "creative", label: "creative" },
  { key: "learning", label: "learning" },
  { key: "rest",     label: "rest" },
  { key: "mind",     label: "mind" },
  { key: "social",   label: "social" },
  { key: "chore",    label: "chore" },
];
const DKEYS = DOMAINS.map((d) => d.key);
// color removed (13/07) — the app is monochrome; every domain reads as one neutral mark.
const dColor = () => C.mut;
const WHERES = ["home", "anywhere", "out", "work"];
// "recommandeur" = a practice whose action is generated by Claude at proposal time
// from the taste profile in `note` + done history (Film, music, meal prep…). Until
// that generation lands it behaves like a practice that picks from actions[].
const KINDS = ["practice", "task", "pipeline", "recommandeur"];
// Default funnel for a new pipeline activity — the locked erasure model.
// Erasure = a pipeline: the app serves the stage that's starving the funnel.
const ERASURE_STAGES = ["Accroches", "Mots favoris", "Groupes", "Poème", "Forme"];
const mkStages = (labels) => labels.map((t) => ({ id: uid(), text: t }));

// ---------- seed (everything editable) ----------
const A = (name, domain, where, perWeek, actions, kind = "practice", items = [], stages = []) => ({
  id: uid(), name, domain, where, perWeek, kind, done: false,
  actions: actions.map(([text, min]) => ({ id: uid(), text, min })),
  items: items.map((t) => ({ id: uid(), text: t, status: "doing" })),
  stages: mkStages(stages),
  note: "",
});
// Generic starter set — a blank canvas. Edit these (or wipe them) in the
// Activities tab to make the app your own. Your real setup lives in your
// own saved data / backup file, not here.
const SEED = [
  A("Move your body", "physical", "home", 5, [["Do a short workout", 20], ["Go for a walk", 30]]),
  A("Get outside", "physical", "out", 2, [["Go for a longer walk or activity", 60]]),
  A("Make something", "creative", "anywhere", 3, [["Spend a focused block creating", 25], ["Sketch a quick idea", 15]]),
  A("Practice a skill", "learning", "home", 3, [["Practice your current thing", 25]]),
  A("Learn a little", "learning", "anywhere", 3, [["Study for a short block", 15]]),
  A("Read", "rest", "anywhere", 4, [["Read for a while", 20]]),
  A("Rest on purpose", "rest", "home", 2, [["Do something restful and intentional", 30]]),
  A("Reach out", "social", "anywhere", 2, [["Message or call someone", 10]]),
  A("Tidy / chore", "chore", "home", 1, [["Knock out one chore", 20]]),
];

// ---------- engine (loterie proportionnelle) ----------
// Every eligible action gets pulled into the draw with a weight = target/period
// (a rate — e.g. 5/week → 0.71/day, 1/day → 1/day). One weighted random draw,
// every single time. No "due" state, no calendar reset, no catch-up, no memory
// beyond not repeating the exact previous pick. Over any long enough stretch the
// observed frequency converges to the target ratio (law of large numbers) — but
// no single week is guaranteed. That trade is intentional: a deterministic
// catch-up (serve whoever's most overdue) makes the numbers exact but is "n'importe
// quoi" to live with day to day; a pure weighted lottery is simple, matches how
// Maxence actually thinks about it (target ⇒ share of the draws), and variance
// around the average is an accepted cost, not a bug. Decided 09/07 — replaces the
// old chapeau (due/calendar-reset lottery) and the counter/argmax engine (v7/v8),
// both removed.

const WORK_SUNDAY_ANCHOR = new Date(2026, 5, 7);
function isWorkShift(d = new Date()) {
  const h = d.getHours();
  let startDay, startDate;
  if (h >= 20) { startDay = d.getDay(); startDate = new Date(d); }
  else if (h < 8) { startDay = (d.getDay() + 6) % 7; startDate = new Date(d); startDate.setDate(startDate.getDate() - 1); }
  else return false;
  if (startDay === 4 || startDay === 5 || startDay === 6) return true;
  if (startDay === 0) {
    const a = new Date(WORK_SUNDAY_ANCHOR); a.setHours(0, 0, 0, 0);
    const s = new Date(startDate); s.setHours(0, 0, 0, 0);
    const weeks = Math.round((s - a) / (7 * 86400000));
    return ((weeks % 2) + 2) % 2 === 0;
  }
  return false;
}
const computePlace = (d) => {
  if (d === undefined) {
    const ov = placeOverride();
    if (ov) return ov;
    d = realNow();
  }
  return isWorkShift(d) ? "work" : "home";
};
// is a work shift starting tonight? (used to drop work-day-only activities like
// tapis, which belongs to a free day, not the 1h home window before a shift)
const isWorkDayToday = (d = realNow()) => isWorkShift(new Date(d.getFullYear(), d.getMonth(), d.getDate(), 21, 0, 0));
// hours elapsed since the CURRENT shift started (20:00 on whichever calendar day
// isWorkShift's own start-branch lands on — see isWorkShift above). null outside
// any shift window. Used to gate écoute/film/podcast past the point they become
// deconcentrating at work (Maxence 16/07: "reste aux aguets si quelqu'un arrive").
function hoursSinceShiftStart(d = realNow()) {
  const h = d.getHours();
  let start;
  if (h >= 20) start = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 20, 0, 0);
  else if (h < 8) { const p = new Date(d); p.setDate(p.getDate() - 1); start = new Date(p.getFullYear(), p.getMonth(), p.getDate(), 20, 0, 0); }
  else return null;
  return (d.getTime() - start.getTime()) / 3600000;
}
// exactly 2 days before a work stretch STARTS (not every day within 2 days of one —
// e.g. Wed sits 2 days from Fri too, but Fri is mid-stretch since Thu already started
// it, so Wed must stay excluded). Used to gate meal-prep focaccia: found proposed on
// a Sunday (Maxence 10/07: "seulement j-2 travail" — cohérent seulement 2 jours avant
// le manque de temps réel du boulot, pas n'importe quand).
const isTwoDaysBeforeWorkStretch = (d = realNow()) => {
  const plus = (n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  return !isWorkDayToday(d) && !isWorkDayToday(plus(1)) && isWorkDayToday(plus(2));
};
// garniture's deadline day, one day after focaccia's — the day right before the
// work stretch starts (Maxence 11/07-b).
const isOneDayBeforeWorkStretch = (d = realNow()) => {
  const plus = (n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  return !isWorkDayToday(d) && isWorkDayToday(plus(1));
};
const isDone = (e) => e.type !== "note";
// a real completion, as opposed to a free-text "note" entry (submitFreeLog) — used
// wherever "clics" are counted (rapport gate, sandbox banners) so jotting a note
// never inflates the count of activities actually done.
const isClick = (e) => e.type === "done";
// how many of the last 7 calendar days are free (not a work day) — a skipWorkDays
// daily activity (Tapis) can never be drawn on a work day, so its true weekly
// quota is target × free days, not target × 7 (used by domainBalance below).
function freeDaysInRollingWeek() {
  let n = 0;
  const base = logicalNow();
  for (let i = 0; i <= 6; i++) {
    const d = new Date(base); d.setDate(d.getDate() - i);
    if (!isWorkDayToday(d)) n++;
  }
  return n;
}

// --- period helpers ---
const PERIOD = { day: 1, week: 7 };
function periodDays(period) { return period === "day" ? 1 : 7; }

function minutesInPeriod(log, actId, actionId, period) {
  const since = daysAgoKey(period === "day" ? 0 : 6);
  return log
    .filter((e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e))
    .reduce((s, e) => s + (e.min || 0), 0);
}
// completionsInPeriod feeds the "liste" tab readout (x/target this period) and,
// for day-period rows, the hard day cap in buildLotteryRows below.
function completionsInPeriod(log, actId, actionId, period, opts = {}) {
  // week branch is rolling too (fixed 11/07): this fed the "x/target this period"
  // readout with a calendar-Monday cliff while the actual draw engine below already
  // used a rolling 7 days — the readout could show "0/1 this week" right after a
  // Monday rollover for something the engine already correctly counted as satisfied
  // (done last Thursday), a real display/engine disagreement, not just cosmetic.
  const since = period === "day" ? todayKey() : daysAgoKey(6);
  return log.filter(
    (e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e)
      && (!opts.requireFinish || e.finished)
      && (!opts.requireProgress || e.progressed)
  ).length;
}
// rolling 7-day completions, for the week-period draw cap below — deliberately not
// a calendar-Monday cliff (the exact "reset hebdo" shape tried and dropped three
// times this summer for the creative pipelines). No calendar-week counting is left
// anywhere in the app (weekStartKey itself removed 11/07 — the two remaining
// calendar-week readouts, "liste" progress and the dashboard's "this week" panel,
// were disagreeing with this engine cap, e.g. showing "0/1 this week" for something
// already satisfied per the rolling window). A rolling window
// has no reset instant: the cap loosens by one day at a time as old sessions age out,
// never a verdict moment (decided 10/07).
function completionsInRollingWeek(log, actId, actionId) {
  const since = daysAgoKey(6);
  return log.filter((e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e)).length;
}

// domain balance — how unevenly the rolling week's satisfaction (done/target,
// capped at 1 so over-performing one domain buys no credit elsewhere) is spread
// across domains. 0 = every active domain roughly on pace, 1 = one domain fully
// idle while another is fully satisfied. A week of total silence yields 0 for
// every domain equally, so it stays flat rather than reading as a verdict on
// absence (decided 11/07, see [[throughline-blocker-juste-milieu]]).
function domainBalance(activities, log) {
  const byDomain = {};
  const freeDays = freeDaysInRollingWeek();
  const toWeekly = (target, period, skipWorkDays) => {
    if (period !== "week" && skipWorkDays) return target * freeDays;
    return period === "week" ? target : target * 7;
  };
  activities.forEach((a) => {
    const acts = a.actions || [];
    const perActionTargets = acts.some((x) => x.target);
    const d = byDomain[a.domain] || (byDomain[a.domain] = { target: 0, done: 0 });
    if (perActionTargets) {
      acts.forEach((action) => {
        if (!action.target) return;
        d.target += toWeekly(action.target, action.period || a.period || "week", a.skipWorkDays);
        d.done += completionsInRollingWeek(log, a.id, action.id);
      });
    } else if (a.target && a.period) {
      d.target += toWeekly(a.target, a.period, a.skipWorkDays);
      d.done += completionsInRollingWeek(log, a.id, null);
    }
  });
  const ratios = Object.values(byDomain)
    .filter((d) => d.target > 0)
    .map((d) => Math.min(1, d.done / d.target));
  if (ratios.length < 2) return 0;
  return Math.max(...ratios) - Math.min(...ratios);
}

// place filters — v4 adds where:"work" (film, work-only)
function placeOkW(where, place) {
  if (where === "work") return place === "work";
  if (place === "work") return where === "anywhere";
  if (place === "out") return where === "out" || where === "anywhere";
  return true;
}
function placeOk(a, place) { return placeOkW(a.where, place); }

// --- pipeline picker ---
// One active piece at a time (decided 04/07): if a piece is live, the funnel always
// serves the next step on THAT piece — deterministic, no lottery. A fresh piece only
// starts once none is live. Fixed 11/07 (Maxence): the LAST stage is itself a session
// to actually do and finish, not an automatic terminal marker — "stage === last"
// means the piece is currently being mastered, still live; it only graduates once a
// session AT that last stage reports it done (see advanceViaClaude's ns > last).
// Before this fix, reaching the last stage's index instantly counted as "done", so
// the funnel jumped straight to "choisir nouvelle pièce" the very next draw without
// the mastery/final-stage session ever actually being served (a_cover "rosalia
// magnolia" case, 14/07).
function pipelineStep(a) {
  const stages = a.stages || [];
  if (!stages.length) return null;
  const last = stages.length - 1;
  const label = (i) => (stages[i] ? stages[i].text : "—");
  const live = (a.items || []).find((it) => typeof it.stage === "number" && it.stage <= last);
  if (!live) return { id: uid(), text: `${label(0)} — nouvelle pièce`, min: 15, pieceId: null, pieceStage: 0, fresh: true };
  return { id: uid(), text: `${label(live.stage)} — « ${live.text} »`, min: 15, pieceId: live.id, pieceStage: live.stage, fresh: false };
}

// --- items[] LRU picker (Chant micro, Ordre, Clean, Cuisiner…) ---
function hasDoingItems(a) {
  return (a.kind === "practice" || a.kind === "recommandeur") && (a.items || []).some((it) => it.status === "doing");
}
// shared LRU: among items[status=doing], pick the one least recently logged (by
// itemId in the log) — weighted so longer-idle items are favoured, not fixed.
function pickItemLRU(a, log, base) {
  const doing = (a.items || []).filter((it) => it.status === "doing");
  if (!doing.length) return base;
  const scored = doing.map((it) => {
    let last = null;
    for (const e of log) if (e.activityId === a.id && isDone(e) && e.itemId === it.id && (!last || e.date > last)) last = e.date;
    return { it, w: (last ? daysBetween(last, todayKey()) : 999) * (0.7 + Math.random() * 0.6) };
  });
  const chosen = scored.sort((x, y) => y.w - x.w)[0].it;
  return { id: base.id, text: chosen.text, min: base.min, dur: base.dur, itemId: chosen.id };
}
function itemStep(a, log) {
  return pickItemLRU(a, log, a.actions[0] || { id: uid(), text: "—", min: 15 });
}

// --- vaisselle: derived straight from the log (cooked − washed, whole history), not
// kept in a separate piece of state that resets to 0 on every reload. A completed
// meal-prep/cuisiner session queues a dish session; a completed vaisselle clears one.
// Fixed 10/07: was clipped to weekStartKey (this calendar week only), which could
// silently drop a cook logged just before a Monday boundary (its dish never counted
// once the week rolled over) — chronological cooked−washed pairing has to run over
// the whole log, not just "present this week", or the two directions of the
// mismatch (missed debt vs. stale repropose) both stay possible.
// No freshness/staleness window here (tried one 11/07, Maxence rejected it as
// overcomplicated): "0 vaisselle à proposer si pas de cuisine, 1 vaisselle à
// proposer si cuisine, et une fois faite 0" — plain cooked − washed, nothing else.
// The earlier "vaisselle sans cuisine" confusion traced back to a 2-month sim
// export and a stray non-sandbox screenshot, not this function.
function pendingVaisselleFrom(log) {
  const cooked = log.filter((e) => (e.activityId === "a_mealprep" || e.activityId === "a_cuisiner") && isDone(e)).length;
  const washed = log.filter((e) => e.activityId === "a_vaisselle" && isDone(e)).length;
  return Math.max(0, cooked - washed);
}

// --- cuisiner: only proposed around meal times, never mid-afternoon ---
function isMealTime(now) {
  const h = now.getHours() + now.getMinutes() / 60;
  return (h >= 11.5 && h < 13.5) || (h >= 18 && h < 20.5);
}

// --- meal prep sequencing: same toggle pattern as vaisselle (Maxence 11/07, asked
// explicitly to make both pairs work identically) — a validated bake ("cuire la
// focaccia") is owed one garniture; once that garniture is validated, none is
// owed again until the next bake. Debt-counted like pendingVaisselleFrom, no
// staleness ceiling (an earlier 48h-expiry attempt was overcomplicating exactly
// what he'd just rejected for vaisselle — dropped).
// Fixed 16/07 (Maxence): the debt used to key off "préparer la focaccia" (mixing
// the dough) plus a blind 24h rest timer as a stand-in for "it must be baked by
// now" — but a slow/late bake could still leave garniture proposed on dough that
// wasn't actually cooked yet. "cuire la focaccia" is a new action, logged only
// through the free-text field at the bottom of the app (never drawn/proposed,
// see its skip in buildLotteryRows below) — it's the real-world bake event, so
// the debt and the rest-timer both key off it directly now; no more guessing.
function lastCuireTs(log) {
  let ts = null;
  for (const e of log) if (e.activityId === "a_mealprep" && e.actionId === "x_mp_cuire" && isDone(e) && (!ts || e.ts > ts)) ts = e.ts;
  return ts;
}
function pendingGarnitureFrom(log) {
  const cuit = log.filter((e) => e.activityId === "a_mealprep" && e.actionId === "x_mp_cuire" && isDone(e)).length;
  const garniture = log.filter((e) => e.activityId === "a_mealprep" && e.actionId === "x_mp_garniture" && isDone(e)).length;
  return Math.max(0, cuit - garniture);
}
// hour-of-day deadline (Maxence 11/07-b, replacing an earlier click-count
// version): focaccia (préparer) is only ever eligible on its one J-2 day, garniture
// ramps on J-1 and the work day(s) themselves (Maxence 16/07: "le jour J du travail
// (plus J-1)" — a debt still open by the day the stretch starts shouldn't lose its
// urgency) — miss the whole window and it just goes back to being an ordinary
// undated debt (garniture) or waits a full cycle (focaccia). A click-count
// guarantee meant a slow-click day could never reach the threshold at all; a
// wall-clock deadline holds regardless of how much the app got used that day.
// Both ramp up in pickAging's weight() as this hour approaches, forced outright
// at/after it on their respective deadline day(s).
const FOCACCIA_GARNITURE_DEADLINE_HOUR = 20;
// écoute/film/podcast at work: deconcentrating past a few hours in (Maxence
// 16/07 — "reste aux aguets si quelqu'un arrive"). Dropped from the pool
// entirely once past the threshold, same as any other placeOkW mismatch —
// not damped/ramped like the focaccia/garniture deadlines above, since this
// isn't a debt that needs to fire eventually, just a window that closes.
const WORK_LISTEN_GATE_HOURS = 5;
const WORK_LISTEN_GATE_IDS = new Set(["a_film", "a_podcast", "a_ecoute_titre", "a_ecoute_album"]);
// which cook created the OLDEST still-open dish debt (Maxence 11/07: "l'app
// propose peu de temps après l'action qui ramène à 0" — eligible ≠ prioritized;
// pickAging's weight() ages a row off when THAT ROW was last done, so a vaisselle
// done yesterday for an earlier debt would still read as "just done" and get
// starved even though a brand-new cook just re-opened the debt. This timestamp
// lets weight() age off the triggering cook instead — see its use in pickAging).
function oldestUnresolvedCookTs(log) {
  const cooked = log.filter((e) => (e.activityId === "a_mealprep" || e.activityId === "a_cuisiner") && isDone(e)).sort((x, y) => x.ts - y.ts);
  const washed = log.filter((e) => e.activityId === "a_vaisselle" && isDone(e)).length;
  return cooked[washed] ? cooked[washed].ts : null;
}

// --- build the draw pool: every eligible action right now, weighted by its
// rate (target ÷ period-in-days), filtered by place plus the same hand-wired
// correctness gates as before (vaisselle needs a pending dish, garniture needs
// focaccia first, cuisiner only at meal times). Those correctness gates are
// physical/causal constraints, not pacing — always enforced, no bypass (fixed
// 10/07-j: relax used to drop them too, which let e.g. garniture fire with zero
// prior focaccia ever logged; caught by Maxence eyeballing a Monday-evening
// garniture in the day-by-day widget). DAY/WEEK quota is the only thing
// `skipQuota` ever bypasses — tried making it fully continuous (10/07-b, no
// exclusion ever, just damped weight) and measured it WORSE in realistic
// conditions: without a hard floor, a day-period row (rate=1/day, the highest
// in the pool) can still win a second draw the same day purely by luck whenever
// the rest of the pool happens to roll low, even while untouched weekly rows
// sit right there — simWeek at 15 draws/day over a week gave Livre 14/7 (x2)
// continuous vs 10/7 (x1.4) with the hard gate. So: hard gate for the normal
// draw (a day-period row simply isn't offered again today once it's had its one
// turn, reopens at midnight; a week-period row the same over the rolling 7 days
// — no calendar cliff, loosens a day at a time) — but the skipQuota fallback
// below (only reached once the WHOLE pool is simultaneously gated shut) damps
// by `over` instead of using raw rate, so it doesn't snowball (measured 10/07:
// a day anchor hit 8x its target in one long saturated session).
function buildLotteryRows(activities, log, place, skipQuota = false) {

  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    if (attempt > 0) await new Promise((r) => setTimeout(r, 1000 * 2 ** (attempt - 1)));
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
        "content-type": "application/json",
      },
      body: JSON.stringify({
        model: "claude-opus-4-8",
        max_tokens: maxTokens,
        messages: [{ role: "user", content: prompt }],
        output_config: { format: { type: "json_schema", schema } },
        ...(tools ? { tools } : {}),
      }),
    });
    if (!res.ok) {
      const retryable = res.status === 429 || res.status >= 500;
      if (retryable && attempt < maxAttempts - 1) continue;
      let detail = "";
      try { detail = (await res.json())?.error?.message || ""; } catch {}
      throw new Error("http " + res.status + (detail ? " — " + detail : ""));
    }
    const data = await res.json();
    const txt = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("");
    return JSON.parse(txt);
  }
}

// ---------- recommandeur: named suggestion generated at proposal time ----------
// Reads the taste profile from activity.note + last 20 session notes, returns a
// one-line string ("title — subtitle") to replace the generic action text.
// When the activity also keeps a curated items[] library (e.g. Cuisiner's recipe
// rotation), the deterministic LRU pick still runs first (in pickAging()) — this only
// dresses that choice up, or occasionally proposes something outside it. The
// library keeps driving the rotation; recommandeur doesn't replace it.
async function generateReco(key, activity, action, log) {
  const recent = log
    .filter((e) => e.activityId === activity.id && isDone(e))
    .slice(-20)
    .map((e) => e.note || e.actionText || "")
    .filter(Boolean);
  const library = (activity.items || []).filter((it) => it.status === "doing").map((it) => it.text);
  const usesLibrary = !!action.itemId && library.length > 0;
  const prompt = `Tu es le moteur de recommandation pour : « ${activity.name} » (${activity.domain}).

Profil de goûts / contraintes :
"""
${activity.note || "(pas de profil)"}
"""

Action proposée : « ${action.text} »
${library.length ? `\nBibliothèque actuelle (déjà validée par Maxence, à conserver comme base) :\n${library.map((t) => "- " + t).join("\n")}\n` : ""}
Sessions récentes (à ne pas répéter immédiatement) :
${recent.length ? recent.join("\n") : "(aucune)"}

${usesLibrary
    ? `La rotation a déjà choisi « ${action.text} » dans la bibliothèque ci-dessus. Présente CE choix comme une recommandation concrète et engageante (garde le nom reconnaissable ; tu peux ajouter un détail qui donne envie). N'en propose un autre que si celui-ci a visiblement été refait trop souvent récemment — et dans ce cas choisis un AUTRE item de la bibliothèque, jamais hors-liste.`
    : `Génère UNE recommandation concrète et nommée qui colle au profil et l'élargit légèrement${library.length ? ", en dehors de la bibliothèque ci-dessus (c'est le mode découverte)" : ""}. Pas la valeur sûre évidente — quelque chose d'adjacent qui surprend un peu.`}
Garde le nom de l'œuvre EXACTEMENT tel qu'il apparaît dans la bibliothèque ci-dessus (il est déjà validé par Maxence — ne le modifie pas). N'ajoute un sous-titre (artiste, réalisateur, note courte) que si tu en es sûr ; dans le doute, laisse le sous-titre vide plutôt que d'inventer un détail biographique.
Réponds avec un titre court (nom de l'œuvre, du plat, du morceau…) et un sous-titre optionnel (artiste, réalisateur, note courte…).`;
  // No web_search: the item is already a real, Maxence-curated entry from items[] —
  // there is nothing to "confirm exists". This call only dresses that known item up
  // (subtitle/detail), so it's a plain fast JSON call (~3s), not a 20-40s tool run.
  // Decided 13/07 — the web_search guard only ever mattered for the (now-dead)
  // discovery path where Claude invented a reco outside the library.
  const out = await claudeJSON(key, prompt, {
    type: "object",
    properties: { title: { type: "string" }, subtitle: { type: ["string", "null"] } },
    required: ["title", "subtitle"],
    additionalProperties: false,
  }, 400);
  // title/desc kept separate (not pre-joined) — the "now" line shows only the title,
  // subtitle (artist/director/note) lives in the collapsible description below it.
  return { title: out.title, desc: out.subtitle || "" };
}

function Throughline() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("now");
  const [activities, setActivities] = useState([]);
  const [log, setLog] = useState([]);
  const loaded = useRef(false);

  // now-flow
  const [place, setPlace] = useState(computePlace());
  const [stage, setStage] = useState("entry"); // entry | proposal | running | empty | done
  const [current, setCurrent] = useState(null);
  const [lastId, setLastId] = useState(null);
  const [simRes, setSimRes] = useState(null); // SIM-only: last batch-run result (real, committed — see runSimBatch)
  const [simCfg, setSimCfg] = useState({ jours: 7, tirages: 10 }); // editable batch-run conditions

  // the live line. While "running", it fills from the CENTRE outward as real time
  // elapses — reaching the margins at the action's estimated minutes, then spilling
  // past them (dépassement) if you keep going. No clock is ever shown: the line is
  // the only feedback. A few seconds = a sliver; the whole time = full; beyond = overflow.
  const [running, setRunning] = useState(false);
  const [startedAt, setStartedAt] = useState(0);
  const [elapsedMs, setElapsedMs] = useState(0);
  // pause — for a real interruption mid-session (phone call, someone at the door).
  // freezes the line; resuming shifts startedAt forward by the paused gap so the
  // logged time excludes it. Distinct from the sandbox's "+5m/+10m" time-travel pause.
  const [paused, setPaused] = useState(false);
  const pauseStartRef = useRef(0);
  const togglePause = () => {
    if (paused) { setStartedAt((s) => s + (Date.now() - pauseStartRef.current)); setPaused(false); }
    else { pauseStartRef.current = Date.now(); setPaused(true); }
  };

  // declared up here (not down with the rest of the ambient/idle-timer logic
  // below) because the media session effect right below needs both — a
  // dependency array is evaluated at the useEffect() call site itself, during
  // the same synchronous render pass, so referencing a not-yet-declared const
  // there is a real TDZ error, unlike a closure that only reads it on a later,
  // async invocation (found the hard way: "Cannot access 'ambient' before
  // initialization").
  const [ambient, setAmbient] = useState(false);
  const stageRef = useRef(stage); // read fresh inside listeners below (media session, devicemotion, idle timer) — avoids stale closures
  stageRef.current = stage;

  // "ligne présence" scoped down to what a PWA can actually do (Maxence 19/07):
  // a real, near-silent, looping audio keeps a genuine OS Media Session alive, so
  // the lock screen/notification shade gets real play/pause controls while a
  // session runs — mapped straight onto the existing togglePause above, no new
  // concept. Bonus (not the point, just true on his phone): on Samsung/One UI a
  // live media session surfaces a small widget on the always-on display too,
  // covering part of the original "visible screen-off" ask with zero native code.
  // gain is near-zero, not exact 0 — some browsers filter genuinely-silent
  // streams out of the rules that keep background audio/media-session alive.
  const silentAudioRef = useRef(null);
  const silentCtxRef = useRef(null);
  useEffect(() => {
    if (typeof window === "undefined" || !(window.AudioContext || window.webkitAudioContext)) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const dest = ctx.createMediaStreamDestination();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      gain.gain.value = 0.0001;
      osc.connect(gain).connect(dest);
      osc.start();
      const el = document.createElement("audio");
      el.srcObject = dest.stream;
      el.loop = true;
      silentAudioRef.current = el;
      silentCtxRef.current = ctx;
    } catch (e) {}
  }, []);
  useEffect(() => {
    if (!("mediaSession" in navigator)) return;
    // extended 24/07 (Maxence: "et le always on display?") — the real AOD is
    // still out of reach (no API lets a web app draw on it), but this media
    // session trick is the one lever that DOES reach it, so widen its window to
    // match: alive during a running session (as before) OR whenever ambient is
    // showing (idle 30s+), not just during a session. Idle has no real activity
    // to name, so metadata falls back to plain "BALANCE" and playbackState reads
    // "paused" (nothing actually happening) rather than "playing".
    const runningActive = stage === "running";
    const active = runningActive || ambient;
    const el = silentAudioRef.current;
    if (runningActive && !paused) {
      silentCtxRef.current?.resume?.()?.catch(() => {});
      el?.play()?.catch(() => {});
      try { navigator.mediaSession.playbackState = "playing"; } catch (e) {}
    } else if (active) {
      silentCtxRef.current?.resume?.()?.catch(() => {});
      el?.play()?.catch(() => {});
      try { navigator.mediaSession.playbackState = "paused"; } catch (e) {}
    } else {
      el?.pause?.();
      try { navigator.mediaSession.playbackState = "none"; navigator.mediaSession.metadata = null; } catch (e) {}
    }
    if (active && typeof MediaMetadata !== "undefined") {
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: (runningActive && current?.action?.text) || "BALANCE",
          artist: (runningActive && current?.activity?.name) || "",
        });
      } catch (e) {}
    }
  }, [stage, paused, current, ambient]);
  useEffect(() => {
    if (!("mediaSession" in navigator)) return;
    // play/pause only meaningful mid-session — a tap while merely ambient/idle
    // (no real timer running) is a no-op rather than corrupting session state.
    try {
      navigator.mediaSession.setActionHandler("play", () => { if (stageRef.current === "running" && paused) togglePause(); });
      navigator.mediaSession.setActionHandler("pause", () => { if (stageRef.current === "running" && !paused) togglePause(); });
    } catch (e) {}
    return () => {
      try {
        navigator.mediaSession.setActionHandler("play", null);
        navigator.mediaSession.setActionHandler("pause", null);
      } catch (e) {}
    };
  }, [paused]);

  // long-press to swap: hold the line and it retracts to nothing, then re-picks.
  // there is no visible "something else" button — this is the only way to change.
  // the hold starts at 10s and DOUBLES with every skip (20s, 40s…), so skipping
  // gets costlier through the day. it resets to 10s each new day.
  const BASE_HOLD_MS = 10000;
  const [holding, setHolding] = useState(false);
  const [holdMs, setHoldMs] = useState(BASE_HOLD_MS);
  const [holdDate, setHoldDate] = useState(todayKey());
  const holdTimer = useRef(null);
  const holdStart = useRef(0);
  const holdStartX = useRef(0);
  const didHold = useRef(false);
  const draggedRating = useRef(false); // ratingActive: did this press actually move, or was it a plain tap?

  // debug time override
  const [manualMin, setManualMin] = useState("");
  const [debugDay, setDebugDay] = useState("");
  const [debugHour, setDebugHour] = useState("");
  // sandbox-only: which list row is being completed, + optional time/comment
  const [simEdit, setSimEdit] = useState(null);
  const [simMin, setSimMin] = useState("");
  const [simNote, setSimNote] = useState("");
  // sandbox-only: which list row has its target/period/where controls expanded —
  // lets Maxence tweak the catalogue right where he tests it, no tab switch
  const [paramEdit, setParamEdit] = useState(null);
  // sandbox-only: Activities editor filtered to the current place (audit 11/07 —
  // 22 cards is a wall; computePlace() already drives the real engine, reusing it
  // here needs no new concept). Off by default (shows everything, as before).
  const [placeFilterOn, setPlaceFilterOn] = useState(false);
  const [clock, setClock] = useState(0); // bump to re-render after a time jump

  const applyDebugTime = (day, hour) => {
    if (day && hour !== "") {
      _debugDate = new Date(`${day}T${String(parseInt(hour)).padStart(2,"0")}:00:00`);
    } else {
      _debugDate = null;
    }
    setClock((c) => c + 1);
    resetFlow();
  };
  // sandbox time travel: jump N days from the current (real or debug) moment,
  // keeping the hour, so dailies refill tomorrow and everything refills Monday.
  const jumpDays = (n) => {
    const base = _debugDate ? new Date(_debugDate) : new Date();
    base.setDate(base.getDate() + n);
    const d = keyOf(base), h = String(base.getHours());
    setDebugDay(d); setDebugHour(h); applyDebugTime(d, h);
  };
  const clockReal = () => { setDebugDay(""); setDebugHour(""); applyDebugTime("", ""); };
  // minute-precision sim clock: advance the current (debug or real) moment by N
  // minutes and freeze the clock there — used for pause buttons ("+1h de pause")
  // and to auto-advance when you log a session's real duration (do a 10min sudoku
  // at 16h00 → the clock reads 16h10 once you validate).
  const simAdvanceMinutes = (mins) => {
    const base = _debugDate ? new Date(_debugDate) : new Date();
    base.setMinutes(base.getMinutes() + mins);
    _debugDate = base;
    setDebugDay(keyOf(base)); setDebugHour(String(base.getHours()));
    setClock((c) => c + 1);
  };

  // misc
  const [msg, setMsg] = useState("");

  // after-session comment + the Claude bridge that advances pipeline pieces
  const [comment, setComment] = useState("");
  // mid-session comment confirmation (Maxence 17/07): submitRunningComment used to
  // clear the field with zero feedback — same class of gap as "done"'s syncMsg, just
  // missing here since a running note never touches the API. Brief local flash only.
  const [runNoteMsg, setRunNoteMsg] = useState("");
  // recommandeur (musique, film…): the line shows ONLY the title Claude picked — what
  // describes it (artist/director/note) sits in a dropdown, collapsed by default
  // (Maxence 12/07: "je veux qu'apparaisse seulement le titre... et ce qui décrit la
  // recommandation dans un champ séparé en dessous, genre drop-down").
  const [descOpen, setDescOpen] = useState(false);
  // Album de la semaine (Maxence 16/07, item 4 — redesigned same day per feedback:
  // no native <input type=range>, no separate review screen; reuse the hero line's own
  // visual language instead). albumTitles holds {id, text, rating(0-100)}; there is
  // always exactly one trailing empty slot (the title currently being typed/rated) —
  // advanceAlbumTitle() below commits it and opens the next one. albumIdx points at
  // whichever slot is focused (a dot tap can move it back to an earlier, already-
  // committed title to revise its rating). Only ever used when
  // current.activity.id === "a_ecoute_album" (see isAlbumActivity).
  const [albumTitles, setAlbumTitles] = useState([]);
  const [albumIdx, setAlbumIdx] = useState(0);
  // recommandeur rating (16/07-d, replaces the Claude-guessed doing/liked/neutral/
  // disliked status): the hero line itself becomes the rating control on "done" for
  // ANY recommandeur action (Film, Titre, Cuisiner, Album's overall verdict at the
  // very end…) — same centre-out drag read as the album per-title mini slider above,
  // just applied to the main line instead of a secondary one (Maxence 16/07: "garde
  // la valeur du curseur sur 100 donnée aux titres, c'est beaucoup mieux"). Default
  // 50 (neutral) if never touched, mirroring albumTitles' own default.
  const [rating, setRating] = useState(50);
  const [doneEntryId, setDoneEntryId] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [keyOpen, setKeyOpen] = useState(false);
  // rapport playback: auto-reveals each of the day's activities in order, then hands
  // control to the user (swipe/dots) once the sequence has run through once.
  const [reportIdx, setReportIdx] = useState(0);
  const [reportPhase, setReportPhase] = useState("playing"); // "playing" | "interactive"
  const reportTouchRef = useRef(null);
  // easter egg (Maxence 19/07): a long-press on the rapport header opens a hidden
  // breakout — one of today's real completions at a time, centre screen, broken
  // with a ball off the same line-as-paddle idiom used everywhere else. One target
  // visible at a time (never a grid — "un doigt, une ligne, jamais de liste" applies
  // here too), frozen at trigger time so it can't shift under him mid-game. No
  // score, no timer, no lose state — a missed ball just relaunches; clearing the
  // last target quietly fades back to the rapport, same "no verdict" ethos as the
  // rest of the app.
  const [gameQueue, setGameQueue] = useState([]);
  const [gameIdx, setGameIdx] = useState(0);
  const startGame = () => {
    const todayClicks = log.filter((e) => e.date === todayKey() && isDone(e) && isClick(e)).sort((a, b) => a.ts - b.ts);
    if (!todayClicks.length) return; // nothing logged today — silently no-op
    setGameQueue(todayClicks.map((e) => ({ id: e.id, text: e.actionText || "" })));
    setGameIdx(0);
    setStage("game");
  };
  // devicemotion's listener is registered once (empty deps, see below) — same
  // stale-closure problem startBalanceRevealRef already solves, same fix.
  const startGameRef = useRef(() => {});
  startGameRef.current = startGame;
  // physics run imperatively on refs (no per-frame React re-render), same style as
  // the LINE_MODE "tilt" sway elsewhere — only gameIdx (via setGameIdx) touches
  // React state, and only once per target actually cleared.
  const gameAreaRef = useRef(null);
  const gamePaddleRef = useRef(null);
  const gameBallRef = useRef(null);
  const gameTargetElRef = useRef(null); // the rendered text node — its real box IS the hitbox
  const PADDLE_W = 0.26, PADDLE_Y = 0.86, BALL_PX = 10;
  const gamePaddleXRef = useRef(0.5); // 0..1 fraction of play-area width, centre of the paddle
  const gameBallRef2 = useRef({ x: 0.5, y: 0.6, vx: 0, vy: 0 }); // ball physics state
  const gameIdxRef = useRef(0);
  gameIdxRef.current = gameIdx;
  const gameQueueRef = useRef([]);
  gameQueueRef.current = gameQueue;
  const onGamePaddleMove = (clientX) => {
    const el = gameAreaRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    if (!rect.width) return;
    const half = PADDLE_W / 2 + 0.02;
    gamePaddleXRef.current = Math.max(half, Math.min(1 - half, (clientX - rect.left) / rect.width));
  };
  useEffect(() => {
    if (stage !== "game") return;
    gamePaddleXRef.current = 0.5; // every game opens with the paddle centred
    const BALL_R_FRAC = 0.018;
    const launch = () => {
      const ang = Math.PI * (0.28 + Math.random() * 0.44); // upward cone, never dead-flat
      gameBallRef2.current = { x: 0.5, y: 0.62, vx: Math.cos(ang) * 0.00055, vy: -Math.abs(Math.sin(ang)) * 0.00055 };
    };
    launch();
    let alive = true, hitArmed = true, raf = null, lastTs = 0;
    const tick = (ts) => {
      if (!alive) return;
      const dt = lastTs ? Math.min(48, ts - lastTs) : 16;
      lastTs = ts;
      const st = gameBallRef2.current;
      const el = gameAreaRef.current;
      const rect = el ? el.getBoundingClientRect() : null;
      st.x += st.vx * dt;
      st.y += st.vy * dt;
      if (st.x < BALL_R_FRAC) { st.x = BALL_R_FRAC; st.vx = Math.abs(st.vx); }
      if (st.x > 1 - BALL_R_FRAC) { st.x = 1 - BALL_R_FRAC; st.vx = -Math.abs(st.vx); }
      if (st.y < BALL_R_FRAC) { st.y = BALL_R_FRAC; st.vy = Math.abs(st.vy); }
      // paddle bounce — only while descending, so it can't re-trigger mid-bounce.
      // outgoing angle depends on WHERE it lands (Maxence 19/07: "au centre dévié
      // normalement, à droite plus vers la droite" — classic breakout paddle-steer),
      // not a small nudge on top of the incoming velocity — the angle is fully
      // recomputed from hit offset so an edge hit reads as a sharp deflection.
      if (st.vy > 0 && st.y > PADDLE_Y - 0.02 && st.y < PADDLE_Y + 0.03) {

          const offset = Math.max(-1, Math.min(1, (st.x - gamePaddleXRef.current) / (PADDLE_W / 2)));

      // missed on multi-line titles and on the sides of short ones) — measured

      // padding around the glyphs for forgiveness, not tightness.

    const wantsClaude = !!text && (kind === "pipeline" || kind === "practice");
    if (wantsClaude) {
      const key = (await store.get("tlx_apiKey")) || "";
      if (key) { (kind === "pipeline" ? advanceViaClaude : coachViaClaude)(key, text); return; }
      setSyncMsg(kind === "pipeline" ? "pas de clé API — commentaire gardé, pièce non avancée" : "pas de clé API — commentaire gardé, observations non mises à jour");
      setTimeout(() => { setSyncMsg(""); finishFlow(text); }, 2200);
      return;
    }
    // task, or any recommandeur draw: no Claude round-trip, but still show the same
    // brief loading chip as pipeline/practice so submitting a comment reads
    // identically everywhere (Maxence 16/07 — écoute felt broken without it).
    if (text) {
      setSyncing(true); setSyncMsg("commentaire enregistré…");
      setTimeout(() => { setSyncing(false); setSyncMsg(""); finishFlow(text); }, 700);
      return;
    }
    finishFlow(text);
  };

  // mid-session comment (Maxence 16/07, round 8): Enter while running logs the
  // thought right away and clears the field, so several can go out over one
  // session — same "note" shape as the album titles (isDone/isClick skip it, it's
  // not a completion). Ending the session is still only the line tap (finish());
  // the field stays open afterward on "done" for a last word, untouched by this.
  const submitRunningComment = () => {
    const text = comment.trim();
    if (!text || !current) return;
    setLog((L) => [...L, {
      id: uid(), date: todayKey(), ts: realNow().getTime(), type: "note",
      activityId: current.activity.id, actionId: current.action.id, actionText: current.action.text,
      note: text,
    }]);
    setComment("");
    setRunNoteMsg("noté");
    setTimeout(() => setRunNoteMsg(""), 1600);
  };

  // section navigation — no tab bar; swipe left/right or tap the faint edge arrows.
  // prod is a single screen — the line. The activities editor lives in the sandbox
  // only now (13/07); the catalogue is edited in the files directly, not in-app.
  const TABS = SIM ? ["now", "liste", "simulateur", "activities"] : ["now"];
  const go = (dir) => {
    const i = TABS.indexOf(tab);
    const ni = Math.min(TABS.length - 1, Math.max(0, i + dir));
    if (ni === i) return;
    // Fixed 12/07 (Maxence): this used to call resetFlow() on arriving back at
    // "now", which silently wiped a running/awaiting-comment session — swiping to
    // "activities" and back was a free, unpenalised skip that bypassed the hold-
    // to-swap cost entirely. The flow state is already restored from tlx_flow on
    // reload; a same-session tab switch needs no reset at all.
    const t = TABS[ni]; setTab(t);
  };
  const touchRef = useRef(null);
  const onTouchStart = (e) => { const t = e.touches[0]; touchRef.current = { x: t.clientX, y: t.clientY }; };
  const onTouchEnd = (e) => {
    const s = touchRef.current; touchRef.current = null; if (!s) return;
    const t = e.changedTouches[0]; const dx = t.clientX - s.x, dy = t.clientY - s.y;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
  };

  // tap to begin — for timed activities the line pre-fills with already-done minutes this period
  const begin = () => {
    // med reminder card (see start()): never a real session — move straight to
    // an actual proposal instead, nothing logged, no click counted.
    if (current?.medReminder) { propose(); return; }
    lastStartDelayRef.current = proposedAtRef.current ? Date.now() - proposedAtRef.current : null;
    let preMs = 0;
    if (current?.activity?.timed) {
      const done = minutesInPeriod(log, current.activity.id, null, current.activity.period || "day");
      preMs = Math.min(done, current.activity.target || 30) * 60000;
    }
    setStartedAt(Date.now() - preMs);
    setElapsedMs(preMs);
    setManualMin("");
    setPaused(false);
    if (LINE_MODE === "tilt") sessionTiltRef.current = domainBalance(activities, log);
    // Album de la semaine: seed the one always-present empty slot (see albumTitles doc).
    setAlbumTitles(isAlbumActivity ? [{ id: uid(), text: "", rating: 50 }] : []);
    setAlbumIdx(0);
    setRunning(true); setStage("running");
  };

  // auto-start (Maxence 16/07): a proposal used to need its own separate tap before
  // running started — one click too many for "yes, this". Now it begins on its own
  // after a short beat, no tap needed; pause/resume already covers "not right now".
  // Paused while `holding` (the hold-to-swap gesture, still the way to reject a
  // proposal) so the two never race — effHold starts at 10s and doubles per swap
  // that day, always far longer than this delay, but auto-start firing mid-hold
  // would yank the line out from under an in-progress swap. An aborted hold (let go
  // before the swap threshold) restarts the countdown fresh rather than resuming it.
  const AUTO_START_MS = 2200;
  useEffect(() => {
    if (stage !== "proposal" || holding) return;
    const t = setTimeout(() => { begin(); }, AUTO_START_MS);
    return () => clearTimeout(t);
  }, [stage, current, holding]);

  // tap "done" — log real time (or manual override), trigger vaisselle if cooking done
  const finish = () => {
    if (!current) { resetFlow(); return; }
    // SIM: real elapsed time is meaningless for a hand-run test (tapping through fast) —
    // default to the activity/action's catalogue duration instead, so the sandbox clock
    // (advanced below) reflects a plausible session length; the "done" screen still lets
    // Maxence type an explicit override, which submitComment() applies as a delta on top.
    // Prod (SIM=false) is untouched: it always logs the real elapsed duration.
    const minLogged = SIM
      ? Math.max(1, Math.round(actDurMin))
      : Math.max(1, Math.round(Math.max(1, Math.round((Date.now() - startedAt) / 1000)) / 60));
    const aid = current.activity.id;
    setLastId(aid);
    const e = {
      // realNow() not Date.now(): identical in prod (no debug clock), but in the
      // sandbox this must track the simulated clock (see comment on the fix below).
      id: uid(), date: todayKey(), ts: realNow().getTime(), type: "done",
      activityId: aid, actionId: current.action.id, actionText: current.action.text,
      min: minLogged, sec: minLogged * 60, domain: current.activity.domain, note: "",
      ...(current.action.itemId ? { itemId: current.action.itemId } : {}),
      ...(lastStartDelayRef.current != null ? { startDelayMs: lastStartDelayRef.current } : {}),
    };
    if (current.activity.kind === "task") {
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, done: true } : a)));
    }
    if (current.action.deferredReminder) {
      scheduleReminder(current.action.deferredReminder.text, current.action.deferredReminder.afterMin);
    }
    setDoneEntryId(e.id);
    // Album de la semaine (item 5): each title noted during the session gets its own
    // log entry too, type "note" so isDone/isClick/minutesInPeriod never see it — these
    // are stats-only, additive to the one real completion `e` above, never a second
    // completion of the album itself.
    const notedTitles = albumTitles.filter((t) => t.text && t.text.trim());
    const titleEntries = (aid === "a_ecoute_album" && notedTitles.length)
      ? notedTitles.map((t) => ({
          id: uid(), date: todayKey(), ts: realNow().getTime(), type: "note",
          activityId: aid, parentId: e.id, titleText: t.text.trim(), rating: t.rating,
          note: `titre : ${t.text.trim()}`,
        }))
      : [];
    setLog((L) => [...L, e, ...titleEntries]);
    setAlbumTitles([]); setAlbumIdx(0); setRating(50);
    // sandbox clock: advance right away by the catalogue default duration, so it
    // already reflects a plausible length before any override is typed — tapping
    // the line on "done" (submitComment) applies the delta if one is.
    if (SIM) simAdvanceMinutes(minLogged);
    setRunning(false);
    // comment NOT cleared here (fixed 16/07): finish() used to always blank it before
    // "done" ever showed, harmless back when the field only existed on "done" — now
    // that it's also open during "running" (see the effect above), clearing it here
    // would silently throw away whatever was typed mid-session.
    setManualMin(""); setDescOpen(false);
    setStage("done");
  };

  // ----- the line is the whole control surface: short tap acts, long hold retracts & re-picks -----
  const tapAction = () => {
    if (stage === "entry") start();
    // tapping the line from "done" submits whatever's in the duration/comment fields
    // (same as the old "passer"/"valider" button) then moves on — one control surface,
    // no separate button needed.
    else if (stage === "done") submitComment();
    else if (stage === "proposal") begin();
    else if (stage === "running" && !paused) {
      // album de la semaine: a plain tap on the hero line commits the current
      // title and opens the next slot — the same action Enter already did on
      // the title field (Maxence 20/07: tap-the-line is the one surface used
      // for every other "move on" gesture in the app, Enter-only was easy to
      // miss and broke that idiom). Falls through to a normal finish() the
      // moment there's nothing left to advance — the trailing slot is empty,
      // meaning "I'm done listening", not "one more title" — same guard
      // advanceAlbumTitle already uses for a no-op swipe.
      const albumHasNext = isAlbumActivity && (albumIdx < albumTitles.length - 1 || (albumTitles[albumIdx] && albumTitles[albumIdx].text.trim()));
      if (albumHasNext) advanceAlbumTitle(1);
      else finish(); // resume before finishing — paused time shouldn't count
    }
  };
  // hold-to-skip is the one control surface for "not this" — it has to stay available
  // for the whole life of a session, not just before it starts (Maxence 17/07: was
  // gated to "proposal" only, so holding mid-session or on the trailing comment screen
  // silently fell through to the plain tap action — finish()/submitComment() firing
  // instead of the retract-and-skip gesture the user expects everywhere else).
  const canHold = stage === "proposal" || stage === "running" || stage === "done";
  const effHold = holdDate === todayKey() ? holdMs : BASE_HOLD_MS; // ignore a stale day if left open past midnight
  // hero-line-as-rating-slider (16/07-d, revised 20/07): on "done", for ANY
  // recommandeur action (single item or the album's own final verdict — see
  // `rating` state above), the main line reads drag vs tap: a real drag adjusts
  // the rating live (same centre-out magnitude read as setAlbumRatingFromPointer),
  // a plain tap (down/up with no meaningful travel) submits — same gesture the
  // line uses everywhere else, just re-purposed here instead of being dead while
  // ratingActive. Tapping again to "confirm" used to jump the rating to wherever
  // that second tap landed instead (Maxence 20/07) since the old code set the
  // rating unconditionally on pointer-down, before it could know the gesture
  // would turn out to be a tap and not a drag.
  const ratingActive = stage === "done" && current && current.activity.kind === "recommandeur";
  const setRatingFromPointer = (clientX) => {
    const el = lineRef.current;
    if (!el || clientX == null) return;
    const rect = el.getBoundingClientRect();
    const half = rect.width / 2 || 1;
    const r = Math.round(Math.max(0, Math.min(1, Math.abs(clientX - (rect.left + half)) / half)) * 100);
    setRating(r);
  };
  const onLineDown = (e) => {
    didHold.current = false;
    if (ratingActive) {
      // no setRatingFromPointer here anymore (see comment above) — the rating
      // only moves once onLineMove sees real travel. Hold-to-skip is armed the
      // same as before; onLineMove still cancels it the moment the pointer
      // actually travels, so a real drag never fires it, only a stationary hold.
      draggedRating.current = false;
      holdStartX.current = e && e.clientX != null ? e.clientX : 0;
      holdStart.current = Date.now();
      setHolding(true);
      holdTimer.current = setTimeout(() => {
        didHold.current = true; holdTimer.current = null;
        setHolding(false);
        finishFlow(""); // same discard as any other "done" skip — comment/rating dropped
      }, effHold);
      return;
    }
    if (!canHold) return;
    holdStart.current = Date.now();
    setHolding(true); // the line begins retracting toward the centre over the full hold time
    holdTimer.current = setTimeout(() => {
      didHold.current = true; holdTimer.current = null;
      setHolding(false);
      // "done" has already logged the completion (finish() pushed it the moment the
      // session ended) — there's nothing left to abandon, so a hold here just skips
      // the trailing comment/duration edit, same as tapping with an empty comment
      // would. "proposal"/"running" haven't logged anything yet, so those still
      // fully abandon via swap() (re-pick, hold cost doubles).
      if (stage === "done") finishFlow(""); else swap();
    }, effHold);
  };
  const onLineMove = (e) => {
    if (!ratingActive) return;
    // 8px is the same travel threshold used below to drop the pending hold-to-skip —
    // below it, this still reads as a stationary press (a tap in progress), so the
    // rating stays untouched; once crossed, it's a drag and every further move updates live.
    if (!draggedRating.current && e && e.clientX != null && Math.abs(e.clientX - holdStartX.current) > 8) draggedRating.current = true;
    if (draggedRating.current) setRatingFromPointer(e.clientX);
    if (holdTimer.current && draggedRating.current) cancelHold();
  };
  const cancelHold = () => { if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current = null; } setHolding(false); };
  const onLineUp = () => {
    if (ratingActive) {
      const held = didHold.current;
      cancelHold(); // clear a still-pending skip timer (a drag/short press that never held long enough)
      if (held) { didHold.current = false; draggedRating.current = false; return; } // skip already fired via the timeout above
      if (draggedRating.current) { draggedRating.current = false; return; } // value already set live by the drag — no submit yet, that's the next plain tap
      submitComment(); // no travel at all: a plain tap confirms whatever rating is currently set
      return;
    }
    const heldFor = holdStart.current ? Date.now() - holdStart.current : 0;
    cancelHold();
    if (didHold.current) { didHold.current = false; return; } // swap already fired
    if (canHold && heldFor >= 300) { holdStart.current = 0; return; } // aborted hold — spring back, no action
    holdStart.current = 0;
    tapAction();
  };
  const onLineCancel = () => { cancelHold(); didHold.current = false; draggedRating.current = false; holdStart.current = 0; };

  // ----- activity mutations -----
  const upd = (id, patch) => setActivities((arr) => arr.map((a) => (a.id === id ? { ...a, ...patch } : a)));
  const addActivity = () =>
    setActivities((arr) => [...arr, { id: uid(), name: "", domain: "creative", where: "home", target: 1, period: "week", kind: "practice", done: false, actions: [{ id: uid(), text: "", min: 15 }], items: [], stages: [], note: "" }]);
  const delActivity = (id) => setActivities((arr) => arr.filter((a) => a.id !== id));
  const addAction = (id) => upd(id, { actions: [...activities.find((a) => a.id === id).actions, { id: uid(), text: "", min: 15 }] });
  const editAction = (id, aid, patch) => upd(id, { actions: activities.find((a) => a.id === id).actions.map((ac) => (ac.id === aid ? { ...ac, ...patch } : ac)) });
  const delAction = (id, aid) => upd(id, { actions: activities.find((a) => a.id === id).actions.filter((ac) => ac.id !== aid) });
  const addStage = (id) => upd(id, { stages: [...(activities.find((a) => a.id === id).stages || []), { id: uid(), text: "" }] });
  const editStage = (id, sid, patch) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).map((s) => (s.id === sid ? { ...s, ...patch } : s)) });
  const delStage = (id, sid) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).filter((s) => s.id !== sid) });
  const moveStage = (id, sid, dir) => upd(id, { stages: (() => {
    const arr = [...(activities.find((a) => a.id === id).stages || [])];
    const i = arr.findIndex((s) => s.id === sid), j = i + dir;
    if (i < 0 || j < 0 || j >= arr.length) return arr;
    [arr[i], arr[j]] = [arr[j], arr[i]]; return arr;
  })() });
  const addItem = (id, text) => {
    if (!text.trim()) return;
    const a = activities.find((x) => x.id === id);
    // pipeline pieces enter at the first stage; balance/task items keep the todo/doing/done model
    const piece = a && a.kind === "pipeline" ? { id: uid(), text, stage: 0 } : { id: uid(), text, status: "doing" };
    upd(id, { items: [...a.items, piece] });
  };
  const cycleItem = (id, iid) => {
    const a = activities.find((x) => x.id === id);
    if (a && a.kind === "pipeline") {
      // a pipeline piece advances through the funnel stages, not todo/doing/done.
      // Tapping here is for setup/correction in the editor — in the live flow, Claude
      // advances the stage from the after-session comment (no manual tapping there).
      const n = (a.stages || []).length || 1;
      upd(id, { items: a.items.map((it) => (it.id === iid ? { ...it, stage: (((it.stage ?? 0) + 1) % n) } : it)) });
      return;
    }
    const order = ["todo", "doing", "done"];
    let justMastered = false;
    let items = a.items.map((it) => {
      if (it.id !== iid) return it;
      const next = order[(order.indexOf(it.status) + 1) % 3];
      if (next === "done") justMastered = true;
      return { ...it, status: next };
    });
    // mastering an item frees a rotation slot — pull the next item from the todo
    // reserve into doing so the rotation size stays constant (e.g. Chant micro's
    // ~10-song rotation backed by a todo reserve).
    if (justMastered) {
      const idx = items.findIndex((it) => it.status === "todo");
      if (idx !== -1) items = items.map((it, i) => (i === idx ? { ...it, status: "doing" } : it));
    }
    upd(id, { items });
  };
  const delItem = (id, iid) => upd(id, { items: activities.find((a) => a.id === id).items.filter((it) => it.id !== iid) });
  // free-text log for anything done outside the app — one field, one Claude call
  // resolves the intent instead of forcing every line into an activity match.
  // Replaces the old per-activity quick-log buttons (removed with the progress tab).
  // Two intents (Maxence 14/07 — the original version always forced "activity",
  // even when nothing in the catalogue actually matched; the "rapport" intent that
  // used to live here moved to its own footer button, 19/07 — see the entry
  // screen's rapport button, above where showTapHint renders):
  //   "activity" — logged exactly as before, a real "done" entry feeding the engine.
  //   "note" — anything else, kept as-is (type: "note", no activityId) rather than
  //   mis-matched to the nearest activity. Never counts toward "clics" (isClick).
  const submitFreeLog = async () => {
    const text = logText.trim();
    if (!text) return;
    const key = (await store.get("tlx_apiKey")) || "";
    if (!key) {
      // no key: can't classify freely, kept as a note rather than silently dropped
      // or force-matched without any real reading of the text.
      setLog((L) => [...L, { id: uid(), date: todayKey(), ts: realNow().getTime(), type: "note", note: text }]);
      setMsg("noté — pas de clé API pour lire plus finement"); setLogText(""); setLogOpen(false);
      setTimeout(() => setMsg(""), 2400);
      return;
    }
    setLogBusy(true);
    const catalogue = activities.map((a) => {
      const acts = (a.actions || []).map((ac) => `${ac.id}: ${ac.text}`).join(" · ") || "(pas d'action fixe)";
      return `${a.id} — ${a.name} (${a.domain}) : ${acts}`;
    }).join("\n");
    const prompt = `Tu lis ce que Maxence vient de taper dans la case "log" de BALANCE, et tu détermines son intention.

Catalogue (id — nom (domaine) : actions[id: texte]) :
${catalogue}

Ce qu'il a tapé :
« ${text} »

Détermine intent :
- "activity" si le texte décrit clairement une activité qu'il vient de faire ET qui correspond à une ligne précise du catalogue.
- "note" pour tout le reste — une pensée, un fait à garder, quelque chose de flou ou qui ne colle à aucune activité précise. Ne force JAMAIS un match approximatif : dans le doute, "note".

Si intent = "activity" : activity_id = l'id exact du catalogue qui correspond le mieux. action_id = l'id de l'action qui correspond (omets-le si aucune ne colle). min = durée en minutes déduite du texte, estimation raisonnable si non précisée.
note = dans tous les cas, une ligne qui résume ce qui a été dit (sert de commentaire loggé).`;
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: {
          intent: { type: "string", enum: ["activity", "note"] },
          // structured-outputs strict mode requires every property in `required` —
          // nullable type + explicit null is how an LLM field stays optional under that
          // constraint. Omitting these from `required` was producing the http 400 on
          // submit (found 15/07: this is the only claudeJSON schema in the app with
          // optional properties not listed in `required`).
          activity_id: { type: ["string", "null"] }, action_id: { type: ["string", "null"] },
          min: { type: ["integer", "null"] }, note: { type: "string" },
        },
        required: ["intent", "activity_id", "action_id", "min", "note"],
        additionalProperties: false,
      }, 300);

      const a = out.intent === "activity" ? activities.find((x) => x.id === out.activity_id) : null;
      if (a) {
        const action = out.action_id ? (a.actions || []).find((x) => x.id === out.action_id) : null;
        const m = Math.max(1, Math.round(out.min) || 15);
        const e = {
          id: uid(), date: todayKey(), ts: realNow().getTime(), type: "done",
          activityId: a.id, actionId: action ? action.id : null,
          actionText: action ? action.text : a.name,
          min: m, sec: m * 60, domain: a.domain, note: out.note || text,
        };
        if (a.kind === "task") setActivities((arr) => arr.map((x) => (x.id === a.id ? { ...x, done: true } : x)));
        setLog((L) => [...L, e]);
        // pipelines (Erasure/Piano/Cover/Parfum) aren't just logged — the funnel
        // piece itself needs to move, same Claude-driven read as a normal session's
        // after-finish comment (advanceViaClaude), just resolving the piece from the
        // catalogue instead of a live `current.action` (17/07, was a known gap: the
        // free-log box only ever wrote a plain "done" entry for these, funnel never moved).
        if (a.kind === "pipeline") advancePipelineFromLog(key, a, out.note || text, e.id);
        setMsg(`logged: ${e.actionText}`);
      } else {
        setLog((L) => [...L, { id: uid(), date: todayKey(), ts: realNow().getTime(), type: "note", note: out.note || text }]);
        setMsg("noté");
      }
      setLogText(""); setLogOpen(false);
    } catch (err) {
      setMsg("lecture impossible (" + (err.message || "erreur") + ")");
    } finally {
      setLogBusy(false);
      setTimeout(() => setMsg(""), 2200);
    }
  };

  // sandbox quick-complete: tick one checklist obligation. Same log shape as
  // finish(), but no timer flow — a tap (with optional minutes/comment) is enough.
  // Mirrors the real side-effects: task→done, and (sim-only, API-free) advancing
  // the pipeline funnel one stage so the drain is visible. Vaisselle no longer
  // needs a side-effect here — it's derived straight from the log.
  const simComplete = (row, min, note) => {
    const a = row.activity, action = row.action;
    const m = parseInt(min) || a.dur || (action && action.min) || 15;
    const e = {
      id: uid(), date: todayKey(), ts: realNow().getTime(), type: "done",
      activityId: a.id, actionId: action ? action.id : (a.actions[0] ? a.actions[0].id : null),
      actionText: action ? action.text : (a.actions[0] ? a.actions[0].text : a.name),
      min: m, sec: m * 60, domain: a.domain, note: (note || "").trim(),
      ...(action && action.itemId ? { itemId: action.itemId } : {}),
    };
    if (a.kind === "task") setActivities((arr) => arr.map((x) => (x.id === a.id ? { ...x, done: true } : x)));
    if (a.kind === "pipeline") {
      // advance the most-live piece one stage, or start a fresh one — so the funnel moves
      setActivities((arr) => arr.map((x) => {
        if (x.id !== a.id) return x;
        const last = (x.stages || []).length - 1;
        const pieces = (x.items || []).filter((it) => typeof it.stage === "number");
        // <= last, not < last (fixed 11/07 alongside pipelineStep/advanceViaClaude):
        // the last stage is itself a step to advance through, not an instant-done marker.
        const live = pieces.filter((p) => p.stage <= last).sort((u, v) => v.stage - u.stage);
        if (live.length) return { ...x, items: x.items.map((it) => (it.id === live[0].id ? { ...it, stage: it.stage + 1 } : it)) };
        return { ...x, items: [...(x.items || []), { id: uid(), text: e.note || "pièce " + (pieces.length + 1), stage: 0 }] };
      }));
    }
    setLog((L) => [...L, e]);
    setSimEdit(null); setSimMin(""); setSimNote("");
    simAdvanceMinutes(m); // the session took m minutes — the sim clock lives it
    setMsg(`✓ ${a.name} (+${m}m)`); setTimeout(() => setMsg(""), 1200);
  };
  // Multi-day auto-run — rewritten 11/07 (Maxence: garder l'onglet, mais qu'il
  // simule "comme si c'était fait à la main"). The old version (simWeek/
  // runSimViz) computed on a throwaway deep copy and only ever showed a stats
  // readout — it never touched the real sandbox log/activities, so "liste" and
  // "progress" told a different story than the simulateur's numbers. That
  // disconnect was the "pas fiable" complaint. This version still draws with the
  // real shipped engine (pickAging) on a working copy for correctness across the
  // run, but at the end COMMITS the result to the real sandbox state via
  // setActivities/setLog — so afterward "liste"/"progress"/"activities" show
  // exactly what a hand-run of that many sessions would have left behind.
  // Pipeline pieces advance stage-by-stage exactly like simComplete's single tap
  // (last stage included, graduates only past it — same fix as pipelineStep) —
  // no Claude call here (no comment to read), but the mechanics now agree.
  // seedActivities/seedLog let a caller run the batch against freshly-fetched
  // data instead of the current `activities`/`log` closure — needed when
  // chaining right after a reseed, since React state updates aren't visible
  // in the same synchronous continuation (stale-closure trap, caught 12/07
  // testing the balance swing: a reseed-then-runSimBatch call silently ran
  // against the OLD pre-reseed log).
  const runSimBatch = ({ days = 7, drawsPerDay = 13, seedActivities = null, seedLog = null } = {}) => {
    const acts = JSON.parse(JSON.stringify(seedActivities || activities));
    const logArr = JSON.parse(JSON.stringify(seedLog || log));
    const savedDebug = _debugDate;
    const before = logArr.length;

    // one hand-run-equivalent session: pick's activity/action, advance its
    // pipeline stage (or start a fresh piece) exactly like simComplete, push the
    // log entry. Mutates `acts`/`logArr` in place — a local working copy, not
    // yet the real state.
    const completeDraw = (row, now, dayKey) => {
      const a = acts.find((x) => x.id === row.activity.id);
      const action = row.action;
      const m = a.dur || (action && (action.dur || action.min)) || 15;
      const e = {
        id: uid(), date: dayKey, ts: now.getTime(), type: "done",
        activityId: a.id, actionId: action ? action.id : (a.actions[0] ? a.actions[0].id : null),
        actionText: action ? action.text : (a.actions[0] ? a.actions[0].text : a.name),
        min: m, sec: m * 60, domain: a.domain, note: "",
        ...(action && action.itemId ? { itemId: action.itemId } : {}),
      };
      if (a.kind === "task") a.done = true;
      if (a.kind === "pipeline") {
        const last = (a.stages || []).length - 1;
        const pieces = (a.items || []).filter((it) => typeof it.stage === "number");
        const live = pieces.filter((p) => p.stage <= last).sort((u, v) => v.stage - u.stage);
        let ns;
        if (live.length) { live[0].stage += 1; ns = live[0].stage; }
        else { a.items = [...(a.items || []), { id: uid(), text: "pièce " + (pieces.length + 1), stage: 0 }]; ns = 0; }
        e.progressed = true;
        e.finished = ns > last;
        if (e.finished && a.graduatesTo) {
          const dest = acts.find((x) => x.id === a.graduatesTo);
          if (dest) dest.items = [...(dest.items || []), { id: uid(), text: "pièce graduée", status: "doing" }];
        }
      }
      logArr.push(e);
      return m;
    };

    const runBlock = (cur, maxDraws, place) => {
      const dayKey = keyOf(cur);
      let now = new Date(cur); now.setHours(20, 0, 0, 0);
      const windowEnd = new Date(cur); windowEnd.setDate(windowEnd.getDate() + 1); windowEnd.setHours(8, 0, 0, 0);
      let guard = 0, draws = 0, lastId = null;
      while (draws < maxDraws && now < windowEnd && guard++ < 400) {
        _debugDate = fromKey(dayKey);
        _debugDate.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
        let p = pickAging(acts, logArr, place, { avoidId: lastId });
        if (!p) p = pickAging(acts, logArr, place, { relax: true, avoidId: lastId });
        if (!p) { now = new Date(now.getTime() + 30 * 60000); continue; }
        const m = completeDraw(p, now, dayKey);
        draws += 1;
        lastId = p.activity.id;
        const gap = Math.floor(Math.random() * 41);
        now = new Date(now.getTime() + (m + gap) * 60000);
      }
    };

    let day = _debugDate ? new Date(_debugDate) : new Date();
    day.setHours(0, 0, 0, 0);
    const rate = drawsPerDay > 0 ? drawsPerDay : 13;
    let cumBefore = 0;
    for (let d = 0; d < days; d++) {
      const cur = new Date(day); cur.setDate(cur.getDate() + d);
      const cumAfter = Math.floor(rate * (d + 1));
      runBlock(cur, cumAfter - cumBefore, isWorkShift(new Date(cur.getFullYear(), cur.getMonth(), cur.getDate(), 21, 0, 0)) ? "work" : "home");
      cumBefore = cumAfter;
    }

    // commit — this is now the real sandbox state, same as if every draw above
    // had been a hand tap through simComplete.
    setActivities(acts); setLog(logArr);
    _debugDate = savedDebug; setClock((c) => c + 1);

    const added = logArr.slice(before);
    const acc = {}, labels = {};
    added.forEach((e) => {
      const act = acts.find((x) => x.id === e.activityId);
      const ownTarget = act && act.actions.some((x) => typeof x.target === "number");
      const key = ownTarget ? `${e.activityId}:${e.actionId}` : e.activityId;
      acc[key] = (acc[key] || 0) + 1;
      if (!labels[key]) {
        labels[key] = { activityId: e.activityId, actionId: ownTarget ? e.actionId : null,
          name: ownTarget ? `${(act || {}).name || e.activityId} — ${e.actionText}` : ((act || {}).name || e.activityId) };
      }
    });
    const rows = Object.keys(acc).map((key) => ({ key, ...labels[key], count: acc[key] })).sort((x, y) => y.count - x.count);
    setSimRes({ sessions: added.length, days, rows });
    setMsg(`${added.length} séances simulées sur ${days}j — appliquées au sandbox`); setTimeout(() => setMsg(""), 2400);
  };

  const simReseed = async () => {
    try {
      const r = await fetch("balance-catalogue.json", { cache: "no-store" });
      const c = await r.json();
      if (Array.isArray(c.activities)) { setActivities(c.activities); setLog([]); setMsg("catalogue rechargé — sandbox vidé"); }
    } catch { setMsg("balance-catalogue.json introuvable"); }
    setTimeout(() => setMsg(""), 1800);
  };

  // ----- data -----
  const exportObj = () => ({ app: "balance", version: 4, exportedAt: new Date().toISOString(), savedOn: fmtLong(todayKey()),
    activities, log });
  const exportText = () => JSON.stringify(exportObj(), null, 2);
  const download = () => {
    const blob = new Blob([exportText()], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `balance-${stampKey()}.json`; a.click(); URL.revokeObjectURL(url);
    setMsg("file downloaded"); setTimeout(() => setMsg(""), 1800);
  };
  const copy = async () => { try { await navigator.clipboard.writeText(exportText()); setMsg("copied to clipboard"); } catch { setMsg("copy failed — use the file"); } setTimeout(() => setMsg(""), 1800); };
  // manual "out" override for today — the clock can't know you're at the
  // airport on what would otherwise be a home day (Maxence 20/07). Toggling
  // re-reads computePlace() into state immediately so anything already showing
  // `place` (not re-calling computePlace() itself) updates without waiting for
  // the next draw. No toast (Maxence: "ça distrait, ça sert à rien") — the
  // button's own label already reflects the new state instantly.
  const toggleOut = () => {
    const isOut = placeOverride() === "out";
    if (isOut) localStorage.removeItem("placeOverride");
    else localStorage.setItem("placeOverride", JSON.stringify({ place: "out", day: todayKey() }));
    setPlace(computePlace());
  };
  // Best on phones: hand the backup file to the OS share sheet (Drive, email,
  // Keep…). Falls back to a plain download where sharing files isn't supported.
  const shareBackup = async () => {
    // Share as .txt / text/plain: .json is NOT on Chrome's Web Share allowlist,
    // so canShare({files}) returns false for it and we'd silently fall to download
    // (no destination prompt). The body is still JSON; load parses by content.
    const fname = `balance-${stampKey()}.txt`;
    try {
      const file = new File([exportText()], fname, { type: "text/plain" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "BALANCE backup" });
        setMsg("shared ✓"); setTimeout(() => setMsg(""), 1800); return;
      }
    } catch (e) { if (e && e.name === "AbortError") return; }
    download();
  };
  const applyImport = (text) => {
    try {
      const o = JSON.parse(text);
      if (!o.activities) throw new Error("no activities");
      // Loading mid-session (log already has entries) must never touch the log —
      // a catalogue file always carries a "log" key (even if just []), and blindly
