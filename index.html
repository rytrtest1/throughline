    if (i < 0 || j < 0 || j >= arr.length) return arr;
    [arr[i], arr[j]] = [arr[j], arr[i]]; return arr;
  })() });
  const addItem = (id, text) => {
    if (!text.trim()) return;
    const a = activities.find((x) => x.id === id);
    // pipeline pieces enter at the first stage; balance/task items keep the todo/doing/done model
    const piece = a && a.kind === "pipeline" ? { id: uid(), text, stage: 0 } : { id: uid(), text, status: "doing" };
    upd(id, { items: [...a.items, piece] });
  };
  const cycleItem = (id, iid) => {
    const a = activities.find((x) => x.id === id);
    if (a && a.kind === "pipeline") {
      // a pipeline piece advances through the funnel stages, not todo/doing/done.
      // Tapping here is for setup/correction in the editor — in the live flow, Claude
      // advances the stage from the after-session comment (no manual tapping there).
      const n = (a.stages || []).length || 1;
      upd(id, { items: a.items.map((it) => (it.id === iid ? { ...it, stage: (((it.stage ?? 0) + 1) % n) } : it)) });
      return;
    }
    const order = ["todo", "doing", "done"];
    let justMastered = false;
    let items = a.items.map((it) => {
      if (it.id !== iid) return it;
      const next = order[(order.indexOf(it.status) + 1) % 3];
      if (next === "done") justMastered = true;
      return { ...it, status: next };
    });
    // mastering an item frees a rotation slot — pull the next item from the todo
    // reserve into doing so the rotation size stays constant (e.g. Chant micro's
    // ~10-song rotation backed by a todo reserve).
    if (justMastered) {
      const idx = items.findIndex((it) => it.status === "todo");
      if (idx !== -1) items = items.map((it, i) => (i === idx ? { ...it, status: "doing" } : it));
    }
    upd(id, { items });
  };
  const delItem = (id, iid) => upd(id, { items: activities.find((a) => a.id === id).items.filter((it) => it.id !== iid) });
  // free-text log for anything done outside the app — one field, one Claude call
  // resolves the intent instead of forcing every line into an activity match.
  // Replaces the old per-activity quick-log buttons (removed with the progress tab).
  // Three intents (Maxence 14/07 — the original version always forced "activity",
  // even when nothing in the catalogue actually matched):
  //   "rapport" — same door as the after-session comment, see finishFlow.
  //   "activity" — logged exactly as before, a real "done" entry feeding the engine.
  //   "note" — anything else, kept as-is (type: "note", no activityId) rather than
  //   mis-matched to the nearest activity. Never counts toward "clics" (isClick).
  const submitFreeLog = async () => {
    const text = logText.trim();
    if (!text) return;
    const key = (await store.get("tlx_apiKey")) || "";
    if (!key) {
      // no key: can't classify freely, but the "rapport" keyword alone still works
      // (same plain match as finishFlow) — everything else is kept as a note rather
      // than silently dropped or force-matched without any real reading of the text.
      const clicksToday = log.filter((e) => e.date === todayKey() && isClick(e)).length;
      if (clicksToday >= RAPPORT_MIN_CLICS && text.toLowerCase().includes("rapport")) {
        setLogText(""); setLogOpen(false); setStage("report"); return;
      }
      setLog((L) => [...L, { id: uid(), date: todayKey(), ts: realNow().getTime(), type: "note", note: text }]);
      setMsg("noté — pas de clé API pour lire plus finement"); setLogText(""); setLogOpen(false);
      setTimeout(() => setMsg(""), 2400);
      return;
    }
    setLogBusy(true);
    const catalogue = activities.map((a) => {
      const acts = (a.actions || []).map((ac) => `${ac.id}: ${ac.text}`).join(" · ") || "(pas d'action fixe)";
      return `${a.id} — ${a.name} (${a.domain}) : ${acts}`;
    }).join("\n");
    const prompt = `Tu lis ce que Maxence vient de taper dans la case "log" de throughline, et tu détermines son intention.

Catalogue (id — nom (domaine) : actions[id: texte]) :
${catalogue}

Ce qu'il a tapé :
« ${text} »

Détermine intent :
- "rapport" si le texte demande un bilan/rapport de sa journée (le mot "rapport" ou un équivalent explicite).
- "activity" si le texte décrit clairement une activité qu'il vient de faire ET qui correspond à une ligne précise du catalogue.
- "note" pour tout le reste — une pensée, un fait à garder, quelque chose de flou ou qui ne colle à aucune activité précise. Ne force JAMAIS un match approximatif : dans le doute, "note".

Si intent = "activity" : activity_id = l'id exact du catalogue qui correspond le mieux. action_id = l'id de l'action qui correspond (omets-le si aucune ne colle). min = durée en minutes déduite du texte, estimation raisonnable si non précisée.
note = dans tous les cas, une ligne qui résume ce qui a été dit (sert de commentaire loggé).`;
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: {
          intent: { type: "string", enum: ["rapport", "activity", "note"] },
          activity_id: { type: "string" }, action_id: { type: "string" },
          min: { type: "integer" }, note: { type: "string" },
        },
        required: ["intent", "note"],
        additionalProperties: false,
      }, 300);

      if (out.intent === "rapport") {
        const clicksToday = log.filter((e) => e.date === todayKey() && isClick(e)).length;
        if (clicksToday >= RAPPORT_MIN_CLICS) setStage("report");
        else setMsg(`pas encore ${RAPPORT_MIN_CLICS} clics aujourd'hui (${clicksToday})`);
        setLogText(""); setLogOpen(false);
        return;
      }

      const a = out.intent === "activity" ? activities.find((x) => x.id === out.activity_id) : null;
      if (a) {
        const action = out.action_id ? (a.actions || []).find((x) => x.id === out.action_id) : null;
        const m = Math.max(1, Math.round(out.min) || 15);
        const e = {
          id: uid(), date: todayKey(), ts: realNow().getTime(), type: "done",
          activityId: a.id, actionId: action ? action.id : null,
          actionText: action ? action.text : a.name,
          min: m, sec: m * 60, domain: a.domain, note: out.note || text,
        };
        if (a.kind === "task") setActivities((arr) => arr.map((x) => (x.id === a.id ? { ...x, done: true } : x)));
        setLog((L) => [...L, e]);
        setMsg(`logged: ${e.actionText}`);
      } else {
        setLog((L) => [...L, { id: uid(), date: todayKey(), ts: realNow().getTime(), type: "note", note: out.note || text }]);
        setMsg("noté");
      }
      setLogText(""); setLogOpen(false);
    } catch (err) {
      setMsg("lecture impossible (" + (err.message || "erreur") + ")");
    } finally {
      setLogBusy(false);
      setTimeout(() => setMsg(""), 2200);
    }
  };

  // sandbox quick-complete: tick one checklist obligation. Same log shape as
  // finish(), but no timer flow — a tap (with optional minutes/comment) is enough.
  // Mirrors the real side-effects: task→done, and (sim-only, API-free) advancing
  // the pipeline funnel one stage so the drain is visible. Vaisselle no longer
  // needs a side-effect here — it's derived straight from the log.
  const simComplete = (row, min, note) => {
    const a = row.activity, action = row.action;
    const m = parseInt(min) || a.dur || (action && action.min) || 15;
    const e = {
      id: uid(), date: todayKey(), ts: realNow().getTime(), type: "done",
      activityId: a.id, actionId: action ? action.id : (a.actions[0] ? a.actions[0].id : null),
      actionText: action ? action.text : (a.actions[0] ? a.actions[0].text : a.name),
      min: m, sec: m * 60, domain: a.domain, note: (note || "").trim(),
      ...(action && action.itemId ? { itemId: action.itemId } : {}),
    };
    if (a.kind === "task") setActivities((arr) => arr.map((x) => (x.id === a.id ? { ...x, done: true } : x)));
    if (a.kind === "pipeline") {
      // advance the most-live piece one stage, or start a fresh one — so the funnel moves
      setActivities((arr) => arr.map((x) => {
        if (x.id !== a.id) return x;
        const last = (x.stages || []).length - 1;
        const pieces = (x.items || []).filter((it) => typeof it.stage === "number");
        // <= last, not < last (fixed 11/07 alongside pipelineStep/advanceViaClaude):
        // the last stage is itself a step to advance through, not an instant-done marker.
        const live = pieces.filter((p) => p.stage <= last).sort((u, v) => v.stage - u.stage);
        if (live.length) return { ...x, items: x.items.map((it) => (it.id === live[0].id ? { ...it, stage: it.stage + 1 } : it)) };
        return { ...x, items: [...(x.items || []), { id: uid(), text: e.note || "pièce " + (pieces.length + 1), stage: 0 }] };
      }));
    }
    setLog((L) => [...L, e]);
    setSimEdit(null); setSimMin(""); setSimNote("");
    simAdvanceMinutes(m); // the session took m minutes — the sim clock lives it
    setMsg(`✓ ${a.name} (+${m}m)`); setTimeout(() => setMsg(""), 1200);
  };
  // Multi-day auto-run — rewritten 11/07 (Maxence: garder l'onglet, mais qu'il
  // simule "comme si c'était fait à la main"). The old version (simWeek/
  // runSimViz) computed on a throwaway deep copy and only ever showed a stats
  // readout — it never touched the real sandbox log/activities, so "liste" and
  // "progress" told a different story than the simulateur's numbers. That
  // disconnect was the "pas fiable" complaint. This version still draws with the
  // real shipped engine (pickAging) on a working copy for correctness across the
  // run, but at the end COMMITS the result to the real sandbox state via
  // setActivities/setLog — so afterward "liste"/"progress"/"activities" show
  // exactly what a hand-run of that many sessions would have left behind.
  // Pipeline pieces advance stage-by-stage exactly like simComplete's single tap
  // (last stage included, graduates only past it — same fix as pipelineStep) —
  // no Claude call here (no comment to read), but the mechanics now agree.
  // seedActivities/seedLog let a caller run the batch against freshly-fetched
  // data instead of the current `activities`/`log` closure — needed when
  // chaining right after a reseed, since React state updates aren't visible
  // in the same synchronous continuation (stale-closure trap, caught 12/07
  // testing the balance swing: a reseed-then-runSimBatch call silently ran
  // against the OLD pre-reseed log).
  const runSimBatch = ({ days = 7, drawsPerDay = 13, seedActivities = null, seedLog = null } = {}) => {
    const acts = JSON.parse(JSON.stringify(seedActivities || activities));
    const logArr = JSON.parse(JSON.stringify(seedLog || log));
    const savedDebug = _debugDate;
    const before = logArr.length;

    // one hand-run-equivalent session: pick's activity/action, advance its
    // pipeline stage (or start a fresh piece) exactly like simComplete, push the
    // log entry. Mutates `acts`/`logArr` in place — a local working copy, not
    // yet the real state.
    const completeDraw = (row, now, dayKey) => {
      const a = acts.find((x) => x.id === row.activity.id);
      const action = row.action;
      const m = a.dur || (action && (action.dur || action.min)) || 15;
      const e = {
        id: uid(), date: dayKey, ts: now.getTime(), type: "done",
        activityId: a.id, actionId: action ? action.id : (a.actions[0] ? a.actions[0].id : null),
        actionText: action ? action.text : (a.actions[0] ? a.actions[0].text : a.name),
        min: m, sec: m * 60, domain: a.domain, note: "",
        ...(action && action.itemId ? { itemId: action.itemId } : {}),
      };
      if (a.kind === "task") a.done = true;
      if (a.kind === "pipeline") {
        const last = (a.stages || []).length - 1;
        const pieces = (a.items || []).filter((it) => typeof it.stage === "number");
        const live = pieces.filter((p) => p.stage <= last).sort((u, v) => v.stage - u.stage);
        let ns;
        if (live.length) { live[0].stage += 1; ns = live[0].stage; }
        else { a.items = [...(a.items || []), { id: uid(), text: "pièce " + (pieces.length + 1), stage: 0 }]; ns = 0; }
        e.progressed = true;
        e.finished = ns > last;
        if (e.finished && a.graduatesTo) {
          const dest = acts.find((x) => x.id === a.graduatesTo);
          if (dest) dest.items = [...(dest.items || []), { id: uid(), text: "pièce graduée", status: "doing" }];
        }
      }
      logArr.push(e);
      return m;
    };

    const runBlock = (cur, maxDraws, place) => {
      const dayKey = keyOf(cur);
      let now = new Date(cur); now.setHours(20, 0, 0, 0);
      const windowEnd = new Date(cur); windowEnd.setDate(windowEnd.getDate() + 1); windowEnd.setHours(8, 0, 0, 0);
      let guard = 0, draws = 0, lastId = null;
      while (draws < maxDraws && now < windowEnd && guard++ < 400) {
        _debugDate = fromKey(dayKey);
        _debugDate.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
        let p = pickAging(acts, logArr, place, { avoidId: lastId });
        if (!p) p = pickAging(acts, logArr, place, { relax: true, avoidId: lastId });
        if (!p) { now = new Date(now.getTime() + 30 * 60000); continue; }
        const m = completeDraw(p, now, dayKey);
        draws += 1;
        lastId = p.activity.id;
        const gap = Math.floor(Math.random() * 41);
        now = new Date(now.getTime() + (m + gap) * 60000);
      }
    };

    let day = _debugDate ? new Date(_debugDate) : new Date();
    day.setHours(0, 0, 0, 0);
    const rate = drawsPerDay > 0 ? drawsPerDay : 13;
    let cumBefore = 0;
    for (let d = 0; d < days; d++) {
      const cur = new Date(day); cur.setDate(cur.getDate() + d);
      const cumAfter = Math.floor(rate * (d + 1));
      runBlock(cur, cumAfter - cumBefore, isWorkShift(new Date(cur.getFullYear(), cur.getMonth(), cur.getDate(), 21, 0, 0)) ? "work" : "home");
      cumBefore = cumAfter;
    }

    // commit — this is now the real sandbox state, same as if every draw above
    // had been a hand tap through simComplete.
    setActivities(acts); setLog(logArr);
    _debugDate = savedDebug; setClock((c) => c + 1);

    const added = logArr.slice(before);
    const acc = {}, labels = {};
    added.forEach((e) => {
      const act = acts.find((x) => x.id === e.activityId);
      const ownTarget = act && act.actions.some((x) => typeof x.target === "number");
      const key = ownTarget ? `${e.activityId}:${e.actionId}` : e.activityId;
      acc[key] = (acc[key] || 0) + 1;
      if (!labels[key]) {
        labels[key] = { activityId: e.activityId, actionId: ownTarget ? e.actionId : null,
          name: ownTarget ? `${(act || {}).name || e.activityId} — ${e.actionText}` : ((act || {}).name || e.activityId) };
      }
    });
    const rows = Object.keys(acc).map((key) => ({ key, ...labels[key], count: acc[key] })).sort((x, y) => y.count - x.count);
    setSimRes({ sessions: added.length, days, rows });
    setMsg(`${added.length} séances simulées sur ${days}j — appliquées au sandbox`); setTimeout(() => setMsg(""), 2400);
  };

  const simReseed = async () => {
    try {
      const r = await fetch("throughline-catalogue.json", { cache: "no-store" });
      const c = await r.json();
      if (Array.isArray(c.activities)) { setActivities(c.activities); setLog([]); setMsg("catalogue rechargé — sandbox vidé"); }
    } catch { setMsg("throughline-catalogue.json introuvable"); }
    setTimeout(() => setMsg(""), 1800);
  };

  // ----- data -----
  const exportObj = () => ({ app: "throughline", version: 4, exportedAt: new Date().toISOString(), savedOn: fmtLong(todayKey()),
    activities, log });
  const exportText = () => JSON.stringify(exportObj(), null, 2);
  const download = () => {
    const blob = new Blob([exportText()], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `throughline-${stampKey()}.json`; a.click(); URL.revokeObjectURL(url);
    setMsg("file downloaded"); setTimeout(() => setMsg(""), 1800);
  };
  const copy = async () => { try { await navigator.clipboard.writeText(exportText()); setMsg("copied to clipboard"); } catch { setMsg("copy failed — use the file"); } setTimeout(() => setMsg(""), 1800); };
  // Best on phones: hand the backup file to the OS share sheet (Drive, email,
  // Keep…). Falls back to a plain download where sharing files isn't supported.
  const shareBackup = async () => {
    // Share as .txt / text/plain: .json is NOT on Chrome's Web Share allowlist,
    // so canShare({files}) returns false for it and we'd silently fall to download
    // (no destination prompt). The body is still JSON; load parses by content.
    const fname = `throughline-${stampKey()}.txt`;
    try {
      const file = new File([exportText()], fname, { type: "text/plain" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "throughline backup" });
        setMsg("shared ✓"); setTimeout(() => setMsg(""), 1800); return;
      }
    } catch (e) { if (e && e.name === "AbortError") return; }
    download();
  };
  const applyImport = (text) => {
    try {
      const o = JSON.parse(text);
      if (!o.activities) throw new Error("no activities");
      // Loading mid-session (log already has entries) must never touch the log —
      // a catalogue file always carries a "log" key (even if just []), and blindly
      // importing it used to silently wipe or reintroduce stale dated history into
      // a live session, producing debts (e.g. vaisselle) that looked like a bug but
      // were really old data leaking back in (Maxence 11/07).
      // But when the live log is empty (fresh session — e.g. recovering after a
      // lost session), a real backup file's log should come back too, or "load"
      // can never actually restore history (Maxence 13/07).
      setActivities(o.activities);
      if (log.length === 0 && Array.isArray(o.log) && o.log.length > 0) setLog(o.log);
      setMsg("loaded ✓"); setTab("now"); setStage("entry");
    } catch { setMsg("couldn't read that — check the file/text"); }
    setTimeout(() => setMsg(""), 2200);
  };
  const onFile = (ev) => { const f = ev.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = () => applyImport(String(r.result)); r.readAsText(f); ev.target.value = ""; };
  const resetAll = () => {
    if (typeof window !== "undefined" && !window.confirm("Wipe all activities and history?")) return;
    // a real reset means real zero — a debug date left jumped ahead used to survive
    // this, so post-reset taps kept logging under a stale simulated clock, making
    // it look like old data hadn't actually gone away (Maxence 11/07).
    clockReal();
    setActivities(SEED); setLog([]);
    setStage("entry"); setCurrent(null); setLastId(null);
    setHoldMs(BASE_HOLD_MS); setHoldDate(todayKey());
    setSimRes(null);
    setMsg("reset to defaults"); setTimeout(() => setMsg(""), 1800);
  };

  // sandbox test harness — call window.__tlx.* from devtools/preview_eval instead of
  // simulating pointer events on the DOM. Runs every render so closures stay fresh.
  useEffect(() => {
    if (!SIM) return;
    window.__tlx = {
      stage, tab, current, activities, log, holdMs, holdDate, place,
      begin, finish, tapAction, submitComment, start, resetFlow,
      setManualMin, setComment, setTab, applyDebugTime, simReseed, runSimBatch,
      setLog, setActivities,
      debugNow: () => (_debugDate || new Date()).toString(),
    };
  });

  if (loading) return (
    <div className="tl"><style dangerouslySetInnerHTML={{ __html: css }} /><div className="grain" /><div className="wrap"><span className="lab">loading…</span></div></div>
  );

  // rapport screen: full takeover of "the line", same spirit as "empty" — no tab, no
  // chrome, just the day's activities (chronological, LRU items already carry their
  // own label via actionText) and any comment left, as a quote. Closing goes back to
  // the live line via resetFlow(), same door as everywhere else.
  if (stage === "report") {
    // real completions only (isClick) for the list/count/min — a free-log "note"
    // entry (submitFreeLog) isn't an activity done, it shouldn't pad either. Quotes
    // pull from every non-skip entry with a comment though, standalone notes included.
    const todayAll = log.filter((e) => e.date === todayKey() && isDone(e)).sort((a, b) => a.ts - b.ts);
    const todayLog = todayAll.filter(isClick);
    const totalMin = todayLog.reduce((s, e) => s + (e.min || 0), 0);
    const quotes = todayAll.filter((e) => e.note && e.note.trim());
    return (
      <div className="tl">
        <style dangerouslySetInnerHTML={{ __html: css }} />
        <div className="grain" />
        <div className="wrap" style={{ minHeight: "100vh", padding: "40px 20px", display: "flex", flexDirection: "column" }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint, marginBottom: 24 }}>
            rapport · {fmtLong(todayKey())}
          </div>
          <div className="mono" style={{ fontSize: 13, color: C.mut, marginBottom: 28 }}>
            {todayLog.length} clics · {totalMin} min
          </div>
          <div style={{ marginBottom: quotes.length ? 30 : 0 }}>
            {todayLog.map((e) => (
              <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10, borderBottom: `1px solid ${C.soft}`, padding: "9px 0" }}>
                <span className="dot" style={{ background: C.mut, flex: "none" }} />
                <span style={{ flex: 1, fontSize: 14, color: C.text, textTransform: "lowercase" }}>{e.actionText}</span>
                <span className="mono" style={{ fontSize: 11, color: C.faint }}>{e.min} min</span>
              </div>
            ))}
          </div>
          {quotes.length > 0 && (
            <div style={{ marginBottom: 30 }}>
              <div className="mono" style={{ fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", color: C.faint, marginBottom: 14 }}>moments</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {quotes.map((e) => (
                  <div key={e.id}>
                    <div style={{ fontFamily: "var(--serif)", fontStyle: "italic", fontWeight: 300, fontSize: 14, color: C.text, lineHeight: 1.5 }}>« {e.note.trim()} »</div>
                    <div className="mono" style={{ fontSize: 9.5, color: C.faint, marginTop: 5, letterSpacing: ".08em", textTransform: "uppercase" }}>{e.actionText || "note libre"}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <button className="link" style={{ alignSelf: "center", marginTop: "auto" }} onClick={() => resetFlow()}>fermer</button>
        </div>
      </div>
    );
  }

  // live line geometry. For timed activities: fills toward the period target (e.g. 30 min/day).
  // For binary: fills toward dur (session feel). >1 = went beyond — tant mieux.
  const actDurMin = current?.activity?.timed
    ? (current.activity.target || 30)
    : (current?.action?.dur || current?.activity?.dur || current?.action?.min || 15);
  const fullMs = Math.max(1, actDurMin * 60000);
  const frac = (stage === "running" || stage === "done") ? elapsedMs / fullMs : 0;

  return (
    <div className="tl">
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="grain" />
      <div className="wrap" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

        {/* sandbox banner — makes it impossible to confuse the clone with the real app. */}
        {SIM && (
          <div className="mono" style={{ textAlign: "center", fontSize: 9.5, letterSpacing: ".14em", textTransform: "uppercase",
            color: C.bg, background: C.bone, padding: "5px 10px", margin: "-8px -20px 14px",
            display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div style={{ width: "100%", display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span>bac à sable · {fmtLong(todayKey())} · {fmtHM(realNow())} · {computePlace()} · {log.filter((e) => e.date === todayKey() && isClick(e)).length} clics</span>
            </div>
            {/* time controls, same actions as the "liste" tab's clock block, surfaced
                here too (added 10/07) so a hand-run week never needs a tab switch just
                to advance the clock or jump a day. */}
            <div style={{ width: "100%", display: "flex", justifyContent: "center", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
              {[["+5m", () => simAdvanceMinutes(5)], ["+10m", () => simAdvanceMinutes(10)], ["+1h", () => simAdvanceMinutes(60)],
                ["+1j", () => jumpDays(1)], ["+1sem", () => jumpDays(7)], ["temps réel", clockReal]].map(([label, fn]) => (
                <button key={label} onClick={fn}
                  style={{ font: "inherit", letterSpacing: "inherit", textTransform: "inherit", cursor: "pointer",
                    border: `1px solid ${C.bg}`, borderRadius: 20, padding: "1px 7px", background: "transparent", color: C.bg }}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* prod: swipe only, no visible chrome at all — the arrows stay in the sandbox
            only, where testing from a desktop preview needs a click-through option. */}
        {SIM && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", height: 22 }}>
            <button className="navarr" style={{ visibility: tab === TABS[0] ? "hidden" : "visible" }} onClick={() => go(-1)} aria-label="previous">‹</button>
            <button className="navarr" style={{ visibility: tab === TABS[TABS.length - 1] ? "hidden" : "visible" }} onClick={() => go(1)} aria-label="next">›</button>
          </div>
        )}

        {/* =================== NOW =================== */}
        {/* full viewport height (not calc(100vh-150px) as before): guarantees the line is
            the only thing on screen at open — save/load/log/reset below only reach the
            fold on scroll (Maxence 12/07: was visible without scrolling on his phone). */}
        {tab === "now" && (
          <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>

            {/* the stage: instruction above, the living line as hero, controls below — vertically centered */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: 30 }}>

              {/* ---------- above the line: the instruction ---------- */}
              <div style={{ minHeight: 130, display: "flex", flexDirection: "column", justifyContent: "flex-end", textAlign: "center", marginBottom: 30 }}>

                {(stage === "proposal" || stage === "running" || stage === "done") && current && (
                  <div className="fade">
                    <div className="mono" style={{ fontSize: 10, letterSpacing: ".22em", textTransform: "uppercase", color: C.faint, marginBottom: 18 }}>
                      {current.activity.name}
                    </div>
                    {/* sub-activity: shown whenever the main line no longer carries it — a
                        Claude-generated title (musique/film) replaces the underlying action
                        entirely (titre vs album, etc.), so surface the original alongside it. */}
                    {current.action.baseText && current.action.baseText !== current.action.text && (
                      <div className="mono" style={{ fontSize: 10, letterSpacing: ".1em", color: C.faint, marginBottom: 8 }}>{current.action.baseText}</div>
                    )}
                    {/* the item shows immediately — for a recommandeur it's the real curated
                        library entry (already meaningful). If the (non-blocking) embellisher
                        returns a nicer title, it swaps in place; if it's slow or fails, you
                        never wait on it. No "…" placeholder anymore (Maxence 13/07, fix 2). */}
                    <div style={{ fontFamily: "var(--mono)", fontSize: 13, fontWeight: 400, lineHeight: 1.55, letterSpacing: ".02em", textTransform: "lowercase", color: stage === "done" ? C.mut : C.text }}>
                      {current.action.text}
                    </div>
                    {/* recommandeur (musique, film…): the line above is ONLY the title — what
                        describes it (artist/director/note) sits behind a reveal/hide toggle,
                        collapsed by default (Maxence 12/07). */}
                    {current.action.desc && (
                      <div style={{ marginTop: 10 }}>
                        <button className="link" onClick={() => setDescOpen((o) => !o)}>{descOpen ? "cacher" : "détails"}</button>
                        {descOpen && (
                          <div className="fade mono" style={{ fontSize: 11, color: C.mut, marginTop: 8, lineHeight: 1.5 }}>{current.action.desc}</div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {stage === "empty" && (
                  <div className="fade" style={{ fontFamily: "var(--serif)", fontSize: 20, fontWeight: 300, fontStyle: "italic", color: C.mut, lineHeight: 1.45 }}>
                    Nothing left to draw for {place} right now.
                  </div>
                )}
              </div>

              {/* ---------- the living line: hollow track, fills from the centre while you act, ---------- */}
              {/* ---------- spills past the margins when you go beyond the estimate ---------- */}
              {(() => {
                const over = frac > 1;
                const widthPct = Math.min(frac, 1.85) * 100;
                // the line carries the whole loop. short tap acts; long hold retracts & re-picks.
                // the hollow track stays inset from the screen edges so the fill can visibly
                // overshoot it — that overshoot is the felt dépassement.
                const trackTransition = holding ? `transform ${effHold}ms linear` : "transform .3s cubic-bezier(.2,.7,.2,1)";
                const fillColor = C.bone; // monochrome — the line is always bone, the one living mark
                // domain balance, felt not read: the line sways wider AND faster when
                // one domain is neglected relative to the others, settles wide and slow
                // as it evens out — like something physically unsettled, not a metronome
                // with a parameter. Motion carries the signal, a static lean read as a glitch.
                // Hidden by default (zero footprint) — a shake reveals it, another hides it.
                const balanceSpread = balanceVisible ? domainBalance(activities, log) : 0;
                const tiltAmpDeg = balanceSpread * 6;
                const swayDurationSec = 7 - balanceSpread * 3.5;
                return (
                  <div className={balanceVisible ? "sway" : ""} onPointerDown={onLineDown} onPointerUp={onLineUp} onPointerLeave={onLineCancel} onPointerCancel={onLineCancel}
                    onContextMenu={(e) => e.preventDefault()}
                    style={{ position: "relative", height: 44, width: "82%", margin: "0 auto",
                      display: "flex", justifyContent: "center", alignItems: "center",
                      overflow: "visible", cursor: "pointer", touchAction: "manipulation", userSelect: "none", WebkitUserSelect: "none",
                      ...(balanceVisible ? { "--tilt-amp": `${tiltAmpDeg}deg`, animationDuration: `${swayDurationSec}s` } : {}) }}>
                    {/* hollow track — inset, never touches the edges */}
                    <div className={stage === "entry" && !holding ? "breathe" : ""}
                      style={{ position: "absolute", left: 0, right: 0, top: "50%", height: 2, background: stage === "entry" ? C.bone : C.soft,
                        transform: `translateY(-50%) scaleX(${holding ? 0 : 1})`, transformOrigin: "center", transition: trackTransition }} />
                    {/* centre fill — grows symmetrically from the middle, overshoots the track when you go beyond */}
                    {frac > 0 && (
                      <div style={{ position: "relative", flexShrink: 0, height: over ? 8 : 6, width: `${widthPct}%`,
                        background: fillColor, opacity: over ? 1 : 0.9,
                        boxShadow: over ? `0 0 14px ${fillColor}` : "none",
                        transform: `scaleX(${holding ? 0 : 1})`, transformOrigin: "center",
                        transition: holding ? `transform ${effHold}ms linear` : "width .25s linear, height .35s, box-shadow .35s, transform .3s" }} />
                    )}
                  </div>
                );
              })()}

              {/* ---------- below the line: controls ---------- */}
              <div style={{ minHeight: 130, marginTop: 30, textAlign: "center" }}>

                {/* entry: nothing, except the one-time first-launch hint. */}
                {stage === "entry" && showTapHint && (
                  <div className="fade mono" style={{ fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", color: C.faint }}>
                    tape pour commencer
                  </div>
                )}

                {/* proposal: nothing under the line, except in the sandbox — testing wants
                    to reroll fast without the hold gesture, just to see what comes up. */}
                {SIM && stage === "proposal" && (
                  <div className="fade">
                    <button className="link" onClick={swap}>skip (test)</button>
                  </div>
                )}

                {/* running: a quiet pause, for when something outside interrupts the session
                    (a call, someone at the door) — not for skipping, just for stopping the clock. */}
                {stage === "running" && (
                  <div className="fade">
                    <button className="link" onClick={togglePause}>{paused ? "reprendre" : "pause"}</button>
                  </div>
                )}

                {stage === "empty" && (
                  <div className="fade">
                    <button className="link" onClick={resetFlow}>i'm done</button>
                  </div>
                )}

                {stage === "done" && (
                  <div className="fade">
                    {(syncing || syncMsg) ? (
                      <div className="mono" style={{ fontSize: 11, color: C.bone, letterSpacing: ".06em", lineHeight: 1.6 }}>{syncMsg || "…"}</div>
                    ) : (
                      <>
                        {/* duration is always logged in data (finish() records the real elapsed
                            minutes) — the readout is sandbox-only now: prod never shows the time
                            spent (Maxence 13/07), the session just ends on the comment line. */}
                        {SIM && (
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 18 }}>
                            <span className="mono" style={{ fontSize: 10, color: C.faint, letterSpacing: ".1em" }}>temps réel :</span>
                            <input
                              type="number" min="1" className="in mono"
                              value={manualMin}
                              placeholder={String(Math.max(1, Math.round(actDurMin)))}
                              onChange={(e) => setManualMin(e.target.value)}
                              style={{ width: 44, fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, color: C.mut }}
                            />
                            <span className="mono" style={{ fontSize: 10, color: C.faint }}>min</span>
                          </div>
                        )}
                        <input className="in" value={comment} placeholder="un mot sur cette session ?"
                          onChange={(e) => setComment(e.target.value)}
                          onKeyDown={(e) => { if (e.key === "Enter") submitComment(); }}
                          style={{ fontSize: 14, textAlign: "center", maxWidth: 360, margin: "0 auto", display: "block", borderBottom: `1px solid ${C.line}`, paddingBottom: 8, fontStyle: comment ? "normal" : "italic", color: comment ? C.text : C.faint }} />
                        {current && (() => {
                          const k = current.activity.kind;
                          const hint = k === "pipeline" ? "ton mot fait avancer la pièce dans le funnel"
                            : k === "recommandeur" ? "ton mot affine le profil pour la prochaine reco"
                            : k === "practice" ? "ton mot nourrit la mémoire de l'activité"
                            : null;
                          return hint ? <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 14, letterSpacing: ".06em" }}>{hint}</div> : null;
                        })()}
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* =================== LISTE (sandbox verification view) =================== */}
        {tab === "liste" && SIM && (() => {
          const place = computePlace();
          const rows = buildHat(activities, log, place);
          const owed = rows.filter((r) => r.done < r.target);
          const daily = owed.filter((r) => r.period === "day");
          const weekly = owed.filter((r) => r.period === "week");
          const doneRows = rows.filter((r) => r.done >= r.target);
          const Row = (r) => {
            const remaining = r.target - r.done;
            const editing = simEdit === r.key;
            const editingParams = paramEdit === r.key;
            // own cadence at the action level wins (same rule as the Activities tab) —
            // edit there instead of the activity's shared target/period
            const ownTarget = r.action && typeof r.action.target === "number";
            return (
              <div key={r.key} style={{ borderBottom: `1px solid ${C.soft}`, padding: "9px 0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span className="dot" style={{ background: dColor(r.activity.domain), flex: "none" }} />
                  <span style={{ flex: 1, fontSize: 14, color: C.text }}>{r.label}</span>
                  {r.target > 1 && <span className="mono" style={{ fontSize: 10, color: C.faint }}>{r.done}/{r.target}</span>}
                  <button className="ghost" style={{ fontSize: 11 }}
                    onClick={() => setParamEdit(editingParams ? null : r.key)}>{editingParams ? "−" : "⚙"}</button>
                  <button className="seg" onClick={() => { if (editing) { setSimEdit(null); } else { setSimEdit(r.key); setSimMin(""); setSimNote(""); } }}>
                    {editing ? "×" : "fait" + (remaining > 1 ? ` (×${remaining})` : "")}
                  </button>
                </div>
                {editingParams && (
                  <div className="fade" style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10, marginTop: 10, paddingLeft: 18 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" min="0" className="in mono"
                        value={ownTarget ? r.action.target : (r.activity.target ?? 1)}
                        onChange={(e) => {
                          const v = Math.max(0, parseFloat(e.target.value) || 0);
                          if (ownTarget) editAction(r.activity.id, r.action.id, { target: v });
                          else upd(r.activity.id, { target: v });
                        }}
                        style={{ width: 32, fontSize: 12, textAlign: "right", borderBottom: `1px solid ${C.line}`, color: C.text }} />
                      <div style={{ display: "flex", gap: 3 }}>
                        {["day", "week"].map((p) => (
                          <button key={p} className={`chip ${((ownTarget ? r.action.period : r.activity.period) || "week") === p ? "on" : ""}`}
                            onClick={() => ownTarget ? editAction(r.activity.id, r.action.id, { period: p }) : upd(r.activity.id, { period: p })}
                            style={{ fontSize: 10, padding: "2px 6px" }}>{p === "day" ? "/j" : "/sem"}</button>
                        ))}
                      </div>
                      {ownTarget && <span className="mono" style={{ fontSize: 9, color: C.faint, fontStyle: "italic" }}>(cette action)</span>}
                    </div>
                    <div style={{ display: "flex", gap: 3 }}>
                      {WHERES.map((w) => (
                        <button key={w} className={`chip ${r.activity.where === w ? "on" : ""}`}
                          onClick={() => upd(r.activity.id, { where: w })} style={{ fontSize: 10, padding: "2px 6px" }}>{w}</button>
                      ))}
                    </div>
                    <button className="link" style={{ color: C.line, fontSize: 10 }}
                      onClick={() => { if (window.confirm(`Supprimer "${r.activity.name}" ?`)) { delActivity(r.activity.id); setParamEdit(null); } }}>
                      supprimer l'activité
                    </button>
                  </div>
                )}
                {editing && (
                  <div className="fade" style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, paddingLeft: 18 }}>
                    <input type="number" min="1" placeholder="min" value={simMin} onChange={(e) => setSimMin(e.target.value)}
                      className="in mono" style={{ width: 46, fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, color: C.mut }} />
                    <input placeholder="un mot (avance le funnel / la mémoire)" value={simNote} onChange={(e) => setSimNote(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") simComplete(r, simMin, simNote); }}
                      className="in" style={{ flex: 1, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: C.text }} />
                    <button className="seg on" onClick={() => simComplete(r, simMin, simNote)}>valider</button>
                  </div>
                )}
              </div>
            );
          };
          return (
            <div style={{ marginTop: 20 }}>
              {/* the sim clock — where you are right now in the playthrough */}
              <div className="mono" style={{ textAlign: "center", fontSize: 13, color: C.bone, letterSpacing: ".06em", marginBottom: 4 }}>
                {fmtLong(todayKey())} · {fmtHM(realNow())}
              </div>
              <div className="mono" style={{ textAlign: "center", fontSize: 9.5, color: C.faint, marginBottom: 14 }}>lieu : {place} · {log.filter((e) => e.date === todayKey() && isClick(e)).length} clics aujourd'hui</div>

              {/* pause — advance the clock without doing anything, to feel time between actions */}
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                <span className="mono" style={{ fontSize: 9.5, color: C.faint, letterSpacing: ".1em", textTransform: "uppercase" }}>pause</span>
                <button className="seg" onClick={() => simAdvanceMinutes(5)}>+5m</button>
                <button className="seg" onClick={() => simAdvanceMinutes(10)}>+10m</button>
                <button className="seg" onClick={() => simAdvanceMinutes(60)}>+1h</button>
              </div>

              {/* time travel */}
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
                <button className="seg" onClick={() => jumpDays(1)}>+1 jour</button>
                <button className="seg" onClick={() => jumpDays(7)}>+1 semaine</button>
                <button className="seg" onClick={clockReal}>temps réel</button>
                <button className="seg" onClick={simReseed}>recharger catalogue</button>
              </div>

              <div className="lab" style={{ marginBottom: 4 }}>aujourd'hui · journalier</div>
              {daily.length ? daily.map(Row) : <div className="mono" style={{ fontSize: 11, color: C.faint, padding: "8px 0 16px" }}>cible du jour atteinte partout — reste tiré quand même, juste moins souvent</div>}

              <div className="lab" style={{ marginTop: 26, marginBottom: 4 }}>cette semaine · hebdo</div>
              {weekly.length ? weekly.map(Row) : <div className="mono" style={{ fontSize: 11, color: C.faint, padding: "8px 0 16px" }}>cible de la semaine atteinte partout — reste tiré quand même, juste moins souvent</div>}

              <div className="mono" style={{ fontSize: 10, color: C.faint, marginTop: 22, lineHeight: 1.6 }}>
                {owed.length} pas encore à la cible ({daily.length} jour · {weekly.length} sem) · {place} ·
                {" "}coche → suit juste ta progression, le tirage lui reste pondéré par target/période, indifférent au "fait".
              </div>

              {doneRows.length > 0 && (
                <>
                  <div className="lab" style={{ marginTop: 26, marginBottom: 8, color: C.mut }}>fait cette période ({doneRows.length})</div>
                  <div style={{ opacity: 0.6 }}>{doneRows.map(Row)}</div>
                </>
              )}
            </div>
          );
        })()}

        {/* =================== SIMULATEUR (comme à la main, en rafale — commit réel au sandbox) =================== */}
        {tab === "simulateur" && SIM && (() => {
          const max = simRes ? Math.max(...simRes.rows.map((r) => r.count), 1) : 1;
          return (
            <div style={{ marginTop: 20 }}>
              <div className="lab" style={{ marginBottom: 10, color: C.bone }}>simulateur — rafale de séances « comme à la main »</div>
              <div className="mono" style={{ fontSize: 9.5, color: C.faint, marginBottom: 14, lineHeight: 1.6 }}>
                tire avec le vrai moteur (pickAging), avance les pipelines pièce par pièce comme un tap réel, et écrit le résultat directement dans le log/activités du sandbox — pas un aperçu jetable.
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", marginBottom: 16 }}>
                {[{ k: "jours", lab: "jours" }, { k: "tirages", lab: "tirages/j" }].map(({ k, lab }) => (
                  <label key={k} className="mono" style={{ fontSize: 9.5, color: C.faint, display: "flex", alignItems: "center", gap: 5, letterSpacing: ".08em" }}>
                    <input type="number" min="1" step="1" value={simCfg[k]}
                      onChange={(e) => setSimCfg((c) => ({ ...c, [k]: parseFloat(e.target.value) || c[k] }))}
                      style={{ width: 44, background: "transparent", border: "none", borderBottom: `1px solid ${C.line}`, color: C.text, fontFamily: "inherit", fontSize: 12, textAlign: "right", outline: "none", padding: "2px 4px" }} />
                    {lab}
                  </label>
                ))}
                <button className="seg on" onClick={() => runSimBatch({ days: Math.max(1, simCfg.jours), drawsPerDay: Math.max(1, simCfg.tirages) })}>simuler</button>
              </div>

              {!simRes ? (
                <div className="mono" style={{ fontSize: 11, color: C.faint, padding: "10px 0" }}>appuie sur simuler pour jouer N jours et voir la répartition</div>
              ) : (
                <>
                  <div className="mono" style={{ fontSize: 10, color: C.mut, marginBottom: 14 }}>
                    {simRes.sessions} séances ajoutées sur {simRes.days}j — déjà dans le log
                  </div>
                  {simRes.rows.map((r) => {
                    const a = activities.find((x) => x.id === r.activityId);
                    if (!a) return null;
                    const action = r.actionId ? a.actions.find((x) => x.id === r.actionId) : null;
                    if (r.actionId && !action) return null;
                    return (
                      <div key={r.key} style={{ borderBottom: `1px solid ${C.soft}`, padding: "7px 0" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span className="dot" style={{ background: dColor(a.domain), flex: "none", opacity: action ? 0.4 : 1 }} />
                          <span style={{ width: 148, flex: "none", fontSize: 11.5, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.name}</span>
                          <div style={{ flex: 1, height: 8, background: C.soft }}>
                            <div style={{ width: `${Math.round((r.count / max) * 100)}%`, height: 8, background: C.faint }} />
                          </div>
                          <span className="mono" style={{ width: 24, textAlign: "right", fontSize: 10, color: C.mut }}>{r.count}</span>
                        </div>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          );
        })()}

        {/* =================== ACTIVITIES =================== */}
        {tab === "activities" && (
          <div style={{ marginTop: 26 }}>
            {activities.map((a) => (
              <ActivityCard key={a.id} a={a} upd={upd} del={delActivity}
                addAction={addAction} editAction={editAction} delAction={delAction}
                addStage={addStage} editStage={editStage} delStage={delStage} moveStage={moveStage}
                addItem={addItem} cycleItem={cycleItem} delItem={delItem} />
            ))}
            <button className="link" style={{ marginTop: 20 }} onClick={addActivity}>+ add activity</button>
          </div>
        )}

        {/* =================== FOOTER — save / load centered, reset tucked further below. no rule: the only line is the one in the centre. Stays on every tab including "now" (Maxence 12/07: not moved off it) — pushed below the fold instead via the "now" tab's full-viewport minHeight below, so opening the app shows only the line; scrolling down reveals this. =================== */}
        <div className="fade" style={{ marginTop: 72, textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 26 }}>
            <button className="link" onClick={shareBackup}>save</button>
            <label className="link" style={{ cursor: "pointer" }}>load
              <input type="file" accept="application/json,.json,text/plain,.txt" onChange={onFile} style={{ display: "none" }} />
            </label>
          </div>
          <div style={{ marginTop: 14 }}>
            <button className="link" onClick={() => setLogOpen((o) => !o)}>log</button>
          </div>
          {logOpen && (
            <div style={{ marginTop: 18, maxWidth: 320, marginLeft: "auto", marginRight: "auto" }}>
              <input className="in" value={logText} placeholder="qu'as-tu fait ?"
                onChange={(e) => setLogText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") submitFreeLog(); }}
                disabled={logBusy}
                style={{ fontSize: 14, textAlign: "center", borderBottom: `1px solid ${C.line}`, paddingBottom: 8, fontStyle: logText ? "normal" : "italic", color: logText ? C.text : C.faint }} />
              {logBusy && <div className="mono" style={{ fontSize: 10, color: C.faint, marginTop: 10 }}>…</div>}
            </div>
          )}
          <div style={{ marginTop: 14 }}>
            <button className="link" onClick={() => setKeyOpen((o) => !o)}>key{apiKey ? " ·" : ""}</button>
          </div>
          {keyOpen && (
            <div style={{ marginTop: 18, maxWidth: 320, marginLeft: "auto", marginRight: "auto" }}>
              <input className="in" type="password" value={apiKey} placeholder="anthropic api key — sk-ant-…"
                onChange={(e) => setApiKey(e.target.value)}
                style={{ fontSize: 12, textAlign: "center", borderBottom: `1px solid ${C.line}`, paddingBottom: 6 }} />
              <div style={{ display: "flex", justifyContent: "center", gap: 20, marginTop: 12 }}>
                <button className="link" onClick={saveKey}>save key</button>
                <button className="link" onClick={clearKey}>clear</button>
              </div>
              <div className="mono" style={{ fontSize: 9, color: C.faint, marginTop: 10, lineHeight: 1.6 }}>
                stored only on this device — never committed. reads your after-session comments to advance the funnel; sent only to anthropic.
              </div>
            </div>
          )}
          <div style={{ marginTop: 22, textAlign: "center" }}>
            <button className="link" style={{ color: C.line }} onClick={resetAll}>reset</button>
            {/* fake-clock override — sandbox only. Shipping this in prod meant the real
                app could have its date/time silently forced away from realNow(), which
                the live engine (pickAging, caps, place) reads directly — a real user has
                no legitimate reason to lie to the engine about what time it is. */}
            {SIM && (
              <div style={{ marginTop: 14, display: "flex", justifyContent: "center", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <input type="date"
                  value={debugDay}
                  onChange={e => { setDebugDay(e.target.value); applyDebugTime(e.target.value, debugHour); }}
                  className="mono"
                  style={{ fontSize: 11, color: C.mut, background: "transparent", border: "none", borderBottom: `1px solid ${C.soft}`, outline: "none", padding: "2px 4px" }} />
                <input type="number" min="0" max="23" placeholder="h"
                  value={debugHour}
                  onChange={e => { setDebugHour(e.target.value); applyDebugTime(debugDay, e.target.value); }}
                  className="mono"
                  style={{ width: 38, fontSize: 11, color: C.mut, background: "transparent", border: "none", borderBottom: `1px solid ${C.soft}`, outline: "none", padding: "2px 4px", textAlign: "center" }} />
                <span className="mono" style={{ fontSize: 11, color: C.faint }}>h</span>
                {_debugDate && (
                  <>
                    <span className="mono" style={{ fontSize: 10, color: C.faint, letterSpacing: ".08em" }}>→ {computePlace()}</span>
                    <button className="link" style={{ color: C.faint, fontSize: 10 }} onClick={() => { setDebugDay(""); setDebugHour(""); applyDebugTime("", ""); }}>↺</button>
                  </>
                )}
              </div>
            )}
          </div>
        </div>

        {msg && (
          <div className="mono" style={{ position: "fixed", left: 0, right: 0, bottom: 24, textAlign: "center", fontSize: 10.5, letterSpacing: ".1em", textTransform: "uppercase", color: C.bone, zIndex: 3 }}>
            {msg}
          </div>
        )}
      </div>
    </div>
  );
}

/* ------------------------- activity editor ------------------------- */
function ActivityCard({ a, upd, del, addAction, editAction, delAction, addStage, editStage, delStage, moveStage, addItem, cycleItem, delItem }) {
  const [open, setOpen] = useState(false);
  const [itemDraft, setItemDraft] = useState("");
  const statusColor = (s) => (s === "done" ? C.bone : s === "doing" ? C.mut : C.faint);
  return (
    <div className="fade" style={{ borderBottom: `1px solid ${C.soft}`, padding: "16px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button className="dot" style={{ background: dColor(a.domain), border: "none", cursor: "pointer" }}
          onClick={() => upd(a.id, { domain: DKEYS[(DKEYS.indexOf(a.domain) + 1) % DKEYS.length] })} title="change domain" />
        <input className="in" value={a.name} placeholder="activity name"
          onChange={(e) => upd(a.id, { name: e.target.value })}
          style={{ fontFamily: "var(--serif)", fontSize: 18, fontWeight: 300, fontStyle: a.name ? "normal" : "italic", color: a.name ? C.text : C.faint }} />
        <button className="ghost" onClick={() => setOpen((o) => !o)}>{open ? "−" : "edit"}</button>
        <button className="x" onClick={() => del(a.id)}>×</button>
      </div>

      {open && (
        <div style={{ paddingLeft: 20, marginTop: 16 }}>
          {/* meta row */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "14px 20px", marginBottom: 18 }}>
            <Meta label="where">
              <div style={{ display: "flex", gap: 5 }}>
                {WHERES.map((w) => (
                  <button key={w} className={`chip ${a.where === w ? "on" : ""}`} onClick={() => upd(a.id, { where: w })}>{w}</button>
                ))}
              </div>
            </Meta>
            <Meta label="kind">
              <div style={{ display: "flex", gap: 5 }}>
                {KINDS.map((k) => (
                  <button key={k} className={`chip ${a.kind === k ? "on" : ""}`}
                    onClick={() => upd(a.id, { kind: k, done: false, ...(k === "pipeline" && !(a.stages || []).length ? { stages: mkStages(ERASURE_STAGES) } : {}) })}>{k}</button>
                ))}
              </div>
            </Meta>
            {a.kind !== "task" && (
              <Meta label="fréquence — target/période = poids de tirage">
                {a.actions.some((x) => x.target) ? (
                  <span className="mono" style={{ fontSize: 11, color: C.faint, fontStyle: "italic" }}>
                    pilotée par action ci-dessous (ce champ est ignoré)
                  </span>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input className="in mono" type="number" min="0" value={a.target ?? a.perWeek ?? 1}
                      onChange={(e) => upd(a.id, { target: Math.max(0, parseInt(e.target.value) || 0) })}
                      style={{ width: 34, fontSize: 13, borderBottom: `1px solid ${C.line}`, color: C.text }} />
                    <div style={{ display: "flex", gap: 4 }}>
                      {["day", "week"].map((p) => (
                        <button key={p} className={`chip ${(a.period || "week") === p ? "on" : ""}`}
                          onClick={() => upd(a.id, { period: p })}>{p === "day" ? "/j" : "/sem"}</button>
                      ))}
                    </div>
                    <span className="mono" style={{ fontSize: 10, color: C.faint }}>
                      ≈ {((a.target ?? a.perWeek ?? 1) / (a.period === "day" ? 1 : 7)).toFixed(2)} poids/j
                    </span>
                  </div>
                )}
              </Meta>
            )}
          </div>

          {/* stages — the pipeline funnel, in order (the app serves the one that's starving) */}
          {a.kind === "pipeline" && (
            <div style={{ marginBottom: 22 }}>
              <div className="lab" style={{ marginBottom: 10 }}>stages — the funnel, in order</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                {(a.stages || []).map((s, i) => (
                  <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span className="mono" style={{ fontSize: 10, color: C.faint, width: 14, textAlign: "right" }}>{i + 1}</span>
                    <input className="in" value={s.text} placeholder="stage name"
                      onChange={(e) => editStage(a.id, s.id, { text: e.target.value })}
                      style={{ fontSize: 15, fontWeight: 300, fontStyle: s.text ? "normal" : "italic", color: s.text ? C.text : C.faint, borderBottom: `1px solid ${C.soft}`, paddingBottom: 5 }} />
                    <button className="ghost" onClick={() => moveStage(a.id, s.id, -1)} style={{ opacity: i === 0 ? 0.25 : 1, padding: "0 2px" }} aria-label="move up">↑</button>
                    <button className="ghost" onClick={() => moveStage(a.id, s.id, 1)} style={{ opacity: i === (a.stages.length - 1) ? 0.25 : 1, padding: "0 2px" }} aria-label="move down">↓</button>
                    <button className="x" onClick={() => delStage(a.id, s.id)}>×</button>
                  </div>
                ))}
                {!(a.stages || []).length && (
                  <div className="mono" style={{ fontSize: 11, color: C.faint, fontStyle: "italic" }}>no stages yet — add the funnel below</div>
                )}
              </div>
              <button className="link" style={{ marginTop: 12 }} onClick={() => addStage(a.id)}>+ stage</button>
            </div>
          )}

          {/* actions */}
          <div className="lab" style={{ marginBottom: 10 }}>actions — what shows up · m = minutes · target/période = sa propre cadence (vide = partage le poids de l'activité)</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
            {a.actions.map((ac) => (
              <div key={ac.id} style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <input className="in" value={ac.text} placeholder="a concrete action"
                  onChange={(e) => editAction(a.id, ac.id, { text: e.target.value })}
                  style={{ fontSize: 15, fontWeight: 300, fontStyle: ac.text ? "normal" : "italic", color: ac.text ? C.text : C.faint, borderBottom: `1px solid ${C.soft}`, paddingBottom: 5, flex: 1, minWidth: 120 }} />
                <input className="in mono" type="number" min="1" value={ac.min}
                  onChange={(e) => editAction(a.id, ac.id, { min: Math.max(1, parseInt(e.target.value) || 1) })}
                  style={{ width: 34, fontSize: 12, textAlign: "right", color: C.mut }} />
                <span className="mono" style={{ fontSize: 10, color: C.faint }}>m</span>
                {/* optional per-action target/period: blank target → shares the activity's pool
                    weight; a number → its own rate = target/period, drawn independently
                    (Linge, Clean…) — same fields the live engine (buildLotteryRows) reads */}
                <input className="in mono" type="number" min="0" value={ac.target ?? ""} placeholder="–"
                  onChange={(e) => editAction(a.id, ac.id, { target: e.target.value === "" ? null : Math.max(0, parseFloat(e.target.value) || 0) })}
                  style={{ width: 30, fontSize: 12, textAlign: "right", color: typeof ac.target === "number" ? C.text : C.faint }} />
                {typeof ac.target === "number" && (
                  <>
                    <div style={{ display: "flex", gap: 3 }}>
                      {["day", "week"].map((p) => (
                        <button key={p} className={`chip ${(ac.period || "week") === p ? "on" : ""}`}
                          onClick={() => editAction(a.id, ac.id, { period: p })}
                          style={{ fontSize: 10, padding: "2px 6px" }}>{p === "day" ? "/j" : "/sem"}</button>
                      ))}
                    </div>
                    <span className="mono" style={{ fontSize: 9.5, color: C.faint }}>
                      ≈ {(ac.target / (ac.period === "day" ? 1 : 7)).toFixed(2)}/j
                    </span>
                  </>
                )}
                <button className="x" onClick={() => delAction(a.id, ac.id)}>×</button>
              </div>
            ))}
          </div>
          <button className="link" style={{ marginTop: 12 }} onClick={() => addAction(a.id)}>+ action</button>

          {/* progress items / pipeline pieces */}
          <div className="lab" style={{ margin: "22px 0 10px" }}>{a.kind === "pipeline" ? "pieces — where each sits in the funnel" : "progress — pieces, materials, milestones"}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
            {a.items.map((it) => {
              const isPipe = a.kind === "pipeline";
              const st = (a.stages || [])[it.stage ?? 0];
              const stageTxt = st ? st.text : "—";
              const isDone = !isPipe && it.status === "done";
              return (
              <div key={it.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button className="chip" onClick={() => cycleItem(a.id, it.id)}
                  title={isPipe ? "set stage (setup / correction)" : "cycle status"}
                  style={{ minWidth: 64, color: isPipe ? C.mut : statusColor(it.status), borderColor: isDone ? C.bone : C.line }}>{isPipe ? stageTxt : it.status}</button>
                <span style={{ flex: 1, fontSize: 14, fontWeight: 300, color: isDone ? C.mut : C.text, textDecoration: isDone ? "line-through" : "none" }}>{it.text}</span>
                <button className="x" onClick={() => delItem(a.id, it.id)}>×</button>
              </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 10, alignItems: "center" }}>
            <input className="in" value={itemDraft} placeholder={a.kind === "pipeline" ? "add a piece (e.g. a phrase)" : "add one"}
              onChange={(e) => setItemDraft(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { addItem(a.id, itemDraft); setItemDraft(""); } }}
              style={{ fontSize: 14, fontStyle: "italic", borderBottom: `1px solid ${C.soft}`, paddingBottom: 4 }} />
            <button className="link" onClick={() => { addItem(a.id, itemDraft); setItemDraft(""); }}>add</button>
          </div>

          {/* note */}
          <div className="lab" style={{ margin: "22px 0 8px" }}>note</div>
          <textarea className="in" rows={2} value={a.note} onChange={(e) => upd(a.id, { note: e.target.value })}
            placeholder="anything the coach should know"
            style={{ fontSize: 14, fontWeight: 300, lineHeight: 1.5, fontStyle: a.note ? "normal" : "italic", color: a.note ? C.text : C.faint }} />
        </div>
      )}
    </div>
  );
}
function Meta({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
      <span className="lab">{label}</span>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Throughline />);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
