<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================
 * throughline — the daily engine
 * You tell it how much time you have; it tells you one thing to do.
 * No menu to skip through, no streaks, no scores. A record you own.
 * ============================================================ */

// ---------- storage (localStorage so it survives reloads) ----------
const mem = {};
const store = {
  async get(k) {
    try { if (typeof localStorage !== "undefined") return localStorage.getItem(k); } catch {}
    return k in mem ? mem[k] : null;
  },
  async set(k, v) {
    try { if (typeof localStorage !== "undefined") { localStorage.setItem(k, v); return; } } catch {}
    mem[k] = v;
  },
};
async function loadJSON(key, fb) {
  const raw = await store.get(key);
  if (raw == null) return fb;
  try { return JSON.parse(raw); } catch { return fb; }
}
const saveJSON = (key, v) => store.set(key, JSON.stringify(v));

// ---------- dates ----------
const pad = (n) => String(n).padStart(2, "0");
const keyOf = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
// debug: override the current date+time for simulation (null = real clock)
let _debugDate = null;
const realNow = () => _debugDate ? new Date(_debugDate) : new Date();
// the "day" for logging/caps rolls over at 9am, not midnight — Maxence is often
// still awake past midnight and always asleep by 9am, so a midnight cutoff would
// split one waking stretch across two calendar days. Only affects date KEYS
// (todayKey/daysAgoKey); wall-clock gates that care about the actual
// hour (meal times, work-shift boundaries) still read realNow() directly. Decided 10/07.
const DAY_PIVOT_HOUR = 9;
const logicalNow = (d = realNow()) => { const x = new Date(d); x.setHours(x.getHours() - DAY_PIVOT_HOUR); return x; };
const todayKey = () => keyOf(logicalNow());
const stampKey = () => { const d = new Date(); return `${keyOf(d)}-${pad(d.getHours())}${pad(d.getMinutes())}`; };
const fromKey = (s) => new Date(s + "T00:00:00");
const daysAgoKey = (n) => { const d = logicalNow(); d.setDate(d.getDate() - n); return keyOf(d); };
const daysBetween = (a, b) => Math.round((fromKey(b) - fromKey(a)) / 86400000);
const fmtLong = (s) => fromKey(s).toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
const fmtHM = (d) => `${pad(d.getHours())}h${pad(d.getMinutes())}`;
const uid = () => Math.random().toString(36).slice(2, 9);
const fmtMin = (m) => { if (!m) return "0m"; if (m < 60) return m + "m"; const h = Math.floor(m / 60), r = m % 60; return r ? `${h}h ${r}m` : `${h}h`; };

// ---------- domains ----------
const DOMAINS = [
  { key: "physical", label: "physical" },
  { key: "creative", label: "creative" },
  { key: "learning", label: "learning" },
  { key: "rest",     label: "rest" },
  { key: "mind",     label: "mind" },
  { key: "social",   label: "social" },
  { key: "chore",    label: "chore" },
];
const DKEYS = DOMAINS.map((d) => d.key);
// color removed (13/07) — the app is monochrome; every domain reads as one neutral mark.
const dColor = () => C.mut;
const WHERES = ["home", "anywhere", "out", "work"];
// "recommandeur" = a practice whose action is generated by Claude at proposal time
// from the taste profile in `note` + done history (Film, music, meal prep…). Until
// that generation lands it behaves like a practice that picks from actions[].
const KINDS = ["practice", "task", "pipeline", "recommandeur"];
// Default funnel for a new pipeline activity — the locked erasure model.
// Erasure = a pipeline: the app serves the stage that's starving the funnel.
const ERASURE_STAGES = ["Accroches", "Mots favoris", "Groupes", "Poème", "Forme"];
const mkStages = (labels) => labels.map((t) => ({ id: uid(), text: t }));

// ---------- seed (everything editable) ----------
const A = (name, domain, where, perWeek, actions, kind = "practice", items = [], stages = []) => ({
  id: uid(), name, domain, where, perWeek, kind, done: false,
  actions: actions.map(([text, min]) => ({ id: uid(), text, min })),
  items: items.map((t) => ({ id: uid(), text: t, status: "doing" })),
  stages: mkStages(stages),
  note: "",
});
// Generic starter set — a blank canvas. Edit these (or wipe them) in the
// Activities tab to make the app your own. Your real setup lives in your
// own saved data / backup file, not here.
const SEED = [
  A("Move your body", "physical", "home", 5, [["Do a short workout", 20], ["Go for a walk", 30]]),
  A("Get outside", "physical", "out", 2, [["Go for a longer walk or activity", 60]]),
  A("Make something", "creative", "anywhere", 3, [["Spend a focused block creating", 25], ["Sketch a quick idea", 15]]),
  A("Practice a skill", "learning", "home", 3, [["Practice your current thing", 25]]),
  A("Learn a little", "learning", "anywhere", 3, [["Study for a short block", 15]]),
  A("Read", "rest", "anywhere", 4, [["Read for a while", 20]]),
  A("Rest on purpose", "rest", "home", 2, [["Do something restful and intentional", 30]]),
  A("Reach out", "social", "anywhere", 2, [["Message or call someone", 10]]),
  A("Tidy / chore", "chore", "home", 1, [["Knock out one chore", 20]]),
];

// ---------- engine (loterie proportionnelle) ----------
// Every eligible action gets pulled into the draw with a weight = target/period
// (a rate — e.g. 5/week → 0.71/day, 1/day → 1/day). One weighted random draw,
// every single time. No "due" state, no calendar reset, no catch-up, no memory
// beyond not repeating the exact previous pick. Over any long enough stretch the
// observed frequency converges to the target ratio (law of large numbers) — but
// no single week is guaranteed. That trade is intentional: a deterministic
// catch-up (serve whoever's most overdue) makes the numbers exact but is "n'importe
// quoi" to live with day to day; a pure weighted lottery is simple, matches how
// Maxence actually thinks about it (target ⇒ share of the draws), and variance
// around the average is an accepted cost, not a bug. Decided 09/07 — replaces the
// old chapeau (due/calendar-reset lottery) and the counter/argmax engine (v7/v8),
// both removed.

const WORK_SUNDAY_ANCHOR = new Date(2026, 5, 7);
function isWorkShift(d = new Date()) {
  const h = d.getHours();
  let startDay, startDate;
  if (h >= 20) { startDay = d.getDay(); startDate = new Date(d); }
  else if (h < 8) { startDay = (d.getDay() + 6) % 7; startDate = new Date(d); startDate.setDate(startDate.getDate() - 1); }
  else return false;
  if (startDay === 4 || startDay === 5 || startDay === 6) return true;
  if (startDay === 0) {
    const a = new Date(WORK_SUNDAY_ANCHOR); a.setHours(0, 0, 0, 0);
    const s = new Date(startDate); s.setHours(0, 0, 0, 0);
    const weeks = Math.round((s - a) / (7 * 86400000));
    return ((weeks % 2) + 2) % 2 === 0;
  }
  return false;
}
const computePlace = (d = realNow()) => (isWorkShift(d) ? "work" : "home");
// is a work shift starting tonight? (used to drop work-day-only activities like
// tapis, which belongs to a free day, not the 1h home window before a shift)
const isWorkDayToday = (d = realNow()) => isWorkShift(new Date(d.getFullYear(), d.getMonth(), d.getDate(), 21, 0, 0));
// exactly 2 days before a work stretch STARTS (not every day within 2 days of one —
// e.g. Wed sits 2 days from Fri too, but Fri is mid-stretch since Thu already started
// it, so Wed must stay excluded). Used to gate meal-prep focaccia: found proposed on
// a Sunday (Maxence 10/07: "seulement j-2 travail" — cohérent seulement 2 jours avant
// le manque de temps réel du boulot, pas n'importe quand).
const isTwoDaysBeforeWorkStretch = (d = realNow()) => {
  const plus = (n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  return !isWorkDayToday(d) && !isWorkDayToday(plus(1)) && isWorkDayToday(plus(2));
};
// garniture's deadline day, one day after focaccia's — the day right before the
// work stretch starts (Maxence 11/07-b).
const isOneDayBeforeWorkStretch = (d = realNow()) => {
  const plus = (n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  return !isWorkDayToday(d) && isWorkDayToday(plus(1));
};
const isDone = (e) => e.type !== "skip";
// a real completion, as opposed to a free-text "note" entry (submitFreeLog) — used
// wherever "clics" are counted (rapport gate, sandbox banners) so jotting a note
// never inflates the count of activities actually done.
const isClick = (e) => e.type === "done";
// how many of the last 7 calendar days are free (not a work day) — a skipWorkDays
// daily activity (Tapis) can never be drawn on a work day, so its true weekly
// quota is target × free days, not target × 7 (used by domainBalance below).
function freeDaysInRollingWeek() {
  let n = 0;
  const base = logicalNow();
  for (let i = 0; i <= 6; i++) {
    const d = new Date(base); d.setDate(d.getDate() - i);
    if (!isWorkDayToday(d)) n++;
  }
  return n;
}

// --- period helpers ---
const PERIOD = { day: 1, week: 7 };
function periodDays(period) { return period === "day" ? 1 : 7; }

function minutesInPeriod(log, actId, actionId, period) {
  const since = daysAgoKey(period === "day" ? 0 : 6);
  return log
    .filter((e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e))
    .reduce((s, e) => s + (e.min || 0), 0);
}
// completionsInPeriod feeds the "liste" tab readout (x/target this period) and,
// for day-period rows, the hard day cap in buildLotteryRows below.
function completionsInPeriod(log, actId, actionId, period, opts = {}) {
  // week branch is rolling too (fixed 11/07): this fed the "x/target this period"
  // readout with a calendar-Monday cliff while the actual draw engine below already
  // used a rolling 7 days — the readout could show "0/1 this week" right after a
  // Monday rollover for something the engine already correctly counted as satisfied
  // (done last Thursday), a real display/engine disagreement, not just cosmetic.
  const since = period === "day" ? todayKey() : daysAgoKey(6);
  return log.filter(
    (e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e)
      && (!opts.requireFinish || e.finished)
      && (!opts.requireProgress || e.progressed)
  ).length;
}
// rolling 7-day completions, for the week-period draw cap below — deliberately not
// a calendar-Monday cliff (the exact "reset hebdo" shape tried and dropped three
// times this summer for the creative pipelines). No calendar-week counting is left
// anywhere in the app (weekStartKey itself removed 11/07 — the two remaining
// calendar-week readouts, "liste" progress and the dashboard's "this week" panel,
// were disagreeing with this engine cap, e.g. showing "0/1 this week" for something
// already satisfied per the rolling window). A rolling window
// has no reset instant: the cap loosens by one day at a time as old sessions age out,
// never a verdict moment (decided 10/07).
function completionsInRollingWeek(log, actId, actionId) {
  const since = daysAgoKey(6);
  return log.filter((e) => e.activityId === actId && (actionId == null || e.actionId === actionId) && e.date >= since && isDone(e)).length;
}

// domain balance — how unevenly the rolling week's satisfaction (done/target,
// capped at 1 so over-performing one domain buys no credit elsewhere) is spread
// across domains. 0 = every active domain roughly on pace, 1 = one domain fully
// idle while another is fully satisfied. A week of total silence yields 0 for
// every domain equally, so it stays flat rather than reading as a verdict on
// absence (decided 11/07, see [[throughline-blocker-juste-milieu]]).
function domainBalance(activities, log) {
  const byDomain = {};
  const freeDays = freeDaysInRollingWeek();
  const toWeekly = (target, period, skipWorkDays) => {
    if (period !== "week" && skipWorkDays) return target * freeDays;
    return period === "week" ? target : target * 7;
  };
  activities.forEach((a) => {
    const acts = a.actions || [];
    const perActionTargets = acts.some((x) => x.target);
    const d = byDomain[a.domain] || (byDomain[a.domain] = { target: 0, done: 0 });
    if (perActionTargets) {
      acts.forEach((action) => {
        if (!action.target) return;
        d.target += toWeekly(action.target, action.period || a.period || "week", a.skipWorkDays);
        d.done += completionsInRollingWeek(log, a.id, action.id);
      });
    } else if (a.target && a.period) {
      d.target += toWeekly(a.target, a.period, a.skipWorkDays);
      d.done += completionsInRollingWeek(log, a.id, null);
    }
  });
  const ratios = Object.values(byDomain)
    .filter((d) => d.target > 0)
    .map((d) => Math.min(1, d.done / d.target));
  if (ratios.length < 2) return 0;
  return Math.max(...ratios) - Math.min(...ratios);
}

// place filters — v4 adds where:"work" (film, work-only)
function placeOkW(where, place) {
  if (where === "work") return place === "work";
  if (place === "work") return where === "anywhere";
  if (place === "out") return where === "out" || where === "anywhere";
  return true;
}
function placeOk(a, place) { return placeOkW(a.where, place); }

// --- pipeline picker ---
// One active piece at a time (decided 04/07): if a piece is live, the funnel always
// serves the next step on THAT piece — deterministic, no lottery. A fresh piece only
// starts once none is live. Fixed 11/07 (Maxence): the LAST stage is itself a session
// to actually do and finish, not an automatic terminal marker — "stage === last"
// means the piece is currently being mastered, still live; it only graduates once a
// session AT that last stage reports it done (see advanceViaClaude's ns > last).
// Before this fix, reaching the last stage's index instantly counted as "done", so
// the funnel jumped straight to "choisir nouvelle pièce" the very next draw without
// the mastery/final-stage session ever actually being served (a_cover "rosalia
// magnolia" case, 14/07).
function pipelineStep(a) {
  const stages = a.stages || [];
  if (!stages.length) return null;
  const last = stages.length - 1;
  const label = (i) => (stages[i] ? stages[i].text : "—");
  const live = (a.items || []).find((it) => typeof it.stage === "number" && it.stage <= last);
  if (!live) return { id: uid(), text: `${label(0)} — nouvelle pièce`, min: 15, pieceId: null, pieceStage: 0, fresh: true };
  return { id: uid(), text: `${label(live.stage)} — « ${live.text} »`, min: 15, pieceId: live.id, pieceStage: live.stage, fresh: false };
}

// --- items[] LRU picker (Chant micro, Ordre, Clean, Cuisiner…) ---
function hasDoingItems(a) {
  return (a.kind === "practice" || a.kind === "recommandeur") && (a.items || []).some((it) => it.status === "doing");
}
// shared LRU: among items[status=doing], pick the one least recently logged (by
// itemId in the log) — weighted so longer-idle items are favoured, not fixed.
function pickItemLRU(a, log, base) {
  const doing = (a.items || []).filter((it) => it.status === "doing");
  if (!doing.length) return base;
  const scored = doing.map((it) => {
    let last = null;
    for (const e of log) if (e.activityId === a.id && isDone(e) && e.itemId === it.id && (!last || e.date > last)) last = e.date;
    return { it, w: (last ? daysBetween(last, todayKey()) : 999) * (0.7 + Math.random() * 0.6) };
  });
  const chosen = scored.sort((x, y) => y.w - x.w)[0].it;
  return { id: base.id, text: chosen.text, min: base.min, dur: base.dur, itemId: chosen.id };
}
function itemStep(a, log) {
  return pickItemLRU(a, log, a.actions[0] || { id: uid(), text: "—", min: 15 });
}

// --- vaisselle: derived straight from the log (cooked − washed, whole history), not
// kept in a separate piece of state that resets to 0 on every reload. A completed
// meal-prep/cuisiner session queues a dish session; a completed vaisselle clears one.
// Fixed 10/07: was clipped to weekStartKey (this calendar week only), which could
// silently drop a cook logged just before a Monday boundary (its dish never counted
// once the week rolled over) — chronological cooked−washed pairing has to run over
// the whole log, not just "present this week", or the two directions of the
// mismatch (missed debt vs. stale repropose) both stay possible.
// No freshness/staleness window here (tried one 11/07, Maxence rejected it as
// overcomplicated): "0 vaisselle à proposer si pas de cuisine, 1 vaisselle à
// proposer si cuisine, et une fois faite 0" — plain cooked − washed, nothing else.
// The earlier "vaisselle sans cuisine" confusion traced back to a 2-month sim
// export and a stray non-sandbox screenshot, not this function.
function pendingVaisselleFrom(log) {
  const cooked = log.filter((e) => (e.activityId === "a_mealprep" || e.activityId === "a_cuisiner") && isDone(e)).length;
  const washed = log.filter((e) => e.activityId === "a_vaisselle" && isDone(e)).length;
  return Math.max(0, cooked - washed);
}

// --- cuisiner: only proposed around meal times, never mid-afternoon ---
function isMealTime(now) {
  const h = now.getHours() + now.getMinutes() / 60;
  return (h >= 11.5 && h < 13.5) || (h >= 18 && h < 20.5);
}

// --- meal prep sequencing: same toggle pattern as vaisselle (Maxence 11/07, asked
// explicitly to make both pairs work identically) — a validated focaccia is owed
// one garniture; once that garniture is validated, none is owed again until the
// next focaccia. Debt-counted like pendingVaisselleFrom, no staleness ceiling (an
// earlier 48h-expiry attempt was overcomplicating exactly what he'd just rejected
// for vaisselle — dropped). The one thing that stays separate: dough needs a real
// 24h to rest (Maxence 10/07), so even with a garniture owed, it isn't proposed
// until that minimum has passed — a floor, not a window.
const FOCACCIA_REST_MS = 24 * 3600000;
// hour-of-day deadline (Maxence 11/07-b, replacing an earlier click-count
// version): focaccia is only ever eligible on its one J-2 day, garniture on the
// J-1 day right after — miss either day and the window doesn't reopen for a
// whole work-stretch cycle (focaccia) or just goes back to being an ordinary
// undated debt (garniture). A click-count guarantee meant a slow-click day could
// never reach the threshold at all; a wall-clock deadline holds regardless of
// how much the app got used that day, and matches the shape a future todo
// "due by X" would need. Both ramp up in pickAging's weight() as this hour
// approaches, forced outright at/after it on their respective deadline day.
const FOCACCIA_GARNITURE_DEADLINE_HOUR = 20;
function lastFocacciaTs(log) {
  let ts = null;
  for (const e of log) if (e.activityId === "a_mealprep" && e.actionId === "x_mp_focaccia" && isDone(e) && (!ts || e.ts > ts)) ts = e.ts;
  return ts;
}
function pendingGarnitureFrom(log) {
  const focaccia = log.filter((e) => e.activityId === "a_mealprep" && e.actionId === "x_mp_focaccia" && isDone(e)).length;
  const garniture = log.filter((e) => e.activityId === "a_mealprep" && e.actionId === "x_mp_garniture" && isDone(e)).length;
  return Math.max(0, focaccia - garniture);
}
// which cook created the OLDEST still-open dish debt (Maxence 11/07: "l'app
// propose peu de temps après l'action qui ramène à 0" — eligible ≠ prioritized;
// pickAging's weight() ages a row off when THAT ROW was last done, so a vaisselle
// done yesterday for an earlier debt would still read as "just done" and get
// starved even though a brand-new cook just re-opened the debt. This timestamp
// lets weight() age off the triggering cook instead — see its use in pickAging).
function oldestUnresolvedCookTs(log) {
  const cooked = log.filter((e) => (e.activityId === "a_mealprep" || e.activityId === "a_cuisiner") && isDone(e)).sort((x, y) => x.ts - y.ts);
  const washed = log.filter((e) => e.activityId === "a_vaisselle" && isDone(e)).length;
  return cooked[washed] ? cooked[washed].ts : null;
}

// --- build the draw pool: every eligible action right now, weighted by its
// rate (target ÷ period-in-days), filtered by place plus the same hand-wired
// correctness gates as before (vaisselle needs a pending dish, garniture needs
// focaccia first, cuisiner only at meal times). Those correctness gates are
// physical/causal constraints, not pacing — always enforced, no bypass (fixed
// 10/07-j: relax used to drop them too, which let e.g. garniture fire with zero
// prior focaccia ever logged; caught by Maxence eyeballing a Monday-evening
// garniture in the day-by-day widget). DAY/WEEK quota is the only thing
// `skipQuota` ever bypasses — tried making it fully continuous (10/07-b, no
// exclusion ever, just damped weight) and measured it WORSE in realistic
// conditions: without a hard floor, a day-period row (rate=1/day, the highest
// in the pool) can still win a second draw the same day purely by luck whenever
// the rest of the pool happens to roll low, even while untouched weekly rows
// sit right there — simWeek at 15 draws/day over a week gave Livre 14/7 (x2)
// continuous vs 10/7 (x1.4) with the hard gate. So: hard gate for the normal
// draw (a day-period row simply isn't offered again today once it's had its one
// turn, reopens at midnight; a week-period row the same over the rolling 7 days
// — no calendar cliff, loosens a day at a time) — but the skipQuota fallback
// below (only reached once the WHOLE pool is simultaneously gated shut) damps
// by `over` instead of using raw rate, so it doesn't snowball (measured 10/07:
// a day anchor hit 8x its target in one long saturated session).
function buildLotteryRows(activities, log, place, skipQuota = false) {
  const rows = [];
  for (const a of activities) {
    if (a.kind === "task" && a.done) continue;
    if (a.kind === "pipeline" && !(a.stages || []).length) continue;
    if (a.skipWorkDays && isWorkDayToday()) continue; // e.g. tapis: a free-day thing, never a work day
    if (a.id === "a_vaisselle") {
      if (!placeOk(a, place)) continue;
      // physical constraint, not pacing — never relaxed (fixed 10/07-j alongside
      // the meal-prep/cuisiner gates below): can't wash dishes that don't exist.
      if (pendingVaisselleFrom(log) > 0) rows.push({ activity: a, action: a.actions[0], period: "week", target: 1, rate: 1 / 7, over: 0, sinceTs: oldestUnresolvedCookTs(log) });
      continue;
    }
    const acts = a.actions || [];
    const perActionTargets = acts.length && acts.some((x) => x.target);
    if (perActionTargets) {
      for (const action of acts) {
        if (!placeOkW(action.where || a.where, place)) continue;
        // an action that rotates through items[] has nothing to propose while that
        // list is empty (e.g. Répertoire before any piece has graduated from Piano)
        if (/\(LRU\)/.test(action.text || "") && !hasDoingItems(a)) continue;
        // These are physical/causal constraints (you can't cook outside meal
        // prep time, can't fill a garniture before the dough existed and rested),
        // not pacing preferences — so unlike the day/week quota below, they are
        // NEVER dropped, not even by relax. Fixed 10/07-j: relax used to drop
        // these too, which let garniture fire with zero prior focaccia ever
        // logged, or focaccia fire on a day that wasn't j-2 before a work
        // stretch (caught by Maxence eyeballing a Monday-evening garniture in
        // the widget). relax now only ever bypasses the quota cap.
        if (action.id === "x_cu_faire" && !isMealTime(realNow())) continue;
        if (action.id === "x_mp_focaccia" && !isTwoDaysBeforeWorkStretch()) continue;
        if (action.id === "x_mp_garniture") {
          // debt-driven like vaisselle, not target/quota-driven — pushed straight in
          // and skips the completions/rolling-week gate below entirely. Needed
          // (Maxence 11/07): a garniture from an earlier week can still sit inside
          // the current rolling-7-day window and falsely read as "already at
          // target", blocking a garniture a brand-new focaccia just re-owed.
          if (pendingGarnitureFrom(log) <= 0) continue;
          const fts = lastFocacciaTs(log);
          if (!fts || realNow().getTime() - fts < FOCACCIA_REST_MS) continue;
          rows.push({ activity: a, action, period: "week", target: 1, rate: 1 / 7, over: 0, sinceTs: fts });
          continue;
        }
        const period = action.period || a.period || "week";
        const target = action.target || 1;
        const completions = period === "day" ? completionsInPeriod(log, a.id, action.id, period) : completionsInRollingWeek(log, a.id, action.id);
        if (!skipQuota && completions >= target) continue;
        // +1 fixed 11/07-b: a row exactly at its cap (completions === target) used to
        // get over=0 — zero damping on its FIRST relax draw past quota, exactly as
        // competitive as a row not yet due. Confirmed on the real hand-run export
        // (throughline-2026-07-11-0247.json): every "sorti deux fois" complaint
        // (album, film) fired via relax with completions already === target at draw
        // time, i.e. the undamped free pass. Shifting by 1 makes the very first
        // excess draw already cost the (1+over)² penalty in pickAging's weight().
        rows.push({ activity: a, action, period, target, rate: target / periodDays(period), over: Math.max(0, completions - target + 1) });
      }
    } else {
      if (!placeOk(a, place)) continue;
      if (/\(LRU\)/.test((acts[0] || {}).text || "") && !hasDoingItems(a)) continue;
      const period = a.period || "week";
      const target = a.target || a.perWeek || 1;
      const completions = period === "day" ? completionsInPeriod(log, a.id, null, period) : completionsInRollingWeek(log, a.id, null);
      if (!skipQuota && completions >= target) continue;
      // +1 fixed 11/07-b, see the perActionTargets branch above for why.
      rows.push({ activity: a, action: null, period, target, rate: target / periodDays(period), over: Math.max(0, completions - target + 1) });
    }
  }
  return rows;
}

// --- pickAging (promoted 10/07-i to the sole engine, prod and sandbox alike —
// the plain-rate lottery `pick()` it was benchmarked against is retired; every
// finding above about elapsed-days weighting, the relax/`over` damping, and the
// same-day cap applies here unconditionally now, not just inside SIM):
// classic anti-starvation scheduling. priority(row) = real elapsed days since
// always serve the single highest-priority row among rows still UNDER their day/
// rolling-week cap — same hard gate as pick() (buildLotteryRows(..., false)),
// not bypassed. Corrected 10/07: an earlier version bypassed the cap on the
// theory that aging's own priority already handles "served enough" — wrong,
// measured it let Erasure run to 167% of its target because nothing ever
// stopped it competing once past target. Same relax fallback as pick(): only
// once the capped pool is empty does a retry skip the cap (skipQuota) — the
// correctness gates (meal time, focaccia sequencing) stay on regardless, see
// buildLotteryRows above (fixed 10/07-j, they used to get dropped too).
// Corrected again 10/07-c: traced actual relax usage at the exact demand-matching
// rate (83/sem = 11.857/j) — the capped pool runs dry on ~1/3 of ALL draws (110/332
// over a 28-day run), not as a rare edge case, because 12 clicks/day routinely
// exceeds how many rows are simultaneously due-and-uncapped on a given day. Once in
// relax, raw elapsed×rate let Erasure win 14 of its 17 serves AFTER already hitting
// its 3/week cap (measured 133-142% of target) — undamped relax has no memory that
// a row already got its turn. Now damped by `over` exactly like pick()'s relax
// weight, so an already-capped row's priority shrinks quadratically with how far
// past target it is instead of competing on raw elapsed time forever.
// Depends on every log entry's `ts` tracking realNow() (the debug clock when one is
// set), not raw Date.now() — found broken 10/07: finish()/quickLog()/simComplete()
// all stamped ts with Date.now() (true wall-clock), so during a hand-run sandbox
// test where _debugDate gets jumped days ahead of real time, elapsedDays here ended
// up comparing simulated "now" against a REAL timestamp barely different across
// entries (all logged within the same real ~40min tapping session) — collapsing
// aging's whole ordering into noise from real tap order, not simulated overdue-ness.
// That's what caused the pipeline streak Maxence caught twice (parfum_crea → cover →
// piano, same order both times): all three share the same rate, so once their real
// elapsedDays go essentially flat, ordering falls back to whichever was tapped
// earliest in real time — deterministic, but not aging. Fixed at the three call
// sites (ts: realNow().getTime()), harmless in prod where realNow() === Date.now().
function lastRealTs(log, actId, actionId) {
  let last = null;
  for (const e of log) {
    if (e.activityId !== actId) continue;
    if (actionId != null && e.actionId !== actionId) continue;
    if (!last || e.ts > last) last = e.ts;
  }
  return last;
}
// --- eligible-days-since (added 10/07-h, pickAging only): elapsedDays used to
// count raw calendar days since last done, even through days a row was
// structurally ineligible (wrong place / work day) — a home-only row racks up
// "5 days overdue" across a work stretch it could never have been drawn on,
// then dominates the next home day purely from that artificial backlog. Verified
// 10/07: Tapis marche / Parfum-exploration showed elapsedDays=5 across a
// 15→20/07 span, but 4 of those 5 days (16-19/07, all work days) excluded them
// outright via where:"home" — the real backlog was 1 home-day gap, not 5. Now
// only days the row could actually have been picked count toward its overdue
// clock; "anywhere" rows (Noticing, Erasure) are unaffected — every day is
// eligible for them already, so this only discounts place/work-gated rows.
function isDayEligible(a, action, d) {
  if (a.skipWorkDays && isWorkDayToday(d)) return false;
  const where = (action && action.where) || a.where;
  return placeOkW(where, isWorkDayToday(d) ? "work" : "home");
}
function eligibleDaysSince(a, action, lastTs, nowTs) {
  const dayMs = 86400000;
  let total = 0, cursor = lastTs, guard = 0;
  while (cursor < nowTs && guard++ < 400) {
    const d = new Date(cursor);
    const dayEnd = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1).getTime();
    const segEnd = Math.min(nowTs, dayEnd);
    if (isDayEligible(a, action, d)) total += (segEnd - cursor) / dayMs;
    cursor = segEnd;
  }
  return total;
}
// shared draw→action resolution (extracted 11/07 so the force paths below can
// return through the exact same LRU-substitution step as the normal weighted
// draw — garniture's action text carries "(LRU)" and needs pickItemLRU to fill
// in which flavor, same as any other drawn row).
function resolveDraw(drawn, log) {
  const a = drawn.activity;
  let action = drawn.action
    ? drawn.action
    : a.kind === "pipeline"
      ? pipelineStep(a)
      : hasDoingItems(a)
        ? itemStep(a, log)
        : a.actions[Math.floor(Math.random() * a.actions.length)];
  if (drawn.action && action && /\(LRU\)/.test(action.text || "") && hasDoingItems(a)) {
    action = pickItemLRU(a, log, action);
  }
  return action ? { activity: a, action } : null;
}
function pickAging(activities, log, place, options = {}) {
  const { avoidId = null, relax = false } = options;
  // vaisselle: force immediately after the cook that opened the debt (Maxence
  // 11/07) — "ça évite qu'elle reste dans l'évier" waiting for the lottery to
  // happen to draw it. Only fires when the very last thing logged is the cook
  // itself, so it never turns into a standing override — one rejected forced
  // proposal (avoidId) and it falls straight through to the normal draw below.
  const lastLogged = log.length ? log.reduce((x, y) => (x.ts > y.ts ? x : y)) : null;
  if (lastLogged && avoidId !== "a_vaisselle" &&
      (lastLogged.activityId === "a_cuisiner" || lastLogged.activityId === "a_mealprep") &&
      pendingVaisselleFrom(log) > 0) {
    const va = activities.find((x) => x.id === "a_vaisselle");
    if (va && placeOk(va, place)) return resolveDraw({ activity: va, action: va.actions[0] }, log);
  }
  let rows = buildLotteryRows(activities, log, place, relax).filter((r) => r.activity.id !== avoidId);
  if (!rows.length) return null;
  // focaccia/garniture: hour-of-day deadline guarantee (see
  // FOCACCIA_GARNITURE_DEADLINE_HOUR's definition above buildLotteryRows) —
  // checked on the fresh pool, before the no-repeat/day-cap filters below, so a
  // same-activity collision (e.g. an earlier mealprep session today) can't
  // accidentally swallow the guarantee. Ramp itself lives in weight() below;
  // this is only the hard floor once the deadline hour has passed on the row's
  // own deadline day (focaccia: J-2, garniture: J-1 — never on any other day).
  const today = todayKey();
  const now = realNow();
  const hourNow = now.getHours() + now.getMinutes() / 60;
  const focacciaDeadlineDay = isTwoDaysBeforeWorkStretch(now);
  const garnitureDeadlineDay = isOneDayBeforeWorkStretch(now);
  if (hourNow >= FOCACCIA_GARNITURE_DEADLINE_HOUR) {
    const forced = rows.find((r) => r.action && (
      (r.action.id === "x_mp_focaccia" && focacciaDeadlineDay) ||
      (r.action.id === "x_mp_garniture" && garnitureDeadlineDay)
    ));
    if (forced) return resolveDraw({ activity: forced.activity, action: forced.action }, log);
  }
  // no-immediate-repeat (added 10/07-k): `avoidId` already existed but was only
  // ever wired to the relax-retry (never re-propose what a rejected relax draw
  // just offered), not the primary draw — so the SAME activity could legitimately
  // win twice in a row on the primary path. Confirmed in a real 28-day run:
  // Piano→Piano, Chant→Chant, Cover→Cover each fired back-to-back (~1h apart)
  // inside a longer same-family streak Maxence spotted (10/07). Monte-Carlo
  // re-simulating that exact night 400× showed the broader "several different
  // same-rate creative activities in a row" pattern is NOT a bug — the pool
  // genuinely narrows to ~7 rows past midnight (chores meal-time-gated, other
  // domains already at quota), so a 7-long same-family streak happens ~14% of
  // nights from honest variance alone, unaffected by this fix. But the exact
  // back-to-back SAME-activity repeats within it were a real, avoidable
  // artifact — same safety pattern as the day-cap below: only excluded if it
  // doesn't empty the pool, never blocks a proposal outright.
  const lastEntry = log.length ? log.reduce((a, b) => (a.ts > b.ts ? a : b)) : null;
  if (lastEntry) {
    const noRepeat = rows.filter((r) => r.activity.id !== lastEntry.activityId);
    if (noRepeat.length) rows = noRepeat;
  }
  // soft same-day repeat cap (added 10/07-d): confirmed by stress-testing a real
  // multi-day-absence-then-normal-day pattern that argmax with zero randomness can
  // still pile a catch-up day onto 1-2 activities if their backlog stays largest
  // draw after draw. Cap any one activity at 2 completions/day regardless of
  // relax/cap state; only lifted if it would empty the whole pool (never block a
  // proposal outright — same philosophy as the cap/relax fallback itself).
  const countToday = {};
  for (const e of log) { if (e.date === today && isDone(e)) countToday[e.activityId] = (countToday[e.activityId] || 0) + 1; }
  const capped = rows.filter((r) => (countToday[r.activity.id] || 0) < 2);
  if (capped.length) rows = capped;
  // weighted random draw, not argmax (rewritten 10/07-g). Every patch tried on top
  // of "always serve the single highest priority" — jitter, kind-adjacency damping —
  // just relocated the predictability instead of removing it (Maxence: "je sais
  // aussi que ce ne sera pas un pipeline après un pipeline... ça reste prévisible").
  // Argmax is inherently a deterministic rule on top of a signal; no amount of
  // noise layered on the INPUT changes that the OUTPUT is always "take the max".
  // So: draw like pick() does (cumulative weighted roll, genuinely independent
  // every time), but weight = elapsedDays × rate instead of pick()'s plain rate —
  // overdue rows get proportionally MORE chances, never a guarantee, nothing
  // "remembers" what the last draw was. Never-done rows get a flat weight in the
  // same range as a legitimately very-overdue row (not the old 900-1000 stand-in),
  // so untried activities are favored early without being absolute about it.
  // short-term diversity damping (added 11/07-c): different from the jitter/kind-
  // adjacency damping tried and rejected 10/07-g — that was cosmetic noise on top
  // of an argmax rule, which never removes an argmax's predictability. This instead
  // reweights the INPUT to the same genuine weighted-random draw, so it doesn't
  // fight the thing that guarantees long-run convergence to target. Targets the
  // exact pattern Maxence flagged (notice→livre→sudoku opening every day): those
  // rows reset to elapsedDays≈1 every morning with nothing else to tell them apart,
  // so without this they win the day's first few draws almost every day, in a
  // recognizable way. `drawsAgo` counts by DRAW COUNT, not calendar days — a row
  // drawn recently gets ramped-down weight for roughly a day's worth of draws
  // (Maxence's real pace, ~10/day, see [[throughline-target-cadence]]), then back
  // to full strength; a genuinely due row is nudged, never blocked (floor 0.15,
  // same "never block a proposal outright" philosophy as the caps above). Does NOT
  // fix a structurally small pool (e.g. only ~4 anywhere/work day-rows eligible
  // during a multi-day work stretch) — that's a catalogue/placement question, not
  // something a weight tweak can diversify further.
  const RECENCY_WINDOW = 10;
  const doneLog = log.filter(isDone);
  const drawsAgo = (actId, actionId) => {
    for (let i = doneLog.length - 1, n = 0; i >= 0; i--, n++) {
      const e = doneLog[i];
      if (e.activityId === actId && (actionId == null || e.actionId === actionId)) return n;
    }
    return Infinity;
  };
  const weight = (r) => {
    // sinceTs (vaisselle/garniture): age off the triggering cook/focaccia, not this
    // row's own last completion — otherwise a debt that reopens right after an
    // unrelated recent completion reads as "just done" and gets starved instead of
    // surfacing soon (Maxence 11/07).
    const last = r.sinceTs != null ? r.sinceTs : lastRealTs(log, r.activity.id, r.action ? r.action.id : null);
    const base = last == null ? 6 : (eligibleDaysSince(r.activity, r.action, last, now.getTime()) * r.rate) / ((1 + (r.over || 0)) ** 2);
    const da = drawsAgo(r.activity.id, r.action ? r.action.id : null);
    const recencyDamp = da >= RECENCY_WINDOW ? 1 : 0.15 + 0.85 * (da / RECENCY_WINDOW);
    let w = base * recencyDamp;
    // focaccia/garniture hour-of-day ramp (Maxence 11/07-b): doubles every 2h of
    // the day, on their respective deadline day only, so their odds climb toward
    // the hard FOCACCIA_GARNITURE_DEADLINE_HOUR guarantee above instead of
    // staying flat until it fires.
    if (r.action && r.action.id === "x_mp_focaccia" && focacciaDeadlineDay) {
      w *= Math.pow(2, hourNow / 2);
    }
    if (r.action && r.action.id === "x_mp_garniture" && garnitureDeadlineDay) {
      w *= Math.pow(2, hourNow / 2);
    }
    return w;
  };
  const total = rows.reduce((s, r) => s + weight(r), 0);
  let roll = Math.random() * total;
  let drawn = rows[rows.length - 1];
  for (const r of rows) { roll -= weight(r); if (roll <= 0) { drawn = r; break; } }
  return resolveDraw(drawn, log);
}

// ---------- sandbox mode (?sim=1) ----------
// A clone of the real app, on isolated storage, so Maxence can DRIVE the checklist
// himself and watch it drain/refill — instead of reading a node simulator. Same
// code, same UI, same engine (zero drift). Everything below is inert unless SIM.
const SIM = typeof location !== "undefined" && new URLSearchParams(location.search).get("sim") === "1";
// namespace storage so the sandbox NEVER touches real data (activities/log/hold).
// The API key is shared (it's just a key), so pipeline advancing works in both.
const NS = (k) => (SIM && k !== "tlx_apiKey" ? k.replace("tlx_", "tlx_sim_") : k);

// buildHat = the whole draw pool laid open (for the sandbox "Liste" view). Same
// rows pickAging() draws from (buildLotteryRows), plus `done` (informational —
// how many completions logged this period) and `rate` (its actual draw weight)
// for display. Neither field affects what pickAging() does with the pool.
function buildHat(activities, log, place) {
  return buildLotteryRows(activities, log, place, false).map((r) => ({
    key: r.activity.id + (r.action ? ":" + r.action.id : ""),
    activity: r.activity, action: r.action, period: r.period, target: r.target, rate: r.rate,
    done: completionsInPeriod(log, r.activity.id, r.action ? r.action.id : null, r.period, { requireFinish: !!r.activity.requireFinish, requireProgress: !!r.activity.requireProgress }),
    label: r.action ? r.activity.name + " — " + r.action.text : r.activity.name,
  }));
}

// ---------- Claude bridge (shared) ----------
// One direct browser→Messages-API call returning structured JSON. Both the pipeline
// advancer and the practice/recommandeur coach go through here, so the transport,
// model and JSON-parsing live in one place.
async function claudeJSON(key, prompt, schema, maxTokens = 400, tools = null) {
  // web_search calls are heavier than plain generation and hit transient 429/5xx
  // capacity errors noticeably more often — retry those a couple of times with
  // backoff rather than let the caller's catch(e){} silently drop the whole
  // recommendation (found 12/07: repeated 529s during a live test left the
  // recommandeur falling back to the bare generic action every time).
  const maxAttempts = 3;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    if (attempt > 0) await new Promise((r) => setTimeout(r, 1000 * 2 ** (attempt - 1)));
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
        "content-type": "application/json",
      },
      body: JSON.stringify({
        model: "claude-opus-4-8",
        max_tokens: maxTokens,
        messages: [{ role: "user", content: prompt }],
        output_config: { format: { type: "json_schema", schema } },
        ...(tools ? { tools } : {}),
      }),
    });
    if (!res.ok) {
      const retryable = res.status === 429 || res.status >= 500;
      if (retryable && attempt < maxAttempts - 1) continue;
      throw new Error("http " + res.status);
    }
    const data = await res.json();
    const txt = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("");
    return JSON.parse(txt);
  }
}

// ---------- recommandeur: named suggestion generated at proposal time ----------
// Reads the taste profile from activity.note + last 20 session notes, returns a
// one-line string ("title — subtitle") to replace the generic action text.
// When the activity also keeps a curated items[] library (e.g. Cuisiner's recipe
// rotation), the deterministic LRU pick still runs first (in pickAging()) — this only
// dresses that choice up, or occasionally proposes something outside it. The
// library keeps driving the rotation; recommandeur doesn't replace it.
async function generateReco(key, activity, action, log) {
  const recent = log
    .filter((e) => e.activityId === activity.id && isDone(e))
    .slice(-20)
    .map((e) => e.claudeNote || e.note || e.actionText || "")
    .filter(Boolean);
  const library = (activity.items || []).filter((it) => it.status === "doing").map((it) => it.text);
  const usesLibrary = !!action.itemId && library.length > 0;
  const prompt = `Tu es le moteur de recommandation pour : « ${activity.name} » (${activity.domain}).

Profil de goûts / contraintes :
"""
${activity.note || "(pas de profil)"}
"""

Action proposée : « ${action.text} »
${library.length ? `\nBibliothèque actuelle (déjà validée par Maxence, à conserver comme base) :\n${library.map((t) => "- " + t).join("\n")}\n` : ""}
Sessions récentes (à ne pas répéter immédiatement) :
${recent.length ? recent.join("\n") : "(aucune)"}

${usesLibrary
    ? `La rotation a déjà choisi « ${action.text} » dans la bibliothèque ci-dessus. Présente CE choix comme une recommandation concrète et engageante (garde le nom reconnaissable ; tu peux ajouter un détail qui donne envie). N'en propose un autre que si celui-ci a visiblement été refait trop souvent récemment — et dans ce cas choisis un AUTRE item de la bibliothèque, jamais hors-liste.`
    : `Génère UNE recommandation concrète et nommée qui colle au profil et l'élargit légèrement${library.length ? ", en dehors de la bibliothèque ci-dessus (c'est le mode découverte)" : ""}. Pas la valeur sûre évidente — quelque chose d'adjacent qui surprend un peu.`}
Garde le nom de l'œuvre EXACTEMENT tel qu'il apparaît dans la bibliothèque ci-dessus (il est déjà validé par Maxence — ne le modifie pas). N'ajoute un sous-titre (artiste, réalisateur, note courte) que si tu en es sûr ; dans le doute, laisse le sous-titre vide plutôt que d'inventer un détail biographique.
Réponds avec un titre court (nom de l'œuvre, du plat, du morceau…) et un sous-titre optionnel (artiste, réalisateur, note courte…).`;
  // No web_search: the item is already a real, Maxence-curated entry from items[] —
  // there is nothing to "confirm exists". This call only dresses that known item up
  // (subtitle/detail), so it's a plain fast JSON call (~3s), not a 20-40s tool run.
  // Decided 13/07 — the web_search guard only ever mattered for the (now-dead)
  // discovery path where Claude invented a reco outside the library.
  const out = await claudeJSON(key, prompt, {
    type: "object",
    properties: { title: { type: "string" }, subtitle: { type: "string" } },
    required: ["title"],
    additionalProperties: false,
  }, 400);
  // title/desc kept separate (not pre-joined) — the "now" line shows only the title,
  // subtitle (artist/director/note) lives in the collapsible description below it.
  return { title: out.title, desc: out.subtitle || "" };
}

.fade{opacity:0;transform:translateY(8px);animation:fu .5s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes fu{to{opacity:1;transform:none}}
.navarr{font-family:var(--mono);font-size:20px;line-height:1;background:none;border:none;color:${C.line};cursor:pointer;padding:6px 10px;transition:color .25s}
.navarr:hover{color:${C.mut}}
.breathe{animation:breathe 3.6s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.95}}
.sway{animation:sway 5.2s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(calc(-1 * var(--tilt-amp,0deg)))}50%{transform:rotate(var(--tilt-amp,0deg))}}
.link{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:${C.faint};background:none;border:none;cursor:pointer;transition:color .2s}
.link:hover{color:${C.mut}}
textarea.in{resize:vertical}
input[type=range].sl{-webkit-appearance:none;appearance:none;height:2px;background:${C.line};outline:none;width:100%;margin:0}
input[type=range].sl::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:${C.bone};cursor:pointer}
input[type=range].sl::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:${C.bone};cursor:pointer}
@media (prefers-reduced-motion:reduce){.fade{animation:none;opacity:1;transform:none}.breathe{animation:none;opacity:.7}.sway{animation:none;transform:none}}
`;

function Throughline() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("now");
  const [activities, setActivities] = useState([]);
  const [log, setLog] = useState([]);
  const loaded = useRef(false);

  // now-flow
  const [place, setPlace] = useState(computePlace());
  const [stage, setStage] = useState("entry"); // entry | proposal | running | empty | done
  const [current, setCurrent] = useState(null);
  const [lastId, setLastId] = useState(null);
  const [simRes, setSimRes] = useState(null); // SIM-only: last batch-run result (real, committed — see runSimBatch)
  const [simCfg, setSimCfg] = useState({ jours: 7, tirages: 10 }); // editable batch-run conditions

  // the live line. While "running", it fills from the CENTRE outward as real time
  // elapses — reaching the margins at the action's estimated minutes, then spilling
  // past them (dépassement) if you keep going. No clock is ever shown: the line is
  // the only feedback. A few seconds = a sliver; the whole time = full; beyond = overflow.
  const [running, setRunning] = useState(false);
  const [startedAt, setStartedAt] = useState(0);
  const [elapsedMs, setElapsedMs] = useState(0);
  // pause — for a real interruption mid-session (phone call, someone at the door).
  // freezes the line; resuming shifts startedAt forward by the paused gap so the
  // logged time excludes it. Distinct from the sandbox's "+5m/+10m" time-travel pause.
  const [paused, setPaused] = useState(false);
  const pauseStartRef = useRef(0);
  const togglePause = () => {
    if (paused) { setStartedAt((s) => s + (Date.now() - pauseStartRef.current)); setPaused(false); }
    else { pauseStartRef.current = Date.now(); setPaused(true); }
  };

  // long-press to swap: hold the line and it retracts to nothing, then re-picks.
  // there is no visible "something else" button — this is the only way to change.
  // the hold starts at 10s and DOUBLES with every skip (20s, 40s…), so skipping
  // gets costlier through the day. it resets to 10s each new day.
  const BASE_HOLD_MS = 10000;
  const [holding, setHolding] = useState(false);
  const [holdMs, setHoldMs] = useState(BASE_HOLD_MS);
  const [holdDate, setHoldDate] = useState(todayKey());
  const holdTimer = useRef(null);
  const holdStart = useRef(0);
  const didHold = useRef(false);

  // debug time override
  const [manualMin, setManualMin] = useState("");
  const [debugDay, setDebugDay] = useState("");
  const [debugHour, setDebugHour] = useState("");
  // sandbox-only: which list row is being completed, + optional time/comment
  const [simEdit, setSimEdit] = useState(null);
  const [simMin, setSimMin] = useState("");
  const [simNote, setSimNote] = useState("");
  // sandbox-only: which list row has its target/period/where controls expanded —
  // lets Maxence tweak the catalogue right where he tests it, no tab switch
  const [paramEdit, setParamEdit] = useState(null);
  const [clock, setClock] = useState(0); // bump to re-render after a time jump

  const applyDebugTime = (day, hour) => {
    if (day && hour !== "") {
      _debugDate = new Date(`${day}T${String(parseInt(hour)).padStart(2,"0")}:00:00`);
    } else {
      _debugDate = null;
    }
    setClock((c) => c + 1);
    resetFlow();
  };
  // sandbox time travel: jump N days from the current (real or debug) moment,
  // keeping the hour, so dailies refill tomorrow and everything refills Monday.
  const jumpDays = (n) => {
    const base = _debugDate ? new Date(_debugDate) : new Date();
    base.setDate(base.getDate() + n);
    const d = keyOf(base), h = String(base.getHours());
    setDebugDay(d); setDebugHour(h); applyDebugTime(d, h);
  };
  const clockReal = () => { setDebugDay(""); setDebugHour(""); applyDebugTime("", ""); };
  // minute-precision sim clock: advance the current (debug or real) moment by N
  // minutes and freeze the clock there — used for pause buttons ("+1h de pause")
  // and to auto-advance when you log a session's real duration (do a 10min sudoku
  // at 16h00 → the clock reads 16h10 once you validate).
  const simAdvanceMinutes = (mins) => {
    const base = _debugDate ? new Date(_debugDate) : new Date();
    base.setMinutes(base.getMinutes() + mins);
    _debugDate = base;
    setDebugDay(keyOf(base)); setDebugHour(String(base.getHours()));
    setClock((c) => c + 1);
  };

  // misc
  const [msg, setMsg] = useState("");

  // after-session comment + the Claude bridge that advances pipeline pieces
  const [comment, setComment] = useState("");
  // recommandeur (musique, film…): the line shows ONLY the title Claude picked — what
  // describes it (artist/director/note) sits in a dropdown, collapsed by default
  // (Maxence 12/07: "je veux qu'apparaisse seulement le titre... et ce qui décrit la
  // recommandation dans un champ séparé en dessous, genre drop-down").
  const [descOpen, setDescOpen] = useState(false);
  const [doneEntryId, setDoneEntryId] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [keyOpen, setKeyOpen] = useState(false);
  const [logOpen, setLogOpen] = useState(false);
  const [logText, setLogText] = useState("");
  const [logBusy, setLogBusy] = useState(false);
  // "tap to begin" — shown exactly once, on the very first launch ever, then
  // never again (Maxence 11/07: the app is otherwise chrome-free at entry on
  // purpose — this is the one-time exception, not a standing affordance).
  const [showTapHint, setShowTapHint] = useState(false);
  // the domain-balance swing (see domainBalance()) stays completely hidden —
  // no tilt, no class, line looks exactly as if the feature didn't exist —
  // until a shake reveals it; another shake hides it again. Decided 12/07:
  // even a silent/near-flat line is still a standing element that's always
  // "on"; shake-to-reveal keeps it at zero footprint until asked for, the
  // same instinct that killed the progress tab and the nav arrows.
  const [balanceVisible, setBalanceVisible] = useState(false);

  useEffect(() => {
    if (typeof window === "undefined" || !window.DeviceMotionEvent) return;
    let lastMag = null, lastShakeTs = 0;
    const SHAKE_DELTA = 18; // m/s^2 jump between readings
    const COOLDOWN_MS = 1200; // one toggle per shake gesture, not per spike
    const onMotion = (e) => {
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a || a.x == null) return;
      const mag = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
      if (lastMag != null) {
        const now = Date.now();
        if (Math.abs(mag - lastMag) > SHAKE_DELTA && now - lastShakeTs > COOLDOWN_MS) {
          lastShakeTs = now;
          setBalanceVisible((v) => !v);
        }
      }
      lastMag = mag;
    };
    window.addEventListener("devicemotion", onMotion);
    return () => window.removeEventListener("devicemotion", onMotion);
  }, []);

  useEffect(() => {
    // Ask the browser to keep our data — without this, phones may evict
    // localStorage under storage pressure. With it, data stays until you
    // clear site data or uninstall.
    try { navigator.storage?.persist?.(); } catch {}
    let alive = true;
    (async () => {
      let a = await loadJSON(NS("tlx_activities"), null);
      const l = await loadJSON(NS("tlx_log"), null);
      const hs = await loadJSON(NS("tlx_hold"), null);
      const fl = await loadJSON(NS("tlx_flow"), null);
      const k = await store.get("tlx_apiKey");
      // sandbox with no data yet → seed from the served catalogue copy so the
      // clone opens on the REAL activities. Falls back to SEED if it isn't there.
      if (SIM && a == null) {
        try { const r = await fetch("throughline-catalogue.json", { cache: "no-store" }); if (r.ok) { const c = await r.json(); if (Array.isArray(c.activities)) a = c.activities; } } catch {}
      }
      // first launch ever (per namespace — prod and sandbox track this separately)
      // → show the tap hint this one time, mark it seen immediately so no later
      // launch shows it again, even if this session never reaches "entry".
      const hintSeen = await store.get(NS("tlx_hintSeen"));
      if (!hintSeen) { setShowTapHint(true); store.set(NS("tlx_hintSeen"), "1"); }
      if (!alive) return;
      setActivities(a ?? SEED);
      setLog(l ?? []);
      setApiKey(k || "");
      if (hs && hs.date === todayKey()) { setHoldMs(hs.ms); setHoldDate(hs.date); } // same day → keep the accumulated penalty
      else { setHoldMs(BASE_HOLD_MS); setHoldDate(todayKey()); }                    // new day → back to 10s
      // restore the live proposal so a backgrounded tab getting killed and reopened
      // (common on phones) resumes exactly where it left off, instead of silently
      // re-picking — that silent re-pick was an unintended free skip. Only same-day:
      // a proposal from a previous day is stale, start fresh instead.
      if (fl && fl.date === todayKey() && fl.stage && fl.stage !== "entry" && fl.stage !== "empty") {
        setStage(fl.stage); setCurrent(fl.current || null);
        setStartedAt(fl.startedAt || 0); setElapsedMs(fl.startedAt ? Date.now() - fl.startedAt : 0);
        setRunning(!!fl.running); setPaused(!!fl.paused);
        setDoneEntryId(fl.doneEntryId || null); setComment(fl.comment || ""); setManualMin(fl.manualMin || "");
      }
      setLoading(false);
      loaded.current = true;
    })();
    return () => { alive = false; };
  }, []);
  useEffect(() => { if (loaded.current) saveJSON(NS("tlx_activities"), activities); }, [activities]);
  useEffect(() => { if (loaded.current) saveJSON(NS("tlx_log"), log); }, [log]);
  // persist the live flow so it survives a tab getting backgrounded and killed
  useEffect(() => {
    if (!loaded.current) return;
    saveJSON(NS("tlx_flow"), { date: todayKey(), stage, current, startedAt, running, paused, doneEntryId, comment, manualMin });
  }, [stage, current, startedAt, running, paused, doneEntryId, comment, manualMin]);

  // tick the live line while running — re-read the wall clock so it stays accurate
  // even if the tab was backgrounded.
  useEffect(() => {
    if (!running || paused) return;
    const t = setInterval(() => setElapsedMs(Date.now() - startedAt), 100);
    return () => clearInterval(t);
  }, [running, startedAt, paused]);

  // ----- now-flow actions -----
  const propose = (logUse = log, actsUse = activities, relax = false, avoidId = null) => {
    const pl = computePlace(); setPlace(pl); // place is read from the clock, not chosen
    // if every row is past its day/week cap right now, don't stop — relax and redraw
    // immediately (decided 10/07: "quand tout est arrivé à complétion, on relance
    // juste", no stopping-point verdict to hit at the wrong moment). The "empty"
    // stage below now only fires when there's truly nothing eligible for this place
    // even with every gate relaxed (e.g. an empty catalogue for that context).
    let p = pickAging(actsUse, logUse, pl, { relax, avoidId });
    // relax skips the quota gate too, so without this the very thing that just hit
    // its target could come right back immediately — avoid at least that repeat.
    // Its weight is damped by `over` (see pickAging), so it doesn't snowball either.
    if (!p && !relax) p = pickAging(actsUse, logUse, pl, { relax: true, avoidId: avoidId ?? lastId });
    setRunning(false); setElapsedMs(0);
    if (!p) { setCurrent(null); setStage("empty"); }
    else {
      setCurrent(p); setStage("proposal");
      if (p.activity.kind === "recommandeur" && p.activity.note) {
        (async () => {
          const key = (await store.get("tlx_apiKey")) || "";
          if (!key) return;
          try {
            const { title, desc } = await generateReco(key, p.activity, p.action, logUse);
            // baseText: the underlying sub-action (e.g. "écouter un titre" vs "écouter un
            // album") — Claude's generated title replaces `text` entirely, which used to
            // erase which sub-action was actually drawn (Maxence 12/07: espagnol/musique
            // etc — "bien afficher la sous-activité sinon on comprend mal"). Kept alongside
            // so the UI can still show it. `desc` (artist/director/note) is what describes
            // the pick — shown only in the collapsible dropdown, never on the main line.
            setCurrent((c) => c && c.activity.id === p.activity.id ? { ...c, action: { ...c.action, baseText: c.action.baseText || c.action.text, text: title, desc } } : c);
          } catch (e) {}
        })();
      }
    }
  };
  const start = () => {
    setShowTapHint(false);
    // iOS requires an explicit user-gesture permission grant before
    // devicemotion fires at all — piggyback on the very first tap rather
    // than adding a dedicated prompt/button (Android needs no such call).
    if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
      DeviceMotionEvent.requestPermission().catch(() => {});
    }
    propose();
  };
  // swap the instruction for another — no judgement, no log. There is no "refuse"
  // anymore: if a suggestion doesn't fit you ask for another, or you engage for a
  // few seconds. The minimum viable move is a sliver of the line, not a clean exit.
  const swap = () => {
    const today = todayKey();
    const cur = holdDate === today ? holdMs : BASE_HOLD_MS; // fresh day → start from 10s
    const next = cur * 2; // every skip doubles the next hold
    setHoldMs(next); setHoldDate(today);
    saveJSON(NS("tlx_hold"), { date: today, ms: next });
    propose(log, activities, false, current ? current.activity.id : null);
  };
  const resetFlow = (nextStage = "entry") => { setStage(nextStage); setCurrent(null); setRunning(false); setElapsedMs(0); setPaused(false); setComment(""); setDescOpen(false); setSyncMsg(""); setSyncing(false); };
  // rapport: a day-close screen, unlocked only by naming it — typing "rapport" once
  // the day's click count clears the bar (Maxence 14/07, tested as a mockup first).
  // Reachable two ways: the after-session comment (here) and the free-log box
  // (submitFreeLog below) — same gate, same stage, no separate mechanism.
  const RAPPORT_MIN_CLICS = 10;
  const finishFlow = (text) => {
    const clicksToday = log.filter((e) => e.date === todayKey() && isClick(e)).length;
    const rapport = clicksToday >= RAPPORT_MIN_CLICS && !!text && text.trim().toLowerCase().includes("rapport");
    resetFlow(rapport ? "report" : "entry");
  };

  // ----- after-session comment → advance the pipeline piece via a direct Claude call -----
  // The comment is the ONLY thing that moves a pipeline piece forward (no tap-to-advance).
  // When one is left on a pipeline action, send it + the funnel + current stage to the
  // Messages API and let Claude decide the piece's new stage, inline at finish().
  const saveKey = () => { store.set("tlx_apiKey", apiKey.trim()); setKeyOpen(false); setMsg(apiKey.trim() ? "key saved" : "key cleared"); setTimeout(() => setMsg(""), 1500); };
  const clearKey = () => { store.set("tlx_apiKey", ""); setApiKey(""); setMsg("key cleared"); setTimeout(() => setMsg(""), 1500); };

  const advanceViaClaude = async (key, text) => {
    const act = current.activity, action = current.action;
    const stages = act.stages || [];
    const last = stages.length - 1;
    const piece = action.pieceId ? (act.items || []).find((it) => it.id === action.pieceId) : null;
    const ctx = action.fresh
      ? `Une pièce FRAÎCHE vient d'être lancée (pas encore de nom). Le pas proposé était : "${action.text}".`
      : `Pièce existante : « ${piece ? piece.text : "?"} », à l'étape ${action.pieceStage} (${(stages[action.pieceStage] || {}).text || "?"}).`;
    // named after the activity itself, not hardcoded to erasure — this same function
    // drives every pipeline (piano, cover, parfum-création…), not just poems.
    const prompt = `Tu suis l'avancement d'une pièce dans un funnel « ${act.name} » (domaine : ${act.domain}).
Étapes du funnel (index: nom) :
${stages.map((s, i) => `${i}: ${s.text}`).join("\n")}

${ctx}

Commentaire laissé après la session :
« ${text} »

Détermine où en est la pièce APRÈS cette session. new_stage = index (0 à ${last}) de l'étape courante : si une étape vient d'être finie, avance à la suivante, sinon garde l'étape. Cas particulier : si la session avait lieu SUR la dernière étape (${last} : ${(stages[last] || {}).text || "?"}) et que le commentaire indique qu'elle est terminée/réussie, new_stage = ${last + 1} — la pièce sort du funnel, terminée. Ne mets ${last + 1} QUE dans ce cas précis (jamais pour sauter directement d'une étape antérieure à la fin sans passer par la dernière étape elle-même). piece_name = nom court (existant, ou tiré du commentaire si fraîche). progressed = true si cette session a fait avancer concrètement la pièce (même sans changer d'étape — un chunk appris, une itération réelle), false si elle n'a rien fait gagner (rejoué sans progrès, session avortée, bloqué). note = une ligne qui distille ce qui a été fait.`;
    setSyncing(true); setSyncMsg("lecture du commentaire…");
    try {
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: { piece_name: { type: "string" }, new_stage: { type: "integer" }, progressed: { type: "boolean" }, note: { type: "string" } },
        required: ["piece_name", "new_stage", "progressed", "note"],
        additionalProperties: false,
      });
      // ns can reach last+1 — that's the sentinel for "graduated out of the funnel",
      // only ever produced by a session held ON the last stage itself (fixed 11/07,
      // see pipelineStep and the prompt above: the last stage is a real session to
      // do and finish, not an automatic marker reached just by arriving at its index).
      const ns = Math.max(0, Math.min(last + 1, parseInt(out.new_stage)));
      const aid = act.id;
      const pieceName = out.piece_name || (piece ? piece.text : "(sans nom)");
      // reaching the last stage this session (not already there) graduates the piece
      // into another activity's items[] — e.g. a mastered Piano piece joins Répertoire.
      // The comment is what drives it, same as everything else in the funnel.
      const prevStage = action.fresh ? 0 : (piece ? piece.stage : 0);
      // the piece finished the funnel THIS session (ns went past the last stage) —
      // the one thing that counts as a real completion (e.g. a_erasure.requireFinish
      // uses this to gate its weekly target on a finished poem, not just any session
      // touching a piece). Only reachable from prevStage === last (mastery session
      // itself reporting done), never a multi-stage skip.
      const justFinished = ns > last && prevStage <= last;
      const justGraduated = act.graduatesTo && justFinished;
      setActivities((arr) => arr.map((a) => {
        if (a.id === aid) {
          let items = a.items || [];
          if (action.fresh) items = [...items, { id: uid(), text: pieceName, stage: ns }];
          else if (action.pieceId) items = items.map((it) => (it.id === action.pieceId ? { ...it, stage: ns } : it));
          return { ...a, items };
        }
        if (justGraduated && a.id === act.graduatesTo) {
          return { ...a, items: [...(a.items || []), { id: uid(), text: pieceName, status: "doing" }] };
        }
        return a;
      }));
      // progressed = real forward movement this session, independent of a full stage
      // transition (e.g. a_piano.requireProgress gates its weekly target on this —
      // touching the piece isn't enough, but finishing the whole piece is too rare
      // a bar for a weekly cadence).
      if (doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text, claudeNote: out.note, finished: justFinished, progressed: !!out.progressed } : en)));
      setSyncMsg(`« ${out.piece_name} » → ${ns > last ? "terminé" : (stages[ns] || {}).text || "?"}`);
    } catch (err) {
      setSyncMsg("lecture impossible (" + (err.message || "erreur") + ") — commentaire gardé");
    } finally {
      setSyncing(false);
      setTimeout(() => { setSyncMsg(""); finishFlow(text); }, 2400);
    }
  };

  // ----- practice: the comment feeds the activity's living `note` (coaching memory:
  // patterns, adjustments, observations). Claude rewrites the whole note integrating
  // this session, and distils a one-line log note.
  // NOT used for recommandeur (Film/Écoute/Cuisiner) anymore — 13/07: this used to also
  // rewrite `note` as a "taste profile" for recos, but for Cuisiner `note` holds engine
  // rules (NO-GO list, meal-time windows, garniture logic), and a passing comment ("trop
  // sucré") triggering a full LLM rewrite of that text risked silently corrupting it. The
  // comment is still captured (submitComment always writes log.note regardless of kind) —
  // recommandeur taste signal now lives in items[] status, set explicitly, not inferred
  // by rewriting free text. See [[throughline-reco-library-vs-llm]].
  const coachViaClaude = async (key, text) => {
    const act = current.activity;
    const prompt = `Activité : « ${act.name} » (type: ${act.kind}, domaine: ${act.domain}).
Action faite : « ${current.action.text} ».
Le champ « note » de cette activité est une MÉMOIRE DE COACHING : patterns, ajustements, observations utiles pour les prochaines sessions.

Note actuelle :
"""
${act.note || "(vide)"}
"""

Commentaire laissé après cette session :
« ${text} »

Réécris la note en y intégrant ce qu'apporte ce commentaire — garde ce qui reste pertinent, condense, n'efface pas l'historique utile. Garde une mémoire de coaching actionnable. updated_note = la note complète réécrite (concise). log_note = une ligne qui distille cette session.`;
    setSyncing(true); setSyncMsg("lecture du commentaire…");
    try {
      // maxTokens explicit here: the default (400) truncates mid-JSON once an
      // activity's note has grown past a paragraph or two — Claude's completion
      // gets cut off, JSON.parse then throws ("lecture impossible... erreur json"),
      // while short-note activities pass fine. Found 10/07: the whole-note rewrite
      // needs real headroom.
      const out = await claudeJSON(key, prompt, {
        type: "object",
        properties: { updated_note: { type: "string" }, log_note: { type: "string" } },
        required: ["updated_note", "log_note"],
        additionalProperties: false,
      }, 1600);
      const aid = act.id;
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, note: out.updated_note } : a)));
      if (doneEntryId) setLog((L) => L.map((en) => (en.id === doneEntryId ? { ...en, note: text, claudeNote: out.log_note } : en)));
      setSyncMsg("note coach mise à jour ✓");
    } catch (err) {
      setSyncMsg("lecture impossible (" + (err.message || "erreur") + ") — commentaire gardé");
    } finally {
      setSyncing(false);
      setTimeout(() => { setSyncMsg(""); finishFlow(text); }, 2400);
    }
  };

  const submitComment = async () => {
    const text = comment.trim();
    const parsedManual = manualMin.trim() ? parseInt(manualMin) : null;
    const existing = log.find((en) => en.id === doneEntryId);
    if (doneEntryId) {
      setLog((L) => L.map((en) => {
        if (en.id !== doneEntryId) return en;
        const patch = {};
        if (parsedManual > 0) { patch.min = parsedManual; patch.sec = parsedManual * 60; }
        if (text) patch.note = text;
        return { ...en, ...patch };
      }));
    }
    // finish() already advanced the clock by the logged minutes — only apply the
    // extra delta here if a manual override changes the duration after the fact.
    if (SIM && parsedManual > 0 && existing) {
      const delta = parsedManual - (existing.min || 0);
      if (delta) simAdvanceMinutes(delta);
    }
    const kind = current && current.activity.kind;
    // pipeline advances the piece, practice grows the coaching note. recommandeur and
    // task just keep the comment locally (log.note, patched above) — see coachViaClaude
    // for why recommandeur was cut out 13/07.
    const wantsClaude = !!text && (kind === "pipeline" || kind === "practice");
    if (wantsClaude) {
      const key = (await store.get("tlx_apiKey")) || "";
      if (key) { (kind === "pipeline" ? advanceViaClaude : coachViaClaude)(key, text); return; }
      setSyncMsg(kind === "pipeline" ? "pas de clé API — commentaire gardé, pièce non avancée" : "pas de clé API — commentaire gardé, note non mise à jour");
      setTimeout(() => { setSyncMsg(""); finishFlow(text); }, 2200);
      return;
    }
    finishFlow(text);
  };

  // section navigation — no tab bar; swipe left/right or tap the faint edge arrows.
  // prod is a single screen — the line. The activities editor lives in the sandbox
  // only now (13/07); the catalogue is edited in the files directly, not in-app.
  const TABS = SIM ? ["now", "liste", "simulateur", "activities"] : ["now"];
  const go = (dir) => {
    const i = TABS.indexOf(tab);
    const ni = Math.min(TABS.length - 1, Math.max(0, i + dir));
    if (ni === i) return;
    // Fixed 12/07 (Maxence): this used to call resetFlow() on arriving back at
    // "now", which silently wiped a running/awaiting-comment session — swiping to
    // "activities" and back was a free, unpenalised skip that bypassed the hold-
    // to-swap cost entirely. The flow state is already restored from tlx_flow on
    // reload; a same-session tab switch needs no reset at all.
    const t = TABS[ni]; setTab(t);
  };
  const touchRef = useRef(null);
  const onTouchStart = (e) => { const t = e.touches[0]; touchRef.current = { x: t.clientX, y: t.clientY }; };
  const onTouchEnd = (e) => {
    const s = touchRef.current; touchRef.current = null; if (!s) return;
    const t = e.changedTouches[0]; const dx = t.clientX - s.x, dy = t.clientY - s.y;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) go(dx < 0 ? 1 : -1);
  };

  // tap to begin — for timed activities the line pre-fills with already-done minutes this period
  const begin = () => {
    let preMs = 0;
    if (current?.activity?.timed) {
      const done = minutesInPeriod(log, current.activity.id, null, current.activity.period || "day");
      preMs = Math.min(done, current.activity.target || 30) * 60000;
    }
    setStartedAt(Date.now() - preMs);
    setElapsedMs(preMs);
    setManualMin("");
    setPaused(false);
    setRunning(true); setStage("running");
  };

  // tap "done" — log real time (or manual override), trigger vaisselle if cooking done
  const finish = () => {
    if (!current) { resetFlow(); return; }
    // SIM: real elapsed time is meaningless for a hand-run test (tapping through fast) —
    // default to the activity/action's catalogue duration instead, so the sandbox clock
    // (advanced below) reflects a plausible session length; the "done" screen still lets
    // Maxence type an explicit override, which submitComment() applies as a delta on top.
    // Prod (SIM=false) is untouched: it always logs the real elapsed duration.
    const minLogged = SIM
      ? Math.max(1, Math.round(actDurMin))
      : Math.max(1, Math.round(Math.max(1, Math.round((Date.now() - startedAt) / 1000)) / 60));
    const aid = current.activity.id;
    setLastId(aid);
    const e = {
      // realNow() not Date.now(): identical in prod (no debug clock), but in the
      // sandbox this must track the simulated clock (see comment on the fix below).
      id: uid(), date: todayKey(), ts: realNow().getTime(), type: "done",
      activityId: aid, actionId: current.action.id, actionText: current.action.text,
      min: minLogged, sec: minLogged * 60, domain: current.activity.domain, note: "",
      ...(current.action.itemId ? { itemId: current.action.itemId } : {}),
    };
    if (current.activity.kind === "task") {
      setActivities((arr) => arr.map((a) => (a.id === aid ? { ...a, done: true } : a)));
    }
    setDoneEntryId(e.id);
    setLog((L) => [...L, e]);
    // sandbox clock: advance right away by the catalogue default duration, so it
    // already reflects a plausible length before any override is typed — tapping
    // the line on "done" (submitComment) applies the delta if one is.
    if (SIM) simAdvanceMinutes(minLogged);
    setRunning(false);
    setComment(""); setManualMin(""); setDescOpen(false);
    setStage("done");
  };

  // ----- the line is the whole control surface: short tap acts, long hold retracts & re-picks -----
  const tapAction = () => {
    if (stage === "entry") start();
    // tapping the line from "done" submits whatever's in the duration/comment fields
    // (same as the old "passer"/"valider" button) then moves on — one control surface,
    // no separate button needed.
    else if (stage === "done") submitComment();
    else if (stage === "proposal") begin();
    else if (stage === "running" && !paused) finish(); // resume before finishing — paused time shouldn't count
  };
  const canHold = stage === "proposal"; // skip is only useful before you've started — once running, finish or pause
  const effHold = holdDate === todayKey() ? holdMs : BASE_HOLD_MS; // ignore a stale day if left open past midnight
  const onLineDown = () => {
    didHold.current = false;
    if (!canHold) return;
    holdStart.current = Date.now();
    setHolding(true); // the line begins retracting toward the centre over the full hold time
    holdTimer.current = setTimeout(() => {
      didHold.current = true; holdTimer.current = null;
      setHolding(false); swap(); // fully retracted → a different thing
    }, effHold);
  };
  const cancelHold = () => { if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current = null; } setHolding(false); };
  const onLineUp = () => {
    const heldFor = holdStart.current ? Date.now() - holdStart.current : 0;
    cancelHold();
    if (didHold.current) { didHold.current = false; return; } // swap already fired
    if (canHold && heldFor >= 300) { holdStart.current = 0; return; } // aborted hold — spring back, no action
    holdStart.current = 0;
    tapAction();
  };
  const onLineCancel = () => { cancelHold(); didHold.current = false; holdStart.current = 0; };

  // ----- activity mutations -----
  const upd = (id, patch) => setActivities((arr) => arr.map((a) => (a.id === id ? { ...a, ...patch } : a)));
  const addActivity = () =>
    setActivities((arr) => [...arr, { id: uid(), name: "", domain: "creative", where: "home", target: 1, period: "week", kind: "practice", done: false, actions: [{ id: uid(), text: "", min: 15 }], items: [], stages: [], note: "" }]);
  const delActivity = (id) => setActivities((arr) => arr.filter((a) => a.id !== id));
  const addAction = (id) => upd(id, { actions: [...activities.find((a) => a.id === id).actions, { id: uid(), text: "", min: 15 }] });
  const editAction = (id, aid, patch) => upd(id, { actions: activities.find((a) => a.id === id).actions.map((ac) => (ac.id === aid ? { ...ac, ...patch } : ac)) });
  const delAction = (id, aid) => upd(id, { actions: activities.find((a) => a.id === id).actions.filter((ac) => ac.id !== aid) });
  const addStage = (id) => upd(id, { stages: [...(activities.find((a) => a.id === id).stages || []), { id: uid(), text: "" }] });
  const editStage = (id, sid, patch) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).map((s) => (s.id === sid ? { ...s, ...patch } : s)) });
  const delStage = (id, sid) => upd(id, { stages: (activities.find((a) => a.id === id).stages || []).filter((s) => s.id !== sid) });
  const moveStage = (id, sid, dir) => upd(id, { stages: (() => {
    const arr = [...(activities.find((a) => a.id === id).stages || [])];
    const i = arr.findIndex((s) => s.id === sid), j = i + dir;
